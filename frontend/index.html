<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국가유산 인터랙티브 체험</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="main-header">
            <h1>🏛️ 국가유산 인터랙티브 체험</h1>
            <nav class="feature-nav">
                <button data-feature="1">단청 물결</button>
                <button data-feature="2">국가유산 CRT</button>
                <button data-feature="3">색즉시공</button>
                <button data-feature="4">인크레디박스</button>
                <button data-feature="5">인생네컷</button>
                <button data-feature="6">사관 LLM</button>
                <button data-feature="7">보존과학</button>
                <button data-feature="8">인터렉티브</button>
            </nav>
        </header>
        
        <!-- Main Content Area -->
        <main id="feature-container">
            <div class="welcome-screen">
                <h2>원하는 기능을 선택해주세요</h2>
                <p>8 가지 국가유산 기반 인터랙티브 체험</p>
                <div class="api-status" id="api-status">
                    <span>⚠️ API 키 설정 필요 (Settings → Environment Variables)</span>
                </div>
            </div>
        </main>
        
        <!-- Webcam Container -->
        <div id="webcam-container" style="display:none;">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="output-canvas"></canvas>
        </div>
        
        <!-- Footer -->
        <footer class="main-footer">
            <span>© 2026 국가유산 디지털 아카이브</span>
        </footer>
    </div>
    
    <script src="js/main.js"></script>
</body>
</html>
