<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>사관 LLM · 조선왕조실록</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400&display=swap');
:root{--gold:#c9a84c;--red:#8b1a1a;--paper:#f2e8d0;--ink:#1a1005;--dark:#06040a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--paper);font-family:'Noto Serif KR',serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
/* HEADER */
.header{height:54px;background:rgba(0,0,0,.85);border-bottom:1px solid rgba(201,168,76,.18);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;}
.header-title{font-size:16px;font-weight:900;color:var(--gold);letter-spacing:.15em;}
.header-sub{font-size:10px;color:rgba(245,239,224,.35);letter-spacing:.2em;font-family:'Courier New',monospace;}
.tab-btns{display:flex;gap:6px;margin-left:auto;}
.tab-btn{background:none;border:1px solid rgba(201,168,76,.25);color:rgba(245,239,224,.55);padding:5px 14px;font-size:11px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.08em;transition:all .18s;}
.tab-btn:hover{border-color:var(--gold);color:var(--gold);}
.tab-btn.active{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold);}
/* MAIN */
.main{flex:1;display:flex;min-height:0;}
/* LEFT: CHAT */
#chat-panel{width:42%;border-right:1px solid rgba(201,168,76,.1);display:flex;flex-direction:column;background:rgba(4,2,8,.9);}
#chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:10px;animation:fadein .3s;}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.av-user{background:rgba(139,26,26,.4);border:1px solid rgba(139,26,26,.6);}
.av-ai{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);}
.msg-bubble{max-width:75%;padding:10px 13px;font-size:13px;line-height:1.7;border-radius:2px;}
.user .msg-bubble{background:rgba(139,26,26,.25);border:1px solid rgba(139,26,26,.4);border-radius:2px 2px 0 2px;}
.ai .msg-bubble{background:rgba(20,14,4,.8);border:1px solid rgba(201,168,76,.18);border-radius:2px 2px 2px 0;}
.msg-bubble small{display:block;font-size:10px;color:rgba(245,239,224,.3);margin-top:4px;font-family:'Courier New',monospace;}
.typing{display:flex;gap:4px;padding:12px 14px;align-items:center;}
.dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:bounce .9s infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
#chat-input-wrap{padding:12px 14px;border-top:1px solid rgba(201,168,76,.1);display:flex;gap:8px;}
#chat-input{flex:1;background:rgba(15,10,4,.8);border:1px solid rgba(201,168,76,.2);color:var(--paper);padding:9px 12px;font-family:'Noto Serif KR',serif;font-size:13px;resize:none;height:54px;outline:none;transition:border-color .18s;}
#chat-input:focus{border-color:rgba(201,168,76,.5);}
#send-btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.35);color:var(--gold);padding:0 16px;font-size:18px;cursor:pointer;transition:all .18s;}
#send-btn:hover{background:rgba(201,168,76,.22);}
/* RIGHT: SILLOK */
#sillok-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.sillok-header{padding:12px 18px;border-bottom:1px solid rgba(201,168,76,.1);display:flex;align-items:center;gap:10px;background:rgba(10,6,2,.8);flex-shrink:0;}
.sillok-title{font-size:13px;color:var(--gold);letter-spacing:.1em;}
.sillok-date{font-size:10px;color:rgba(245,239,224,.35);font-family:'Courier New',monospace;}
#sillok-scroll{flex:1;overflow-y:auto;padding:20px 24px;background:linear-gradient(to bottom,rgba(10,6,2,.8),rgba(6,4,10,.9));}
.sillok-entry{margin-bottom:24px;padding:16px 18px;border:1px solid rgba(201,168,76,.12);background:rgba(18,12,4,.7);position:relative;animation:fadein .5s;}
.sillok-entry::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(to bottom,var(--gold),rgba(201,168,76,.2));}
.sillok-year{font-size:10px;color:rgba(201,168,76,.6);letter-spacing:.2em;font-family:'Courier New',monospace;margin-bottom:8px;}
.sillok-text{font-size:14px;line-height:2.1;color:rgba(245,239,224,.88);text-align:justify;word-break:keep-all;}
.sillok-text .event-name{color:var(--gold);font-weight:700;}
.sillok-text .person-name{color:#e08070;}
.sillok-seal{position:absolute;bottom:10px;right:12px;width:36px;height:36px;border:2px solid rgba(139,26,26,.5);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(139,26,26,.7);font-weight:700;background:rgba(139,26,26,.08);transform:rotate(-5deg);}
.empty-state{text-align:center;padding:60px 20px;color:rgba(245,239,224,.2);}
.empty-state .e-icon{font-size:40px;display:block;margin-bottom:12px;opacity:.3;}
.empty-state p{font-size:13px;line-height:1.8;}
/* CLOUD SCROLL (archives tab) */
#archive-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;display:none;}
.archive-list{flex:1;overflow-y:auto;padding:14px;}
.archive-item{padding:14px 16px;border:1px solid rgba(201,168,76,.12);background:rgba(15,10,4,.7);margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;}
.archive-item:hover{border-color:rgba(201,168,76,.35);background:rgba(25,16,5,.8);}
.archive-item .a-date{font-size:9px;color:rgba(245,239,224,.3);font-family:'Courier New',monospace;margin-bottom:5px;letter-spacing:.1em;}
.archive-item .a-preview{font-size:13px;color:rgba(245,239,224,.75);line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.archive-item .a-user{font-size:9px;color:var(--gold);margin-top:5px;font-family:'Courier New',monospace;}
.archive-empty{text-align:center;padding:60px;color:rgba(245,239,224,.2);font-size:13px;}
.api-note{padding:10px 14px;background:rgba(201,168,76,.06);border-top:1px solid rgba(201,168,76,.1);font-size:10px;color:rgba(245,239,224,.3);font-family:'Courier New',monospace;text-align:center;flex-shrink:0;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">사관 LLM · 史官</div>
    <div class="header-sub">JOSEON ROYAL ANNALS GENERATOR</div>
  </div>
  <div class="tab-btns">
    <button class="tab-btn active" onclick="switchTab('write')">📝 기록하기</button>
    <button class="tab-btn" onclick="switchTab('archive')">📜 실록 열람</button>
  </div>
</div>

<div class="main">
  <!-- CHAT -->
  <div id="chat-panel">
    <div id="chat-msgs">
      <div class="msg ai">
        <div class="msg-avatar av-ai">👨‍💼</div>
        <div class="msg-bubble">
          소신 사관이오이다. 오늘 하루 있었던 일이나 생각을 말씀해 주시면, 조선왕조실록의 형식으로 기록해 올리겠사옵니다.<br><br>
          오늘 무슨 일이 있으셨사옵니까?
          <small>사관 · 史官</small>
        </div>
      </div>
    </div>
    <div id="chat-input-wrap">
      <textarea id="chat-input" placeholder="오늘의 이야기를 들려주세요..." onkeydown="onKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>

  <!-- SILLOK OUTPUT -->
  <div id="sillok-panel">
    <div class="sillok-header">
      <div>
        <div class="sillok-title">朝鮮王朝實錄 · 조선왕조실록</div>
        <div class="sillok-date" id="sillok-date-label"></div>
      </div>
      <button style="margin-left:auto;background:none;border:1px solid rgba(201,168,76,.25);color:rgba(201,168,76,.7);padding:4px 12px;font-size:10px;cursor:pointer;font-family:'Courier New',monospace;" onclick="downloadSillok()">⬇ 저장</button>
    </div>
    <div id="sillok-scroll">
      <div class="empty-state"><span class="e-icon">📜</span><p>대화를 나누면 이곳에<br>실록이 기록됩니다</p></div>
    </div>
    <div class="api-note">API 키가 없으면 데모 모드로 동작합니다 · Vercel 환경변수에 ANTHROPIC_API_KEY 설정 시 실제 AI 기록</div>
  </div>

  <!-- ARCHIVE -->
  <div id="archive-panel">
    <div class="sillok-header">
      <div class="sillok-title">📚 실록 보관함 · 다른 사용자 기록</div>
    </div>
    <div class="archive-list" id="archive-list">
      <div class="archive-empty">실록을 기록하면 여기에 보관됩니다</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// SYSTEM PROMPT & LLM CALL
// ═══════════════════════════════════════════
const SYSTEM = `당신은 조선왕조실록을 기록하는 사관(史官)입니다.
사용자가 말하는 현대의 일상 이야기를 들으며 대화하되,
대화가 충분히 이루어지면 조선왕조실록 형식으로 기록을 생성합니다.

실록 생성 규칙:
1. "###SILLOK_START###" 으로 시작하고 "###SILLOK_END###" 으로 끝
2. 조선 연도 형식: "○○○○년 (세종/태조/정조 등) ○월 ○일" 
3. 현대 사건을 옛말투로: "하다→하다, ~이/가→이/가, 했다→하였다"
4. 사람 이름은 "○○ 씨" 또는 직책으로
5. 3~5문장으로 간결하게
6. 먼저 사관으로서 공감하는 대화를 나누다가, 이야기가 충분하면 실록을 기록

예시 응답:
오늘 정말 힘드셨군요. 저도 사관으로서 기록하면서 많이 느끼는 바가 있사옵니다. 조금 더 자세히 말씀해 주시겠사옵니까?

###SILLOK_START###
갑진년(2024) 구월 칠일, 한 사내가 직장에서 심히 고된 하루를 보냈다 하였다. 상사와의 의견 충돌이 있었으나 끝내 뜻을 굽히지 않고 소신을 지켰으며, 저녁에는 가족과 함께 식사를 나누며 위로를 받았다 하였다. 사관은 이를 기록하노라.
###SILLOK_END###`;

let conversationHistory = [];
let sillokEntries = [];
let currentTab = 'write';

// ═══════════════════════════════════════════
// KOREAN YEAR CONVERSION
// ═══════════════════════════════════════════
const KINGS = ['태조','정종','태종','세종','문종','단종','세조','예종','성종','연산군','중종','인종','명종','선조','광해군','인조','효종','현종','숙종','경종','영조','정조','순조','헌종','철종','고종','순종'];
function toKoreanYear(date) {
  const y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();
  const cycleYear = ((y - 4) % 60 + 60) % 60;
  const cheongan = ['갑','을','병','정','무','기','경','신','임','계'];
  const jiji = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
  const cy = cheongan[cycleYear % 10] + jiji[cycleYear % 12] + '년';
  const monthNames = ['일월','이월','삼월','사월','오월','유월','칠월','팔월','구월','시월','십일월','십이월'];
  const dayNames = ['초하루','초이틀','초사흘','초나흘','초닷새','초엿새','초이레','초여드레','초아흐레','초열흘','열하루','열이틀','열사흘','열나흘','열닷새','열엿새','열이레','열여드레','열아흐레','스무날','스물하루','스물이틀','스물사흘','스물나흘','스물닷새','스물엿새','스물이레','스물여드레','스물아흐레','그믐날'];
  return `${cy} (서기 ${y}년) ${monthNames[m-1]} ${dayNames[d-1]}`;
}

function updateDateLabel() {
  const now = new Date();
  document.getElementById('sillok-date-label').textContent = toKoreanYear(now);
}
updateDateLabel();

// ═══════════════════════════════════════════
// CHAT
// ═══════════════════════════════════════════
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  showTyping();
  const response = await callLLM(conversationHistory);
  hideTyping();
  // Parse sillok
  const sillokMatch = response.match(/###SILLOK_START###([\s\S]*?)###SILLOK_END###/);
  let displayText = response.replace(/###SILLOK_START###[\s\S]*?###SILLOK_END###/g, '').trim();
  if (!displayText) displayText = '기록하였사옵니다.';
  addMessage('ai', displayText);
  conversationHistory.push({ role: 'assistant', content: response });
  if (sillokMatch) {
    const entry = sillokMatch[1].trim();
    addSillokEntry(entry);
    saveToArchive(entry, text);
  }
}

function addMessage(role, text) {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const now = new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
  div.innerHTML = `
    <div class="msg-avatar ${role==='user'?'av-user':'av-ai'}">${role==='user'?'👤':'👨‍💼'}</div>
    <div class="msg-bubble">${text.replace(/\n/g,'<br>')}<small>${role==='user'?'나':'사관'} · ${now}</small></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

let typingEl = null;
function showTyping() {
  const msgs = document.getElementById('chat-msgs');
  typingEl = document.createElement('div');
  typingEl.className = 'msg ai';
  typingEl.innerHTML = `<div class="msg-avatar av-ai">👨‍💼</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(typingEl);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

// ═══════════════════════════════════════════
// SILLOK DISPLAY
// ═══════════════════════════════════════════
function addSillokEntry(text) {
  const scroll = document.getElementById('sillok-scroll');
  // Remove empty state
  const empty = scroll.querySelector('.empty-state');
  if (empty) empty.remove();

  const now = new Date();
  const entry = document.createElement('div');
  entry.className = 'sillok-entry';
  const royalDate = toKoreanYear(now);
  // Format text with highlights
  const formatted = formatSillokText(text);
  const seals = ['印','記','官','史','錄'];
  const seal = seals[sillokEntries.length % seals.length];
  entry.innerHTML = `
    <div class="sillok-year">// ${royalDate} 실록 ${sillokEntries.length + 1}번째 기사 //</div>
    <div class="sillok-text">${formatted}</div>
    <div class="sillok-seal">${seal}</div>`;
  scroll.appendChild(entry);
  scroll.scrollTop = scroll.scrollHeight;
  sillokEntries.push({ date: royalDate, text, timestamp: now.toISOString() });
}

function formatSillokText(text) {
  // Highlight patterns
  return text
    .replace(/([가-힣]+년)/g, '<span class="event-name">$1</span>')
    .replace(/([가-힣]+ 씨)/g, '<span class="person-name">$1</span>')
    .replace(/\n/g, '<br>');
}

// ═══════════════════════════════════════════
// LLM CALL
// ═══════════════════════════════════════════
async function callLLM(history) {
  // Try Vercel API endpoint first
  try {
    const res = await fetch('/api/sillok', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, system: SYSTEM }),
    });
    if (res.ok) {
      const data = await res.json();
      return data.content?.[0]?.text || data.text || '';
    }
  } catch(e) {}
  // Demo mode fallback
  return demoResponse(history[history.length-1]?.content || '');
}

function demoResponse(userText) {
  const demos = [
    { trigger: ['힘들', '어렵', '피곤', '지침'], response: '참으로 고단하셨겠사옵니다. 사람이 살다 보면 그런 날도 있는 법이오이다. 조금 더 이야기를 들어주시면 기록에 담겠사옵니다.\n\n###SILLOK_START###\n갑진년(2024) 어느 날, 한 사람이 세상의 무게를 짊어지고 힘겨운 하루를 보내었다 하였다. 그럼에도 굴하지 아니하고 다음을 기약하니, 사관은 그 뜻을 가상히 여겨 기록하노라.\n###SILLOK_END###' },
    { trigger: ['먹었', '먹고', '식사', '밥'], response: '오늘 드신 음식이 맛있으셨사옵니까? 조선에서도 식사는 하루의 큰 즐거움이었사옵니다.\n\n###SILLOK_START###\n갑진년(2024) 이날, 한 이가 맛있는 음식으로 하루를 달랬다 하였다. 몸과 마음이 음식으로 위로받으니, 이야말로 소소하나 귀한 일상이로다.\n###SILLOK_END###' },
    { trigger: ['만났', '친구', '사람', '모임'], response: '좋은 분을 만나셨군요. 사람 사이의 인연이야말로 소중한 것이옵니다.\n\n###SILLOK_START###\n갑진년(2024) 이날, 한 이가 소중한 지인을 만나 정담을 나누었다 하였다. 사람과 사람 사이의 따뜻한 정이 세상을 밝히니, 사관은 이 인연을 기록하노라.\n###SILLOK_END###' },
  ];
  for (const d of demos) {
    if (d.trigger.some(t => userText.includes(t))) return d.response;
  }
  // Default
  return `말씀하신 내용을 삼가 들었사옵니다. 사관으로서 기록에 담겠사옵니다.

###SILLOK_START###
갑진년(2024) 이날, 한 이가 사관을 찾아와 오늘의 일들을 전하였다. 평범한 듯 보이나 그 안에 삶의 진실이 담겨 있으니, 이 또한 마땅히 기록할 만한 일이로다. 사관은 이를 삼가 적어 두노라.
###SILLOK_END###`;
}

// ═══════════════════════════════════════════
// ARCHIVE (localStorage 기반 - Firebase 대체)
// ═══════════════════════════════════════════
function saveToArchive(sillokText, userInput) {
  try {
    const archives = JSON.parse(localStorage.getItem('sillok_archive') || '[]');
    archives.unshift({
      id: Date.now(),
      sillok: sillokText,
      preview: userInput.slice(0, 60),
      date: new Date().toISOString(),
      user: '방문자_' + Math.random().toString(36).slice(2,6).toUpperCase()
    });
    localStorage.setItem('sillok_archive', JSON.stringify(archives.slice(0, 50)));
    loadArchive();
  } catch(e) {}
}

function loadArchive() {
  try {
    const archives = JSON.parse(localStorage.getItem('sillok_archive') || '[]');
    const list = document.getElementById('archive-list');
    if (!archives.length) { list.innerHTML = '<div class="archive-empty">아직 기록된 실록이 없습니다</div>'; return; }
    list.innerHTML = '';
    archives.forEach(a => {
      const item = document.createElement('div');
      item.className = 'archive-item';
      const date = new Date(a.date).toLocaleString('ko-KR');
      item.innerHTML = `
        <div class="a-date">${date}</div>
        <div class="a-preview">${a.sillok.slice(0, 100)}...</div>
        <div class="a-user">📜 ${a.user}</div>`;
      item.onclick = () => { switchTab('write'); addSillokEntry(a.sillok); };
      list.appendChild(item);
    });
  } catch(e) {}
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('sillok-panel').style.display = tab === 'write' ? 'flex' : 'none';
  document.getElementById('archive-panel').style.display = tab === 'archive' ? 'flex' : 'none';
  if (tab === 'archive') loadArchive();
}

// ═══════════════════════════════════════════
// DOWNLOAD
// ═══════════════════════════════════════════
function downloadSillok() {
  if (!sillokEntries.length) { alert('기록된 실록이 없습니다.'); return; }
  let text = '朝鮮王朝實錄 · 조선왕조실록\n';
  text += '═'.repeat(40) + '\n\n';
  sillokEntries.forEach((e, i) => {
    text += `${i+1}. ${e.date}\n${e.text}\n\n`;
  });
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '실록_' + new Date().toISOString().slice(0,10) + '.txt';
  a.click();
}

loadArchive();
</script>
</body></html>
