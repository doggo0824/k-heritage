<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>06 사관 LLM | 국가유산</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#e8d5a3;font-family:"Courier New",monospace;min-height:100vh;display:flex;flex-direction:column}
.bk{position:fixed;top:16px;left:16px;color:#a08040;text-decoration:none;font:13px "Courier New";letter-spacing:2px;border:1px solid #a08040;padding:7px 14px;z-index:99;transition:.3s}
.bk:hover{background:#a08040;color:#050505}
#hdr{padding:56px 20px 16px;text-align:center;border-bottom:1px solid rgba(200,168,75,.2);flex-shrink:0}
.hdr-hanja{font-size:20px;letter-spacing:6px;color:rgba(200,168,75,.5);margin-bottom:4px}
.hdr-title{font-size:clamp(14px,3vw,18px);letter-spacing:4px;color:#c8a84b;margin-bottom:4px}
.hdr-sub{font:11px "Courier New";color:#5a4a2a;letter-spacing:2px}
#msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;max-width:760px;width:100%;margin:0 auto}
.msg{display:flex;gap:12px;align-items:flex-start}
.msg-bot{justify-content:flex-start}.msg-user{justify-content:flex-end}
.avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid rgba(200,168,75,.3);background:#0a0808}
.bubble{max-width:80%;padding:12px 16px;border-radius:2px;font:13px "Courier New";line-height:1.8;letter-spacing:.5px}
.bubble-bot{background:rgba(200,168,75,.07);border:1px solid rgba(200,168,75,.2);color:#c8b88a;border-left:3px solid #c8a84b}
.bubble-user{background:rgba(43,75,140,.15);border:1px solid rgba(43,75,140,.3);color:#a0b8e0;text-align:right}
.typing{display:inline-flex;gap:4px;align-items:center;padding:4px 0}.typing span{width:5px;height:5px;background:#a08040;border-radius:50%;animation:typ 1.2s infinite}.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes typ{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
#input-area{padding:12px 20px 20px;border-top:1px solid rgba(200,168,75,.2);max-width:760px;width:100%;margin:0 auto;flex-shrink:0}
.suggestion-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.sg{padding:4px 10px;border:1px solid rgba(200,168,75,.3);color:#a08040;font:11px "Courier New";cursor:pointer;transition:.3s;background:transparent;letter-spacing:1px}
.sg:hover{background:rgba(200,168,75,.1);border-color:#c8a84b}
.inp-row{display:flex;gap:8px}
#msg-inp{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(200,168,75,.3);color:#e8d5a3;padding:10px 14px;font:13px "Courier New";outline:none;letter-spacing:.5px}
#msg-inp:focus{border-color:#c8a84b}
#send-btn{padding:10px 20px;border:1px solid #c8a84b;color:#c8a84b;background:transparent;font:13px "Courier New";cursor:pointer;transition:.3s;letter-spacing:2px;white-space:nowrap}
#send-btn:hover{background:#c8a84b;color:#050505}
</style></head><body>
<a href="../index.html" class="bk">← BACK</a>
<div id="hdr">
  <div class="hdr-hanja">朝鮮王朝實錄</div>
  <div class="hdr-title">사관 LLM · COURT HISTORIAN AI</div>
  <div class="hdr-sub">조선 시대 사관(史官)에게 국가유산에 대해 물어보세요</div>
</div>
<div id="msgs"></div>
<div id="input-area">
  <div class="suggestion-row" id="sug-row"></div>
  <div class="inp-row">
    <input id="msg-inp" placeholder="질문을 입력하세요 (예: 경복궁이란 무엇인가요?)" autocomplete="off"/>
    <button id="send-btn">전송 ›</button>
  </div>
</div>
<script>
const DEMO=[
  {k:["경복궁","법궁","궁궐","창건"],a:"경복궁(景福宮)은 조선 태조 4년(1395년)에 창건된 법궁이옵니다. '큰 복을 누리소서'라는 뜻을 담아 정도전이 이름 지었으며, 임진왜란(1592년)으로 소실되었다가 고종 4년(1867년) 흥선대원군의 주도로 중건되었나이다. 근정전(勤政殿)은 왕의 즉위식과 외국 사절 접견이 이루어진 정전(正殿)으로, 경회루·향원정과 함께 조선 건축의 정수를 보여줍니다."},
  {k:["이순신","임진왜란","거북선","장군"],a:"이순신(李舜臣, 1545~1598)은 조선 선조 때 삼도수군통제사를 지낸 불세출의 명장이옵니다. 임진왜란 당시 한산도 대첩·명량 대첩 등에서 왜군을 격파하였으며, 특히 명량 대첩에서는 단 12척으로 133척의 적선을 물리쳤습니다. 거북선을 창제하여 왜군의 보급로를 차단하였으나, 노량 해전(1598)에서 순국하셨나이다."},
  {k:["세종","세종대왕","훈민정음"],a:"세종대왕(世宗大王, 1397~1450)은 조선 제4대 왕으로, 재위 기간(1418~1450) 조선의 황금기를 이끄셨나이다. 1443년 훈민정음(訓民正音)을 창제하여 우리 민족 고유의 문자를 마련하셨으며, 집현전을 두어 학문을 장려하셨습니다. 또한 측우기·혼천의·앙부일구 등 과학 기기 제작을 지원하고 칠정산으로 독자적 역법을 수립하셨나이다."},
  {k:["한글","훈민정음","문자"],a:"한글은 세종대왕이 1443년에 창제하여 1446년에 반포한 우리 고유의 문자이옵니다. 본래 이름은 훈민정음(訓民正音), 즉 '백성을 가르치는 바른 소리'입니다. 자음 14자·모음 10자(원래 28자)로 구성된 과학적 문자 체계로, 누구나 쉽게 배울 수 있도록 설계되었나이다. 1997년 유네스코 세계기록유산에 등재되었습니다."},
  {k:["조선","왕조","역사"],a:"조선(朝鮮, 1392~1910)은 태조 이성계가 고려를 멸하고 세운 왕조로, 518년간 27명의 왕이 재위한 우리 역사상 가장 장기간의 왕조이옵니다. 유교를 통치 이념으로 삼아 학문과 예를 중시하였으며, 한글 창제·임진왜란 극복·실학 발달 등 수많은 역사적 사건이 이 시기에 일어났습니다."},
  {k:["단청","채색","건축"],a:"단청(丹靑)은 청색·적색·황색·흑색·백색의 오방색(五方色)으로 건축물을 채색하는 전통 기법이옵니다. 궁궐·사찰·서원 등 목조 건축물에 적용되며, 단순한 장식을 넘어 목재 보호와 건물의 위엄을 나타내는 역할을 합니다. 오방색은 각각 방위를 상징하는데, 청(동)·백(서)·적(남)·흑(북)·황(중앙)이옵니다."},
  {k:["석굴암","불국사","신라"],a:"석굴암(石窟庵)은 통일신라 경덕왕 10년(751) 재상 김대성이 창건한 석굴 사원이옵니다. 경주 토함산 중턱에 자리하며, 화강암으로 인공 석굴을 조성하고 본존불 석가모니 좌상을 봉안하였습니다. 불국사와 함께 1995년 유네스코 세계문화유산에 등재되었나이다."},
  {k:["고려청자","도자기","청자"],a:"고려청자(高麗靑磁)는 고려 시대(918~1392)에 제작된 청록색 도자기로, 세계 도자 역사의 걸작이옵니다. 12세기에 절정에 달한 상감청자는 태토에 무늬를 새기고 다른 색 흙을 채워 구워내는 독창적 기법으로, 중국 송나라에서도 '천하제일'로 칭송받았습니다."},
  {k:["판소리","소리","공연"],a:"판소리는 소리꾼 한 명이 고수(鼓手)의 북 장단에 맞추어 노래·말·몸짓으로 서사적 이야기를 표현하는 전통 공연 예술이옵니다. 춘향가·심청가·흥부가·수궁가·적벽가의 다섯 마당이 전해지며, 2003년 유네스코 인류무형문화유산으로 등재되었나이다."},
  {k:["종묘","제례","왕실"],a:"종묘(宗廟)는 조선 역대 왕과 왕비의 신주(神主)를 모시고 제사를 지내는 왕실 사당이옵니다. 1395년 태조가 창건하였으며, 정전(正殿)에는 49위의 신주가 모셔져 있습니다. 종묘제례악은 2001년 유네스코 인류무형문화유산에 등재되었고, 종묘는 1995년 세계유산에 등재되었나이다."},
  {k:["수원화성","화성","정조"],a:"수원화성(水原華城)은 정조 임금이 1794~1796년에 축조한 성곽으로, 정약용이 거중기 등 신기술을 활용해 설계하였나이다. 총 길이 5.74km로 동서양 성곽 기술을 통합한 과학적 성곽으로 평가받으며, 화성성역의궤(華城城役儀軌) 덕분에 정확한 복원이 가능하였습니다. 1997년 유네스코 세계유산에 등재되었나이다."},
  {k:["창덕궁","후원","비원"],a:"창덕궁(昌德宮)은 조선 태종 5년(1405) 경복궁의 이궁(離宮)으로 건립되었나이다. 임진왜란 이후 실질적인 법궁 역할을 하였으며, 북부의 후원(後苑, 비원)은 자연 지형을 최대한 살린 조선 최고의 정원으로 손꼽힙니다. 1997년 유네스코 세계유산에 등재되었나이다."},
];
const SUGGESTIONS=["경복궁이란?","이순신 장군은?","세종대왕의 업적","한글 창제 이야기","단청이란 무엇인가?","조선 왕조 역사","고려청자 설명","판소리가 무엇인가요?"];
const API_URL="/api/sillok";

const msgsEl=document.getElementById("msgs");
const inpEl=document.getElementById("msg-inp");
const sendBtn=document.getElementById("send-btn");

function addMsg(role,text){
  const div=document.createElement("div");
  div.className="msg msg-"+(role==="bot"?"bot":"user");
  const av=document.createElement("div");av.className="avatar";
  av.textContent=role==="bot"?"史":"👤";
  const bub=document.createElement("div");
  bub.className="bubble bubble-"+(role==="bot"?"bot":"user");
  bub.textContent=text;
  if(role==="bot")div.append(av,bub);else div.append(bub,av);
  msgsEl.appendChild(div);
  msgsEl.scrollTop=msgsEl.scrollHeight;
  return div;
}

function addTyping(){
  const div=document.createElement("div");div.className="msg msg-bot";div.id="typing-msg";
  const av=document.createElement("div");av.className="avatar";av.textContent="史";
  const bub=document.createElement("div");bub.className="bubble bubble-bot";
  bub.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  div.append(av,bub);msgsEl.appendChild(div);msgsEl.scrollTop=msgsEl.scrollHeight;
}
function removeTyping(){const t=document.getElementById("typing-msg");if(t)t.remove();}

function demoAnswer(q){
  const lq=q.toLowerCase();
  for(const d of DEMO){if(d.k.some(k=>lq.includes(k.toLowerCase())))return d.a;}
  return "소신은 그에 대한 기록을 찾지 못하였나이다. 경복궁·이순신·세종대왕·한글·단청·석굴암·고려청자·판소리·종묘·수원화성·창덕궁 등 국가유산에 대해 물어보시면 말씀드릴 수 있사옵니다.";
}

async function send(){
  const q=inpEl.value.trim();if(!q)return;
  inpEl.value="";
  addMsg("user",q);
  addTyping();
  sendBtn.disabled=true;
  await new Promise(r=>setTimeout(r,900+Math.random()*600));
  removeTyping();
  let ans;
  try{
    const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:q}),signal:AbortSignal.timeout(8000)});
    if(res.ok){const d=await res.json();ans=d.response||d.content||demoAnswer(q);}
    else ans=demoAnswer(q);
  }catch{ans=demoAnswer(q);}
  addMsg("bot",ans);
  sendBtn.disabled=false;
  inpEl.focus();
}

sendBtn.onclick=send;
inpEl.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};

// Suggestions
const sugRow=document.getElementById("sug-row");
SUGGESTIONS.forEach(s=>{const b=document.createElement("button");b.className="sg";b.textContent=s;b.onclick=()=>{inpEl.value=s;send();};sugRow.appendChild(b);});

// Welcome message
addMsg("bot","소신은 조선왕조실록을 기록하는 사관(史官)이옵니다. 국가유산과 우리 역사에 대해 무엇이든 물어보시옵소서. 하단의 제안 질문을 누르시거나 직접 입력하시면 되나이다.");
</script></body></html>
