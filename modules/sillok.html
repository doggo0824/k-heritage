<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사관 LLM</title>
    <style>
        body { background-color: #f4eadd; font-family: "Batang", serif; padding: 20px; }
        #chat-box { width: 80%; height: 500px; border: 2px solid #5a3e2b; margin: 0 auto; padding: 20px; overflow-y: scroll; background-image: url('../assets/images/hanji-bg.png'); }
        .log-entry { margin-bottom: 20px; line-height: 1.8; font-size: 18px; }
        .user-input { color: #222; font-weight: bold; }
        .sagan-output { color: #4a2e1b; }
        #input-container { width: 80%; margin: 20px auto; display: flex; }
        #user-text { flex-grow: 1; padding: 15px; font-size: 16px; border: 1px solid #5a3e2b; }
        #send-btn { padding: 15px 30px; background-color: #5a3e2b; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-box"></div>
    <div id="input-container">
        <input type="text" id="user-text" placeholder="사관에게 하문하실 내용을 적으시옵소서..." />
        <button id="send-btn">기록하라</button>
    </div>
    <script>
        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('user-text').value;
            if (!input) return;
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div class="log-entry user-input">왕이 이르기를: ${input}</div>`;
            document.getElementById('user-text').value = '';

            const response = await fetch('/api/sillok', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: input })
            });
            const data = await response.json();
            chatBox.innerHTML += `<div class="log-entry sagan-output">사신은 논한다: ${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
