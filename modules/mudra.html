<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>색즉시OO즉시색 · 수인</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@300;400&display=swap');
:root{--gold:#c9a84c;--ink:#0f0c07;--paper:#f5efe0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ink);color:var(--paper);font-family:'Noto Sans KR',sans-serif;height:100vh;display:flex;overflow:hidden}
#left{flex:1;position:relative;background:#000;min-width:0}
#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#hc{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none}
#no-cam{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:5}
#no-cam p{color:rgba(0,255,65,.5);font-family:'Courier New',monospace;font-size:12px;letter-spacing:.15em;text-align:center;margin-bottom:16px}
.start-cam{border:1px solid rgba(0,255,65,.4);background:none;color:rgba(0,255,65,.8);padding:9px 28px;font-family:'Courier New',monospace;font-size:12px;letter-spacing:.15em;cursor:pointer;transition:all .2s}
.start-cam:hover{background:rgba(0,255,65,.1)}
#status-bar{position:absolute;bottom:10px;left:10px;font-size:10px;color:rgba(0,255,65,.45);font-family:'Courier New',monospace;letter-spacing:.1em;z-index:6}
/* gesture overlay */
#gesture-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:6;transition:opacity .3s;opacity:0}
#gesture-badge.show{opacity:2}
.gb-emoji{font-size:60px;display:block;filter:drop-shadow(0 0 20px rgba(201,168,76,.8))}
.gb-name{font-family:'Noto Serif KR',serif;font-size:18px;color:#c9a84c;text-shadow:0 0 20px rgba(201,168,76,.8);margin-top:6px;display:block}
/* Right panel */
#right{width:340px;flex-shrink:0;background:rgba(4,2,0,.97);border-left:1px solid rgba(201,168,76,.15);display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:16px 18px 12px;border-bottom:1px solid rgba(201,168,76,.12);flex-shrink:0}
.pt{font-family:'Noto Serif KR',serif;font-size:18px;color:var(--gold);letter-spacing:.15em}
.ps{font-size:10px;color:rgba(245,239,224,.3);letter-spacing:.25em;font-family:'Courier New',monospace;margin-top:3px}
/* Detect box */
#det-box{margin:14px;border:1px solid rgba(201,168,76,.25);padding:14px;background:rgba(12,8,2,.7);transition:all .4s;flex-shrink:0}
#det-box.lit{border-color:var(--gold);box-shadow:0 0 18px rgba(201,168,76,.2)}
#det-nm{font-family:'Noto Serif KR',serif;font-size:26px;color:var(--gold);line-height:1.1}
#det-en{font-size:11px;color:rgba(245,239,224,.4);letter-spacing:.15em;font-family:'Courier New',monospace;margin-top:4px}
#det-meaning{font-size:12px;color:rgba(245,239,224,.55);margin-top:6px}
.conf-bar{height:3px;background:rgba(255,255,255,.08);margin-top:10px;border-radius:2px;overflow:hidden}
.conf-fill{height:100%;background:var(--gold);border-radius:2px;width:0%;transition:width .4s}
/* Description */
#desc{margin:0 14px;padding:12px;background:rgba(8,5,1,.7);border:1px solid rgba(201,168,76,.1);font-size:12px;line-height:1.75;color:rgba(245,239,224,.65);flex-shrink:0;min-height:80px}
#desc h4{font-family:'Noto Serif KR',serif;color:var(--gold);font-size:13px;margin-bottom:7px}
/* Gallery */
.gal-label{margin:12px 14px 7px;font-size:9px;color:rgba(245,239,224,.28);letter-spacing:.2em;font-family:'Courier New',monospace}
#gal{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:0 14px;overflow-y:auto;padding-bottom:10px}
.gi{padding:9px 7px;border:1px solid rgba(201,168,76,.15);background:rgba(10,7,2,.6);cursor:pointer;text-align:center;transition:all .2s}
.gi:hover,.gi.on{border-color:var(--gold);background:rgba(201,168,76,.08)}
.gi-e{font-size:22px;display:block;margin-bottom:3px}
.gi-n{font-family:'Noto Serif KR',serif;font-size:11px;color:var(--gold)}
.gi-m{font-size:9px;color:rgba(245,239,224,.3);margin-top:2px;font-family:'Courier New',monospace}
</style>
</head>
<body>
<div id="left">
  <video id="vid" autoplay muted playsinline></video>
  <canvas id="hc"></canvas>
  <div id="gesture-badge"><span class="gb-emoji" id="gb-e"></span><span class="gb-name" id="gb-n"></span></div>
  <div id="no-cam">
    <p>웹캠으로 손의 형태를 인식합니다<br>카메라 권한을 허용해 주세요</p>
    <button class="start-cam" onclick="initCam()">웹캠 시작</button>
  </div>
  <div id="status-bar">READY</div>
</div>
<div id="right">
  <div class="panel-header">
    <div class="pt">색즉시OO즉시색</div>
    <div class="ps">MUDRA · 手印 RECOGNITION</div>
  </div>
  <div id="det-box">
    <div id="det-nm">--</div>
    <div id="det-en">손을 카메라에 보여주세요</div>
    <div id="det-meaning"></div>
    <div class="conf-bar"><div class="conf-fill" id="cf"></div></div>
  </div>
  <div id="desc"><h4>수인(手印)이란?</h4>불교와 한국 전통 신앙에서 손의 형태로 의미를 담은 상징적 제스처입니다. 손 모양을 보여주시면 가장 유사한 수인을 인식하고 의미를 알려드립니다.</div>
  <div class="gal-label">// 수인 도감 //</div>
  <div id="gal"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script>
const MUDRAS=[
  {id:'abhaya',name:'시무외인',en:'ABHAYA MUDRA',emoji:'🤚',meaning:'보호·안심',desc:'손바닥을 앞으로 펼쳐 올린 수인으로, 중생에게 두려움을 없애고 안심을 베푼다는 의미입니다. 석가모니불과 관음보살에서 자주 볼 수 있습니다.',gesture:'open_palm'},
  {id:'varada',name:'여원인',en:'VARADA MUDRA',emoji:'🖐',meaning:'자비·베풂',desc:'손바닥을 앞으로 하여 아래를 향한 수인입니다. 소원을 들어주고 자비를 베푼다는 의미로, 보살상에서 많이 나타납니다.',gesture:'palm_down'},
  {id:'bhumisparsha',name:'지심촉지인',en:'BHUMISPARSHA',emoji:'👇',meaning:'깨달음·증지',desc:'오른손 손가락을 아래로 뻗어 땅을 가리키는 수인입니다. 석가모니가 성도(成道)의 순간 대지를 증인으로 삼은 행위에서 유래합니다.',gesture:'index_down'},
  {id:'dhyana',name:'선정인',en:'DHYANA MUDRA',emoji:'🙌',meaning:'명상·선정',desc:'두 손을 무릎 위에 겹쳐 놓고 엄지손가락을 맞댄 수인입니다. 깊은 선정(禪定)의 상태, 명상을 상징합니다.',gesture:'both_lap'},
  {id:'anjali',name:'합장인',en:'ANJALI MUDRA',emoji:'🙏',meaning:'기원·경배',desc:'두 손을 가슴 앞에 모아 합장하는 형태입니다. 경배와 기원을 나타내며 한국 불교 예배의 기본 자세입니다.',gesture:'both_palms'},
  {id:'vajra',name:'금강권인',en:'VAJRA FIST',emoji:'✊',meaning:'굳건함·금강',desc:'손을 굳게 쥔 수인으로, 금강(金剛) 즉 다이아몬드처럼 견고한 깨달음을 상징합니다. 밀교 수행에서 많이 사용됩니다.',gesture:'fist'},
  {id:'vitarka',name:'설법인',en:'VITARKA MUDRA',emoji:'☝️',meaning:'설법·교화',desc:'검지를 세우고 나머지 손가락은 구부린 수인입니다. 부처가 법을 설하는 모습을 나타내며 교화와 가르침을 상징합니다.',gesture:'index_up'},
  {id:'bodhyagri',name:'지권인',en:'BODHYAGRI MUDRA',emoji:'🤜',meaning:'지혜·자비 결합',desc:'왼손 검지를 오른손으로 감싸 쥐는 수인입니다. 비로자나불의 수인으로, 불계(佛界)와 중생계의 합일을 상징합니다.',gesture:'index_wrap'},
];

const vid=document.getElementById('vid');
const hc=document.getElementById('hc');
const hx=hc.getContext('2d');
let lastGesture=null,holdFrames=0,camReady=false;

function resHC(){hc.width=hc.offsetWidth;hc.height=hc.offsetHeight;}
window.addEventListener('resize',resHC);resHC();

// Gallery
const gal=document.getElementById('gal');
MUDRAS.forEach(m=>{
  const el=document.createElement('div');el.className='gi';el.id='gi-'+m.id;
  el.innerHTML=`<span class="gi-e">${m.emoji}</span><div class="gi-n">${m.name}</div><div class="gi-m">${m.meaning}</div>`;
  el.onclick=()=>showMudra(m,92);
  gal.appendChild(el);
});

function showMudra(m,conf){
  document.getElementById('det-nm').textContent=m.name;
  document.getElementById('det-en').textContent=m.en;
  document.getElementById('det-meaning').textContent=m.meaning;
  document.getElementById('cf').style.width=conf+'%';
  document.getElementById('det-box').classList.add('lit');
  document.getElementById('desc').innerHTML=`<h4>${m.name} (${m.en})</h4>${m.desc}`;
  document.querySelectorAll('.gi').forEach(el=>el.classList.remove('on'));
  document.getElementById('gi-'+m.id)?.classList.add('on');
  // Badge
  document.getElementById('gb-e').textContent=m.emoji;
  document.getElementById('gb-n').textContent=m.name;
  const badge=document.getElementById('gesture-badge');
  badge.classList.add('show');
  clearTimeout(badge._t);badge._t=setTimeout(()=>badge.classList.remove('show'),1800);
}

// Gesture detection from landmarks
function detectGesture(lm){
  const ext=[];
  // Thumb: compare x
  ext.push(lm[4].x<lm[3].x);
  // Fingers 2-5: tip y < pip y means extended
  [[8,6],[12,10],[16,14],[20,18]].forEach(([tip,pip])=>ext.push(lm[tip].y<lm[pip].y));
  const openCount=ext.filter(Boolean).length;
  const allOpen=openCount>=4;
  const allClosed=openCount<=1&&!ext[1];
  const indexOnly=ext[1]&&!ext[2]&&!ext[3]&&!ext[4];
  const indexDown=lm[8].y>lm[6].y&&openCount<2;
  const palmUp=allOpen&&lm[9].y<lm[0].y;
  const palmDown=allOpen&&lm[9].y>lm[0].y;

  if(allClosed) return {id:'vajra',score:.88};
  if(allOpen&&palmUp) return {id:'abhaya',score:.90};
  if(allOpen&&!palmUp) return {id:'varada',score:.85};
  if(indexOnly&&lm[8].y>lm[6].y) return {id:'bhumisparsha',score:.82};
  if(indexOnly&&lm[8].y<lm[6].y) return {id:'vitarka',score:.80};
  if(ext[1]&&ext[2]&&!ext[3]&&!ext[4]) return {id:'bodhyagri',score:.75};
  return {id:'anjali',score:.65};
}

async function initCam(){
  document.getElementById('no-cam').style.display='none';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'},audio:false});
    vid.srcObject=stream;await vid.play();camReady=true;
    document.getElementById('status-bar').textContent='CAM ACTIVE · MEDIAPIPE LOADING...';
    if(typeof Hands==='undefined'){document.getElementById('status-bar').textContent='CAM ACTIVE (MediaPipe CDN 오류)';return;}
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:.72,minTrackingConfidence:.55});
    hands.onResults(res=>{
      hx.clearRect(0,0,hc.width,hc.height);
      if(!res.multiHandLandmarks?.length){lastGesture=null;holdFrames=0;return;}
      const lm=res.multiHandLandmarks[0];
      // Mirror draw
      hx.save();hx.translate(hc.width,0);hx.scale(-1,1);
      if(typeof drawConnectors!=='undefined'){
        drawConnectors(hx,lm,HAND_CONNECTIONS,{color:'rgba(201,168,76,.5)',lineWidth:2});
        drawLandmarks(hx,lm,{color:'rgba(201,168,76,.9)',lineWidth:1,radius:3});
      }
      hx.restore();
      const g=detectGesture(lm);
      if(g.id===lastGesture){
        holdFrames++;
        if(holdFrames===18){
          const m=MUDRAS.find(m=>m.id===g.id);
          if(m)showMudra(m,Math.round(g.score*100));
        }
      } else {lastGesture=g.id;holdFrames=0;}
      document.getElementById('status-bar').textContent=`GESTURE: ${g.id.toUpperCase()} · ${Math.round(g.score*100)}%`;
    });
    const cam=new Camera(vid,{onFrame:async()=>{await hands.send({image:vid});},width:640,height:480});
    cam.start();
    document.getElementById('status-bar').textContent='TRACKING ACTIVE';
  }catch(e){
    document.getElementById('no-cam').style.display='flex';
    document.getElementById('status-bar').textContent='CAM DENIED';
  }
}
initCam();
</script>
</body>
</html>
