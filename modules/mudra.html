<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>색즉시OO즉시색 · 수인 인식</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@300;400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0705; color:#f5efe0; font-family:'Noto Sans KR',sans-serif; height:100vh; display:flex; overflow:hidden; }
  #left { width:55%; position:relative; }
  #webcam-v { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
  #hand-canvas { position:absolute; inset:0; width:100%; height:100%; transform:scaleX(-1); }
  #right { width:45%; padding:32px 28px; overflow-y:auto; border-left:1px solid rgba(201,168,76,0.15); background:rgba(5,3,1,0.95); }
  .mudra-title { font-family:'Noto Serif KR',serif; font-size:22px; font-weight:900; color:#c9a84c; letter-spacing:0.15em; margin-bottom:4px; }
  .mudra-sub { font-size:11px; color:rgba(245,239,224,0.3); letter-spacing:0.25em; margin-bottom:24px; font-family:'Courier New',monospace; }
  .detected-box { border:1px solid rgba(201,168,76,0.3); padding:16px; background:rgba(20,14,6,0.6); margin-bottom:20px; min-height:80px; transition:all 0.3s; }
  .detected-box.glow { border-color:#c9a84c; box-shadow:0 0 20px rgba(201,168,76,0.2); }
  .detected-name { font-family:'Noto Serif KR',serif; font-size:28px; font-weight:900; color:#c9a84c; }
  .detected-en { font-size:12px; color:rgba(245,239,224,0.4); letter-spacing:0.15em; font-family:'Courier New',monospace; margin-top:4px; }
  .confidence-bar { height:3px; background:rgba(255,255,255,0.1); margin-top:10px; border-radius:2px; }
  .confidence-fill { height:100%; background:#c9a84c; border-radius:2px; transition:width 0.3s; }
  .desc-box { background:rgba(15,10,5,0.6); border:1px solid rgba(201,168,76,0.1); padding:14px; font-size:13px; line-height:1.7; color:rgba(245,239,224,0.7); margin-bottom:16px; }
  .desc-box h4 { font-family:'Noto Serif KR',serif; color:#c9a84c; font-size:14px; margin-bottom:8px; }
  .mudra-gallery { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .mudra-item { padding:10px 8px; border:1px solid rgba(201,168,76,0.15); background:rgba(15,10,5,0.5); cursor:pointer; text-align:center; transition:all 0.2s; }
  .mudra-item:hover, .mudra-item.active { border-color:#c9a84c; background:rgba(201,168,76,0.08); }
  .mudra-emoji { font-size:24px; display:block; margin-bottom:4px; }
  .mudra-nm { font-family:'Noto Serif KR',serif; font-size:12px; color:#c9a84c; }
  .mudra-hint { font-size:10px; color:rgba(245,239,224,0.3); margin-top:2px; font-family:'Courier New',monospace; }
  #status-bar { position:absolute; bottom:10px; left:10px; font-size:10px; color:rgba(0,255,65,0.5); font-family:'Courier New',monospace; letter-spacing:0.1em; }
  .section-label { font-size:10px; color:rgba(245,239,224,0.3); letter-spacing:0.2em; font-family:'Courier New',monospace; margin-bottom:10px; }
</style>
</head>
<body>
<div id="left">
  <video id="webcam-v" autoplay muted playsinline></video>
  <canvas id="hand-canvas"></canvas>
  <div id="status-bar">MEDIAPIPE HANDS · READY</div>
</div>
<div id="right">
  <div class="mudra-title">색즉시OO즉시색</div>
  <div class="mudra-sub">MUDRA · 手印 RECOGNITION</div>
  <div class="detected-box" id="detect-box">
    <div class="detected-name" id="mudra-name">--</div>
    <div class="detected-en" id="mudra-en">손을 카메라에 보여주세요</div>
    <div class="confidence-bar"><div class="confidence-fill" id="conf-fill" style="width:0%"></div></div>
  </div>
  <div class="desc-box" id="desc-box">
    <h4>수인(手印)이란?</h4>
    불교와 한국 전통 신앙에서 손의 형태로 의미를 나타내는 상징적 제스처입니다. 
    손을 카메라에 보여주시면 가장 유사한 수인을 인식하고 그 의미를 설명해드립니다.
  </div>
  <div class="section-label">// 수인 도감 //</div>
  <div class="mudra-gallery" id="mudra-gallery"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script>
const MUDRAS = [
  { id:'jiseumchok', name:'지심촉지인', en:'BHUMISPARSHA', emoji:'☝️', desc:'땅을 가리키는 손 모양으로, 석가모니가 성도(成道)의 순간 대지를 증인으로 삼은 수인입니다. 오른손 손가락을 아래로 뻗어 땅을 가리킵니다.', gesture:'index_down', meaning:'깨달음 · 증지' },
  { id:'sisemuoe', name:'시무외인', en:'ABHAYA', emoji:'🤚', desc:'두려움을 없애주는 수인으로, 손바닥을 앞으로 향하여 펼친 형태입니다. 중생에게 안심을 주고 두려움을 없애준다는 의미를 담고 있습니다.', gesture:'open_palm', meaning:'보호 · 안심' },
  { id:'yeowon', name:'여원인', en:'VARADA', emoji:'🖐️', desc:'소원을 들어주는 수인으로, 손바닥을 앞으로 하여 아래를 향합니다. 중생의 원을 들어주고 베푼다는 자비의 의미입니다.', gesture:'palm_down', meaning:'자비 · 베풂' },
  { id:'hapjang', name:'합장인', en:'ANJALI', emoji:'🙏', desc:'두 손을 모아 합장하는 형태로, 경배와 기원을 나타냅니다. 한국 불교 예배의 기본 자세입니다.', gesture:'both_palms', meaning:'기원 · 경배' },
  { id:'geumgang', name:'금강권인', en:'VAJRA FIST', emoji:'✊', desc:'손을 굳게 쥔 형태로, 금강(金剛) 즉 다이아몬드처럼 견고한 깨달음을 상징합니다.', gesture:'fist', meaning:'굳건함 · 금강' },
  { id:'jijwan', name:'지권인', en:'BODHYAGRI', emoji:'🤜', desc:'왼손 검지를 오른손으로 감싸 쥐는 형태입니다. 비로자나불의 수인으로, 지혜와 자비의 결합을 의미합니다.', gesture:'index_wrap', meaning:'지혜 · 자비 결합' },
];

const canvas = document.getElementById('hand-canvas');
const drawCtx = canvas.getContext('2d');

function resizeCanvas() {
  const left = document.getElementById('left');
  canvas.width = left.offsetWidth;
  canvas.height = left.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Gallery
const gallery = document.getElementById('mudra-gallery');
MUDRAS.forEach(m => {
  const item = document.createElement('div');
  item.className = 'mudra-item';
  item.innerHTML = `<span class="mudra-emoji">${m.emoji}</span><div class="mudra-nm">${m.name}</div><div class="mudra-hint">${m.meaning}</div>`;
  item.onclick = () => showMudra(m, 95);
  gallery.appendChild(item);
});

function showMudra(mudra, confidence) {
  document.getElementById('mudra-name').textContent = mudra.name;
  document.getElementById('mudra-en').textContent = mudra.en + ' · ' + mudra.meaning;
  document.getElementById('conf-fill').style.width = confidence + '%';
  document.getElementById('detect-box').classList.add('glow');
  document.getElementById('desc-box').innerHTML = `<h4>${mudra.name} (${mudra.en})</h4>${mudra.desc}<br><br><small style="color:rgba(245,239,224,0.4);font-size:11px">의미: ${mudra.meaning}</small>`;
  document.querySelectorAll('.mudra-item').forEach((el,i) => el.classList.toggle('active', MUDRAS[i].id === mudra.id));
}

// Simple gesture detection from MediaPipe landmarks
function detectGesture(lm) {
  const tips = [4,8,12,16,20];
  const mids = [3,6,10,14,18];
  const bases = [2,5,9,13,17];
  const extended = tips.map((t,i) => {
    if (i === 0) return lm[t].x < lm[mids[i]].x;
    return lm[t].y < lm[mids[i]].y;
  });

  const allOpen = extended.filter(Boolean).length >= 4;
  const allClosed = extended.filter(Boolean).length <= 1;
  const indexOnly = extended[1] && !extended[2] && !extended[3] && !extended[4];
  const indexDown = lm[8].y > lm[6].y && !extended[2] && !extended[3];
  const palmDown = lm[9].y > 0.5 && allOpen;

  if (allClosed) return { id:'geumgang', score:0.88 };
  if (indexOnly && lm[8].y > lm[6].y) return { id:'jiseumchok', score:0.82 };
  if (allOpen) return { id:'sisemuoe', score:0.90 };
  if (indexOnly) return { id:'jijwan', score:0.78 };
  return { id:'yeowon', score:0.70 };
}

let lastGesture = null, gestureHoldFrames = 0;

async function initWebcam() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{width:640,height:480,facingMode:'user'}, audio:false });
    const video = document.getElementById('webcam-v');
    video.srcObject = stream;
    await video.play();

    if (typeof Hands === 'undefined') return;
    const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.7, minTrackingConfidence:0.5 });
    hands.onResults(results => {
      drawCtx.clearRect(0, 0, canvas.width, canvas.height);
      if (!results.multiHandLandmarks?.length) { lastGesture = null; gestureHoldFrames = 0; return; }
      const lm = results.multiHandLandmarks[0];
      const conn = results.multiHandConnections || HAND_CONNECTIONS;
      drawConnectors(drawCtx, lm, HAND_CONNECTIONS, { color:'rgba(201,168,76,0.5)', lineWidth:2 });
      drawLandmarks(drawCtx, lm, { color:'rgba(201,168,76,0.9)', lineWidth:1, radius:4 });

      const gesture = detectGesture(lm);
      if (gesture.id === lastGesture) {
        gestureHoldFrames++;
        if (gestureHoldFrames === 15) {
          const mudra = MUDRAS.find(m => m.id === gesture.id);
          if (mudra) showMudra(mudra, Math.round(gesture.score * 100));
        }
      } else {
        lastGesture = gesture.id;
        gestureHoldFrames = 0;
      }
      document.getElementById('status-bar').textContent = `HANDS:1 · GESTURE:${gesture.id} · CONF:${Math.round(gesture.score*100)}%`;
    });

    const cam = new Camera(video, { onFrame: async () => { await hands.send({ image: video }); }, width:640, height:480 });
    cam.start();
  } catch(e) {
    document.getElementById('status-bar').textContent = 'WEBCAM UNAVAILABLE';
  }
}
initWebcam();
</script>
</body>
</html>
