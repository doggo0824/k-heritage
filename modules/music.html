<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>전통악기 박스</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');
:root{--gold:#c9a84c;--gold2:#e8c96a;--ink:#06040200;--paper:#f5efe0;--red:#a03020;--grn:#2d5e2a;--blu:#1e3a6e;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#060402;color:var(--paper);font-family:'Noto Sans KR',sans-serif;user-select:none;}
.topbar{height:50px;background:rgba(0,0,0,.82);border-bottom:1px solid rgba(201,168,76,.18);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.logo{font-family:'Noto Serif KR',serif;font-size:13px;color:var(--gold);letter-spacing:.13em;white-space:nowrap;}
.sep{width:1px;height:18px;background:rgba(201,168,76,.18);flex-shrink:0;}
label.lbl{font-size:9px;color:rgba(245,239,224,.38);letter-spacing:.1em;white-space:nowrap;}
#bpm-sl{width:72px;accent-color:var(--gold);}
#bpm-num{font-size:12px;color:var(--gold);font-family:'Courier New',monospace;min-width:36px;text-align:center;}
.tbtn{background:none;border:1px solid rgba(201,168,76,.28);color:rgba(245,239,224,.65);padding:3px 10px;font-size:10px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.08em;transition:all .16s;white-space:nowrap;}
.tbtn:hover{background:rgba(201,168,76,.09);border-color:var(--gold);}
.tbtn.on{background:rgba(201,168,76,.17);border-color:var(--gold);color:var(--gold);}
/* layout */
.main{display:flex;height:calc(100vh - 50px);}
/* shelf */
.shelf{width:126px;flex-shrink:0;background:rgba(3,2,1,.93);border-right:1px solid rgba(201,168,76,.09);overflow-y:auto;padding:7px 6px;}
.shelf-hd{font-size:8px;color:rgba(245,239,224,.2);letter-spacing:.2em;text-align:center;margin-bottom:7px;font-family:'Courier New',monospace;}
.icard{padding:7px 5px;border:1px solid rgba(201,168,76,.14);background:rgba(12,7,2,.85);text-align:center;cursor:pointer;margin-bottom:4px;transition:all .16s;position:relative;}
.icard:hover{border-color:var(--gold);transform:translateY(-1px);background:rgba(22,14,4,.9);}
.icard.playing{border-color:var(--gold2);box-shadow:0 0 10px rgba(201,168,76,.35);}
.ie{font-size:20px;display:block;line-height:1;margin-bottom:2px;}
.in{font-family:'Noto Serif KR',serif;font-size:10px;color:var(--gold);display:block;}
.ien{font-size:7px;color:rgba(245,239,224,.24);letter-spacing:.06em;display:block;margin-top:1px;font-family:'Courier New',monospace;}
.ibadge{font-size:7px;padding:1px 4px;border-radius:1px;display:inline-block;margin-top:3px;}
.tr{background:rgba(120,28,18,.38);color:#e07060;}.tm{background:rgba(35,82,30,.38);color:#78b870;}.tb{background:rgba(24,40,100,.38);color:#6080c8;}.ta{background:rgba(88,65,14,.38);color:#c89828;}
/* sequencer */
.seq-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.stage{flex:0 0 110px;position:relative;background:#000;border-bottom:1px solid rgba(201,168,76,.09);}
#sc{width:100%;height:100%;}
.stlbl{position:absolute;top:6px;left:10px;font-size:8px;color:rgba(201,168,76,.3);letter-spacing:.2em;font-family:'Courier New',monospace;}
.ph{position:absolute;top:0;bottom:0;width:2px;background:rgba(201,168,76,.75);pointer-events:none;box-shadow:0 0 8px rgba(201,168,76,.9);}
.tw{flex:1;overflow-y:auto;padding:6px 8px;}
.track{display:grid;grid-template-columns:96px 1fr 50px 24px;align-items:center;gap:6px;margin-bottom:4px;background:rgba(8,5,2,.7);border:1px solid rgba(201,168,76,.1);padding:4px 6px;min-height:44px;transition:border-color .2s;}
.track:hover{border-color:rgba(201,168,76,.22);}
.ti{display:flex;align-items:center;gap:4px;min-width:0;}
.tiemoji{font-size:13px;flex-shrink:0;}
.tiname{font-family:'Noto Serif KR',serif;font-size:9px;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.steps{display:flex;gap:2px;}
.step{flex:1;min-width:0;height:32px;background:rgba(20,12,4,.85);border:1px solid rgba(201,168,76,.09);cursor:pointer;border-radius:1px;transition:all .06s;position:relative;}
.step.on{background:var(--gold);border-color:var(--gold2);box-shadow:0 0 5px rgba(201,168,76,.45);}
.step.act{box-shadow:0 0 18px rgba(201,168,76,1)!important;transform:scaleY(1.12);}
.step.b1{border-left:2px solid rgba(201,168,76,.3);}
.step.b2{border-left:1px solid rgba(201,168,76,.16);}
.step:hover:not(.on){background:rgba(201,168,76,.12);}
.note-dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:rgba(0,0,0,.5);display:none;}
.step.on .note-dot{display:block;background:rgba(10,6,2,.7);}
.vw input{width:46px;accent-color:var(--gold);}
.db{background:none;border:none;color:rgba(245,239,224,.16);font-size:12px;cursor:pointer;transition:color .18s;padding:2px;}
.db:hover{color:#e06050;}
.dz{border:1px dashed rgba(201,168,76,.14);background:rgba(5,3,1,.4);text-align:center;padding:10px;font-size:9px;color:rgba(245,239,224,.16);font-family:'Courier New',monospace;letter-spacing:.12em;margin-top:4px;transition:all .16s;}
.dz.ov{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.04);}
/* right panel */
.rp{width:158px;flex-shrink:0;border-left:1px solid rgba(201,168,76,.09);background:rgba(3,2,1,.96);padding:9px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;}
.rphd{font-size:8px;color:rgba(245,239,224,.2);letter-spacing:.2em;font-family:'Courier New',monospace;margin-bottom:4px;}
.fxr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.fxl{font-size:9px;color:rgba(245,239,224,.4);}
.fxv{font-size:9px;color:var(--gold);font-family:'Courier New',monospace;min-width:24px;text-align:right;}
.fxs{width:60px;accent-color:var(--gold);}
.pbtn{padding:4px 6px;font-size:9px;font-family:'Noto Serif KR',serif;color:rgba(245,239,224,.5);border:1px solid rgba(201,168,76,.16);background:none;cursor:pointer;letter-spacing:.04em;transition:all .16s;text-align:left;width:100%;margin-bottom:3px;}
.pbtn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.05);}
.pbtn.act{background:rgba(201,168,76,.13);border-color:var(--gold);color:var(--gold);}
.meter{height:50px;background:rgba(6,4,1,.85);border:1px solid rgba(201,168,76,.09);}
#mc{width:100%;height:100%;}
.tune-row{display:flex;gap:3px;flex-wrap:wrap;}
.tnbtn{background:none;border:1px solid rgba(201,168,76,.16);color:rgba(245,239,224,.45);padding:2px 5px;font-size:8px;cursor:pointer;font-family:'Courier New',monospace;transition:all .14s;}
.tnbtn.act{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold);}
.tnbtn:hover{border-color:rgba(201,168,76,.5);}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">전통악기 박스 · 傳統樂器</div><div class="sep"></div>
  <label class="lbl">BPM</label>
  <input type="range" id="bpm-sl" min="50" max="200" value="96" oninput="setBPM(+this.value)">
  <span id="bpm-num">96</span><div class="sep"></div>
  <label class="lbl">SWING</label>
  <input type="range" id="sw-sl" style="width:56px;accent-color:var(--gold)" min="0" max="0.45" step="0.01" value="0" oninput="swing=+this.value">
  <div class="sep"></div>
  <button class="tbtn" id="play-btn" onclick="togglePlay()">▶ 재생</button>
  <button class="tbtn" onclick="clearAll()">초기화</button>
  <button class="tbtn" onclick="randomize()">🎲 랜덤</button>
  <div class="sep"></div>
  <button class="tbtn" onclick="loadPreset('gutgeori')">굿거리</button>
  <button class="tbtn" onclick="loadPreset('jangdan')">자진모리</button>
  <button class="tbtn" onclick="loadPreset('semachi')">세마치</button>
  <button class="tbtn" onclick="loadPreset('hwimori')">휘모리</button>
  <button class="tbtn" onclick="loadPreset('yeongsan')">영산회상</button>
</div>
<div class="main">
  <div class="shelf" id="shelf"><div class="shelf-hd">INSTRUMENTS</div></div>
  <div class="seq-area">
    <div class="stage"><div class="stlbl">// LOOP VISUALIZER //</div><canvas id="sc"></canvas><div class="ph" id="ph"></div></div>
    <div class="tw" id="tw"><div class="dz" id="dz">악기를 드래그하거나 클릭해 트랙 추가 · DROP OR CLICK TO ADD</div></div>
  </div>
  <div class="rp">
    <div>
      <div class="rphd">// FX BUS //</div>
      <div class="fxr"><span class="fxl">REVERB</span><input type="range" class="fxs" min="0" max="1" step=".05" value=".28" oninput="setRV(+this.value)"><span class="fxv" id="rv">.28</span></div>
      <div class="fxr"><span class="fxl">DELAY</span><input type="range" class="fxs" min="0" max=".85" step=".05" value="0" oninput="setDL(+this.value)"><span class="fxv" id="dl">.00</span></div>
      <div class="fxr"><span class="fxl">LO-PASS</span><input type="range" class="fxs" min="300" max="18000" step="100" value="18000" oninput="setFT(+this.value)"><span class="fxv" id="ft">18k</span></div>
      <div class="fxr"><span class="fxl">MASTER</span><input type="range" class="fxs" min="0" max="1" step=".05" value=".82" oninput="setMV(+this.value)"><span class="fxv" id="mv">.82</span></div>
    </div>
    <div>
      <div class="rphd">// TUNING //</div>
      <div class="tune-row">
        <button class="tnbtn act" onclick="setScale('pentatonic',this)">5음계</button>
        <button class="tnbtn" onclick="setScale('heptatonic',this)">7음계</button>
        <button class="tnbtn" onclick="setScale('blues',this)">블루스</button>
      </div>
    </div>
    <div><div class="rphd">// PRESETS //</div><div id="pbtns"></div></div>
    <div><div class="rphd">// METER //</div><div class="meter"><canvas id="mc"></canvas></div></div>
    <div>
      <div class="rphd">// STEPS //</div>
      <div style="display:flex;gap:3px">
        <button class="tbtn" style="padding:2px 6px;font-size:9px" onclick="setSteps(8)">8</button>
        <button class="tbtn on" style="padding:2px 6px;font-size:9px" onclick="setSteps(16)">16</button>
        <button class="tbtn" style="padding:2px 6px;font-size:9px" onclick="setSteps(32)">32</button>
      </div>
    </div>
  </div>
</div>
<script>
/* ═══════════════════════════════════════════
   WEB AUDIO ENGINE — 전통악기 물리 모델 합성
   각 악기를 실제 음향 특성에 맞게 재현
═══════════════════════════════════════════ */
let AC,masterGain,reverbNode,delayNode,filterNode,analyser,rvGain,dlGain;
let swing=0,bpm=96,STEPS=16;
let playing=false,curStep=0;
let tracks=[];
let schTimer=null,nextTime=0,dragInst=null;
const AHEAD=0.12;

// ── 음계 시스템 ──
const SCALES={
  pentatonic:['C','D','E','G','A'],       // 5음 (궁,상,각,치,우)
  heptatonic:['C','D','E','F','G','A','B'],
  blues:['C','Eb','F','F#','G','Bb'],
};
let currentScale='pentatonic';
function setScale(s,btn){currentScale=s;document.querySelectorAll('.tnbtn').forEach(b=>b.classList.remove('act'));btn.classList.add('act');rebuildNotes();}
function rebuildNotes(){
  INSTS.forEach(ins=>{if(ins.type==='melody'||ins.type==='bass'){ins.notes=buildScaleNotes(ins.baseOct,ins.octaves);}});
  renderTracks();
}
function buildScaleNotes(baseOct,octaves){
  const sc=SCALES[currentScale];const out=[];
  for(let oc=baseOct;oc<baseOct+octaves;oc++){sc.forEach(n=>out.push(n+oc));}return out;
}

// ── AudioContext 초기화 ──
function initAC(){
  if(AC)return;
  AC=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=AC.createGain();masterGain.gain.value=0.82;
  filterNode=AC.createBiquadFilter();filterNode.type='lowpass';filterNode.frequency.value=18000;filterNode.Q.value=0.5;
  analyser=AC.createAnalyser();analyser.fftSize=512;analyser.smoothingTimeConstant=0.8;
  reverbNode=AC.createConvolver();
  delayNode=AC.createDelay(2.0);delayNode.delayTime.value=0;
  const dlFB=AC.createGain();dlFB.gain.value=0.3;
  delayNode.connect(dlFB);dlFB.connect(delayNode);
  rvGain=AC.createGain();rvGain.gain.value=0.28;
  dlGain=AC.createGain();dlGain.gain.value=0;
  const dryGain=AC.createGain();dryGain.gain.value=1;
  filterNode.connect(dryGain);
  filterNode.connect(rvGain);rvGain.connect(reverbNode);reverbNode.connect(masterGain);
  filterNode.connect(dlGain);dlGain.connect(delayNode);delayNode.connect(masterGain);
  dryGain.connect(masterGain);
  masterGain.connect(analyser);analyser.connect(AC.destination);
  buildRV(2.5);
}
function buildRV(dur){
  const sr=AC.sampleRate,len=Math.ceil(sr*dur);
  const b=AC.createBuffer(2,len,sr);
  for(let c=0;c<2;c++){
    const d=b.getChannelData(c);
    for(let i=0;i<len;i++){
      // 방 울림 시뮬레이션: 지수 감쇠 랜덤 노이즈
      const decay=Math.pow(0.001,i/len);
      d[i]=(Math.random()*2-1)*decay*(1+0.3*Math.sin(i/sr*120*Math.PI));
    }
  }
  reverbNode.buffer=b;
}
function setRV(v){document.getElementById('rv').textContent=v.toFixed(2);if(rvGain)rvGain.gain.value=v;}
function setDL(v){document.getElementById('dl').textContent=v.toFixed(2);if(dlGain)dlGain.gain.value=v*0.6;}
function setFT(v){document.getElementById('ft').textContent=v>=1000?(v/1000).toFixed(0)+'k':v;if(filterNode)filterNode.frequency.value=v;}
function setMV(v){document.getElementById('mv').textContent=v.toFixed(2);if(masterGain)masterGain.gain.value=v;}

// ── 음 → Hz 변환 ──
const NOTE_BASE={C:261.63,D:293.66,E:329.63,F:349.23,G:392.00,A:440.00,B:493.88,'Eb':311.13,'F#':369.99,'Bb':466.16};
function n2hz(note){
  if(!note)return 220;
  const m=note.match(/([A-G]b?#?)(\d)/);
  if(!m)return 220;
  const base=NOTE_BASE[m[1]]||440;
  return base*Math.pow(2,parseInt(m[2])-4);
}

// ── 유틸 함수 ──
function mkBuf(dur,fn){
  const len=Math.ceil(AC.sampleRate*dur);
  const b=AC.createBuffer(1,len,AC.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=fn(i,len,AC.sampleRate);
  return b;
}
function osc(freq,type,t,atk,dec,vol,dest){
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.value=freq;
  o.connect(g);g.connect(dest);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(vol,t+atk);
  g.gain.exponentialRampToValueAtTime(0.0001,t+atk+dec);
  o.start(t);o.stop(t+atk+dec+0.02);
  return o;
}
function noiseOut(t,dur,vol,lpHz,hpHz,dest){
  if(!AC)return;
  const len=Math.ceil(AC.sampleRate*dur);
  const b=AC.createBuffer(1,len,AC.sampleRate);
  const d=b.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5);
  const lf=AC.createBiquadFilter();lf.type='lowpass';lf.frequency.value=lpHz;
  const hf=AC.createBiquadFilter();hf.type='highpass';hf.frequency.value=hpHz||80;
  const g=AC.createGain();
  const s=AC.createBufferSource();s.buffer=b;
  s.connect(hf);hf.connect(lf);lf.connect(g);g.connect(dest);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  s.start(t);
}
function addVibratoToOsc(o,rate,depth,t,dur){
  const lfo=AC.createOscillator(),lg=AC.createGain();
  lfo.frequency.value=rate;lg.gain.value=depth;
  lfo.connect(lg);lg.connect(o.frequency);
  lfo.start(t+0.08);lfo.stop(t+dur);
}

/* ════════════════════════════════════════════
   악기별 합성 — 각각 실제 음색 특성 재현
════════════════════════════════════════════ */

// 장구 궁편 — 낮고 두탁한 북소리. 피치 다운 스윕 + 보디 공명
function janggu_gung(t,v=0.9){
  if(!AC)return;
  // 메인 몸통음: 큰 피치 스윕
  const o1=AC.createOscillator(),g1=AC.createGain();
  o1.type='sine';o1.connect(g1);g1.connect(filterNode);
  o1.frequency.setValueAtTime(140,t);
  o1.frequency.exponentialRampToValueAtTime(42,t+0.45);
  g1.gain.setValueAtTime(0.0001,t);
  g1.gain.linearRampToValueAtTime(v*1.1,t+0.003);
  g1.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
  o1.start(t);o1.stop(t+0.6);
  // 보조 배음
  const o2=AC.createOscillator(),g2=AC.createGain();
  o2.type='sine';o2.connect(g2);g2.connect(filterNode);
  o2.frequency.setValueAtTime(220,t);o2.frequency.exponentialRampToValueAtTime(65,t+0.2);
  g2.gain.setValueAtTime(v*0.45,t);g2.gain.exponentialRampToValueAtTime(0.0001,t+0.25);
  o2.start(t);o2.stop(t+0.3);
  // 타격 노이즈
  noiseOut(t,0.055,v*0.7,380,60,filterNode);
  // 공명 배음 (막 진동)
  osc(78,'sine',t,0.001,0.8,v*0.3,filterNode);
}

// 장구 채편 — 날카롭고 건조한 딱! 소리
function janggu_chae(t,v=0.85){
  if(!AC)return;
  // 타격 펄스
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='triangle';o.connect(g);g.connect(filterNode);
  o.frequency.setValueAtTime(680,t);
  o.frequency.exponentialRampToValueAtTime(240,t+0.08);
  g.gain.setValueAtTime(v*0.9,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.13);
  o.start(t);o.stop(t+0.16);
  // 날카로운 스냅
  noiseOut(t,0.03,v*1.1,5500,800,filterNode);
  // 채 울림 (가는 금속 느낌)
  osc(1400,'sine',t,0.0005,0.06,v*0.15,filterNode);
}

// 북 — 장구보다 크고 둔탁한 울림
function buk(t,v=0.9){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sine';o.connect(g);g.connect(filterNode);
  o.frequency.setValueAtTime(95,t);
  o.frequency.exponentialRampToValueAtTime(32,t+0.65);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(v*1.35,t+0.004);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.85);
  o.start(t);o.stop(t+0.9);
  osc(52,'sine',t,0.002,0.55,v*0.5,filterNode);
  noiseOut(t,0.07,v*0.9,280,50,filterNode);
}

// 꽹과리 — 쨍! 금속 타악. 비하모닉 배음 풍부
function kkwaenggwari(t,v=0.85){
  if(!AC)return;
  // 기본 금속 진동 (비하모닉)
  const freqs=[820,1420,2180,3350,4600,6200];
  const amps =[0.85,0.65,0.45,0.28,0.16,0.08];
  const decs =[0.45,0.38,0.28,0.18,0.12,0.08];
  freqs.forEach((f,i)=>{
    osc(f*(1+(Math.random()-.5)*0.006),i<3?'sawtooth':'sine',t,0.0008,decs[i],v*amps[i],filterNode);
  });
  // 타격 스파이크
  noiseOut(t,0.018,v*1.1,7000,1200,filterNode);
  // 쨍- 지속 링
  osc(1100,'sine',t,0.001,0.6,v*0.22,filterNode);
}

// 징 — 깊고 길게 울리는 큰 징
function jing(t,v=0.7){
  if(!AC)return;
  const freqs=[210,315,535,640,855,1060];
  const amps =[0.9,0.55,0.38,0.25,0.15,0.08];
  freqs.forEach((f,i)=>{
    // 각 배음마다 약간의 피치 떨림 (금속 진동)
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='sine';o.frequency.value=f*(1+(Math.random()-.5)*0.005);
    // 느린 비브라토
    const lfo=AC.createOscillator(),lg=AC.createGain();
    lfo.frequency.value=1.8+i*0.3;lg.gain.value=f*0.003;
    lfo.connect(lg);lg.connect(o.frequency);
    o.connect(g);g.connect(filterNode);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(v*amps[i],t+0.07);
    g.gain.exponentialRampToValueAtTime(0.0001,t+3.5-i*0.35);
    o.start(t);lfo.start(t);o.stop(t+4);lfo.stop(t+4);
  });
  noiseOut(t,0.04,v*0.4,1200,200,filterNode);
}

// 소고 — 작은 손북, 맑고 가벼운
function sogo(t,v=0.75){
  if(!AC)return;
  osc(350,'sine',t,0.0015,0.18,v*0.9,filterNode);
  osc(180,'sine',t,0.001,0.12,v*0.5,filterNode);
  noiseOut(t,0.025,v*0.65,2200,300,filterNode);
}

// 가야금 — Karplus-Strong 현 모델 + 한국 특유 음색
function gayageum(note,t,v=0.75){
  if(!AC)return;
  const f=n2hz(note||'A3');
  // 현 타격 노이즈 → 공명 필터 체인
  const noiseLen=Math.ceil(AC.sampleRate*0.05);
  const nb=AC.createBuffer(1,noiseLen,AC.sampleRate);
  const nd=nb.getChannelData(0);
  for(let i=0;i<noiseLen;i++)nd[i]=(Math.random()*2-1);
  const ns=AC.createBufferSource();ns.buffer=nb;
  // 딜레이 피드백으로 현 공명 시뮬
  const dly=AC.createDelay(1/f+0.01);dly.delayTime.value=1/f;
  const fbGain=AC.createGain();fbGain.gain.value=0.985; // 감쇠
  const bpf=AC.createBiquadFilter();bpf.type='lowpass';bpf.frequency.value=f*3.5;
  const outG=AC.createGain();outG.gain.value=v*0.65;
  ns.connect(dly);dly.connect(fbGain);fbGain.connect(bpf);bpf.connect(dly);
  dly.connect(outG);outG.connect(filterNode);
  ns.start(t);ns.stop(t+0.06);
  // 기본 보조음 + 배음
  osc(f,'sawtooth',t,0.004,2.2,v*0.22,filterNode);
  osc(f*2,'sine',t,0.003,1.4,v*0.1,filterNode);
  osc(f*3,'sine',t,0.002,0.8,v*0.04,filterNode);
}

// 거문고 — 가야금보다 낮고 강렬한 찰현음
function geomungo(note,t,v=0.8){
  if(!AC)return;
  const f=n2hz(note||'D3');
  // 씩 소리가 나는 찰현
  const ws=AC.createWaveShaper();
  const N=512;const cv=new Float32Array(N);
  for(let i=0;i<N;i++){const x=i*2/N-1;cv[i]=x<0?-Math.pow(-x,0.6):Math.pow(x,0.6);}
  ws.curve=cv;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sawtooth';o.frequency.value=f;
  addVibratoToOsc(o,4.8,f*0.006,t,2.5);
  o.connect(ws);ws.connect(g);g.connect(filterNode);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(v*0.85,t+0.03);
  g.gain.setValueAtTime(v*0.7,t+0.08);
  g.gain.exponentialRampToValueAtTime(0.0001,t+2.5);
  o.start(t);o.stop(t+2.7);
  noiseOut(t,0.04,v*0.3,f*4,80,filterNode);
  osc(f*2,'sine',t,0.01,1.8,v*0.12,filterNode);
}

// 대금 — 맑고 숨결이 느껴지는 관악기
function daegeum(note,t,v=0.72){
  if(!AC)return;
  const f=n2hz(note||'D5');
  // 메인 오실레이터 + 비브라토
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sine';
  addVibratoToOsc(o,5.5,f*0.014,t,2.0);
  o.connect(g);g.connect(filterNode);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(v*0.78,t+0.085);
  g.gain.setValueAtTime(v*0.6,t+0.4);
  g.gain.exponentialRampToValueAtTime(0.0001,t+1.8);
  o.start(t);o.stop(t+1.9);
  // 숨결 노이즈 (반드시 포함! 대금 특색)
  const bLen=Math.ceil(AC.sampleRate*1.7);
  const bb=AC.createBuffer(1,bLen,AC.sampleRate);
  const bd=bb.getChannelData(0);
  for(let i=0;i<bLen;i++)bd[i]=(Math.random()*2-1)*0.15;
  const bf=AC.createBiquadFilter();bf.type='bandpass';bf.frequency.value=f*1.05;bf.Q.value=0.7;
  const hf=AC.createBiquadFilter();hf.type='highpass';hf.frequency.value=f*0.85;
  const bs=AC.createBufferSource(),bg=AC.createGain();
  bs.buffer=bb;bs.connect(hf);hf.connect(bf);bf.connect(bg);bg.connect(filterNode);
  bg.gain.setValueAtTime(0.0001,t);
  bg.gain.linearRampToValueAtTime(v*0.26,t+0.09);
  bg.gain.exponentialRampToValueAtTime(0.0001,t+1.5);
  bs.start(t);
  // 2차 배음 (맑은 대금 특유)
  osc(f*2,'sine',t,0.05,1.2,v*0.08,filterNode);
}

// 피리 — 거칠고 강렬한 관악 (oboe형)
function piri(note,t,v=0.72){
  if(!AC)return;
  const f=n2hz(note||'G4');
  // Buzz 음원 (하모닉 리치)
  const o1=AC.createOscillator(),g1=AC.createGain();
  o1.type='sawtooth';
  addVibratoToOsc(o1,6.0,f*0.018,t,1.5);
  o1.connect(g1);g1.connect(filterNode);
  g1.gain.setValueAtTime(0.0001,t);
  g1.gain.linearRampToValueAtTime(v*0.68,t+0.04);
  g1.gain.setValueAtTime(v*0.6,t+0.2);
  g1.gain.exponentialRampToValueAtTime(0.0001,t+1.3);
  o1.start(t);o1.stop(t+1.4);
  // 2,3배음 강조 (피리 특색)
  osc(f*2,'square',t,0.04,1.0,v*0.22,filterNode);
  osc(f*3,'sine',t,0.03,0.7,v*0.08,filterNode);
  // 떨기 (청)
  osc(f*1.006,'sine',t,0.04,1.1,v*0.18,filterNode);
}

// 해금 — 거친 찰현, 특유의 비음색
function haegeum(note,t,v=0.65){
  if(!AC)return;
  const f=n2hz(note||'A4');
  // 강한 waveshaper 왜곡으로 코 막힌 특유 음색
  const ws=AC.createWaveShaper();
  const N=512;const cv=new Float32Array(N);
  for(let i=0;i<N;i++){
    const x=i*2/N-1;
    cv[i]=Math.tanh(x*2.8)*0.65;
  }
  ws.curve=cv;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sawtooth';
  addVibratoToOsc(o,6.5,f*0.015,t,1.8);
  const lpf=AC.createBiquadFilter();lpf.type='bandpass';lpf.frequency.value=f*2.2;lpf.Q.value=1.8;
  o.connect(ws);ws.connect(lpf);lpf.connect(g);g.connect(filterNode);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(v*0.7,t+0.08);
  g.gain.setValueAtTime(v*0.55,t+0.5);
  g.gain.exponentialRampToValueAtTime(0.0001,t+1.8);
  o.start(t);o.stop(t+2.0);
  // 활 마찰 노이즈
  noiseOut(t,1.5,v*0.08,f*3,f*0.8,filterNode);
}

// 아쟁 — 저음 찰현, 무겁고 끈적한 음색
function ajaeng(note,t,v=0.82){
  if(!AC)return;
  const f=n2hz(note||'D2');
  const lpf=AC.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=1100;lpf.Q.value=1.5;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type='sawtooth';
  addVibratoToOsc(o,4.0,f*0.012,t,2.5);
  o.connect(lpf);lpf.connect(g);g.connect(filterNode);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(v*0.92,t+0.14);
  g.gain.setValueAtTime(v*0.75,t+0.5);
  g.gain.exponentialRampToValueAtTime(0.0001,t+2.5);
  o.start(t);o.stop(t+2.7);
  osc(f*2,'sine',t,0.05,2.0,v*0.15,filterNode);
  noiseOut(t,0.06,v*0.25,f*4,50,filterNode);
}

// 생황 — 리드 파이프 군집 화음 악기 (고즈넉한)
function saenghwang(note,t,v=0.65){
  if(!AC)return;
  const f=n2hz(note||'C5');
  // 화음 3개 동시 (생황은 화음 악기)
  const ratios=[1,1.259,1.498]; // 장3도, 완전5도
  ratios.forEach((r,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.type='square';
    addVibratoToOsc(o,5.2+i*0.3,f*r*0.008,t,2.0);
    const bpf=AC.createBiquadFilter();bpf.type='bandpass';bpf.frequency.value=f*r*2;bpf.Q.value=2;
    o.connect(bpf);bpf.connect(g);g.connect(filterNode);
    o.frequency.value=f*r;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.linearRampToValueAtTime(v*0.28,t+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001,t+2.2);
    o.start(t);o.stop(t+2.4);
  });
}

/* ════════════════════
   TRACKS
════════════════════ */
function addTrack(ins){
  if(tracks.find(t=>t.id===ins.id)){
    const el=document.querySelector(`.track[data-id="${ins.id}"]`);
    if(el){el.style.borderColor='var(--gold)';setTimeout(()=>el.style.borderColor='',500);}
    return;
  }
  tracks.push({id:ins.id,ins,steps:Array(STEPS).fill(false),ni:Array(STEPS).fill(0),vol:0.8});
  renderTracks();
}
function removeTrack(id){tracks=tracks.filter(t=>t.id!==id);renderTracks();}

function renderTracks(){
  const tw=document.getElementById('tw');
  const dz=document.getElementById('dz');
  tw.innerHTML='';
  tracks.forEach(tr=>{
    const row=document.createElement('div');row.className='track';row.dataset.id=tr.id;
    const ti=document.createElement('div');ti.className='ti';
    ti.innerHTML=`<span class="tiemoji">${tr.ins.emoji}</span><span class="tiname">${tr.ins.name}</span>`;
    const sd=document.createElement('div');sd.className='steps';
    for(let i=0;i<STEPS;i++){
      const btn=document.createElement('div');
      btn.className='step'+(tr.steps[i]?' on':'')+(i%4===0?' b1':i%2===0?' b2':'');
      // 음정 표시 dot
      const dot=document.createElement('div');dot.className='note-dot';btn.appendChild(dot);
      if(tr.steps[i]&&tr.ins.notes&&tr.ins.notes.length>1){
        dot.style.background=`hsl(${tr.ni[i]*35+40},60%,55%)`;
      }
      btn.addEventListener('click',()=>{
        tr.steps[i]=!tr.steps[i];btn.classList.toggle('on',tr.steps[i]);
        if(tr.steps[i]){
          initAC();
          const note=tr.ins.notes?.[tr.ni[i]%tr.ins.notes.length];
          tr.ins.fn(note,AC.currentTime+0.02,tr.vol);
          dot.style.background=tr.ins.notes&&tr.ins.notes.length>1?`hsl(${tr.ni[i]*35+40},60%,55%)`:'';
        }
      });
      btn.addEventListener('contextmenu',e=>{
        e.preventDefault();
        if(!tr.ins.notes||tr.ins.notes.length<=1)return;
        tr.ni[i]=(tr.ni[i]+1)%(tr.ins.notes.length);
        if(tr.steps[i]){
          btn.style.background=`hsl(${tr.ni[i]*35+40},50%,35%)`;
          dot.style.background=`hsl(${tr.ni[i]*35+40},60%,55%)`;
          initAC();tr.ins.fn(tr.ins.notes[tr.ni[i]],AC.currentTime+0.02,tr.vol*0.7);
        }
      });
      sd.appendChild(btn);
    }
    const vw=document.createElement('div');vw.className='vw';
    const vi=document.createElement('input');vi.type='range';vi.min='0';vi.max='1';vi.step='.05';vi.value=tr.vol;
    vi.style.accentColor=tr.ins.color||'var(--gold)';
    vi.addEventListener('input',e=>tr.vol=+e.target.value);vw.appendChild(vi);
    const db=document.createElement('button');db.className='db';db.textContent='✕';db.onclick=()=>removeTrack(tr.id);
    row.append(ti,sd,vw,db);tw.appendChild(row);
  });
  tw.appendChild(dz);
}

/* ════════════════════
   SCHEDULER
════════════════════ */
function stepSec(){return(60/bpm)/4;}
function startSch(){nextTime=AC.currentTime+0.02;schedLoop();}
function schedLoop(){
  while(nextTime<AC.currentTime+AHEAD){
    const swOff=(curStep%2===1)?swing*stepSec():0;
    schedStep(curStep,nextTime+swOff);
    nextTime+=stepSec();
    curStep=(curStep+1)%STEPS;
  }
  schTimer=setTimeout(schedLoop,16);
}
function schedStep(si,when){
  tracks.forEach(tr=>{
    if(!tr.steps[si])return;
    const ni=tr.ni[si]%((tr.ins.notes?.length)||1);
    const note=tr.ins.notes?.[ni];
    tr.ins.fn(note,when,tr.vol);
  });
  const delay=Math.max(0,(when-AC.currentTime)*1000);
  setTimeout(()=>updateUI(si),delay);
}
function stopSch(){clearTimeout(schTimer);}

async function togglePlay(){
  initAC();if(AC.state==='suspended')await AC.resume();
  playing=!playing;
  const b=document.getElementById('play-btn');
  if(playing){curStep=0;startSch();b.textContent='⏹ 정지';b.classList.add('on');}
  else{stopSch();updateUI(-1);document.getElementById('ph').style.left='0%';b.textContent='▶ 재생';b.classList.remove('on');}
}
function setBPM(v){bpm=v;document.getElementById('bpm-num').textContent=v;}
function setSteps(n){
  STEPS=n;
  document.querySelectorAll('.tbtn').forEach(b=>{if(['8','16','32'].includes(b.textContent))b.classList.remove('on');});
  event.target.classList.add('on');
  tracks.forEach(t=>{
    while(t.steps.length<n){t.steps.push(false);t.ni.push(0);}
    t.steps=t.steps.slice(0,n);t.ni=t.ni.slice(0,n);
  });
  renderTracks();
}

/* ════════════════════
   UI
════════════════════ */
let prevStep=-1;
function updateUI(si){
  if(prevStep>=0){
    document.querySelectorAll(`.steps .step:nth-child(${prevStep+1})`).forEach(b=>b.classList.remove('act'));
  }
  if(si>=0){
    document.querySelectorAll(`.steps .step:nth-child(${si+1})`).forEach(b=>{if(b.classList.contains('on'))b.classList.add('act');});
    const pct=si/(STEPS-1)*100;
    document.getElementById('ph').style.left=pct+'%';
  }
  prevStep=si;drawStage(si);
}

/* ════════════════════
   VISUALIZER
════════════════════ */
const sc=document.getElementById('sc'),sctx=sc.getContext('2d');
function rsz(){sc.width=sc.offsetWidth;sc.height=sc.offsetHeight;}
window.addEventListener('resize',rsz);setTimeout(rsz,80);

function drawStage(as){
  const W=sc.width,H=sc.height;
  sctx.clearRect(0,0,W,H);
  sctx.fillStyle='rgba(3,2,1,.6)';sctx.fillRect(0,0,W,H);
  if(!tracks.length){
    sctx.fillStyle='rgba(201,168,76,.08)';sctx.font='9px Courier New';
    sctx.textAlign='center';sctx.fillText('악기를 추가하세요',W/2,H/2);return;
  }
  const cw=W/STEPS,th=H/tracks.length;
  tracks.forEach((tr,ti)=>{
    const y=ti*th,c=tr.ins.color||'#c9a84c';
    for(let s=0;s<STEPS;s++){
      if(!tr.steps[s])continue;
      const x=s*cw,isA=s===as;
      const bh=isA?th*.92:th*.52;
      sctx.fillStyle=c+(isA?'ff':'88');
      sctx.fillRect(x+1,y+(th-bh)/2,cw-2,bh);
      if(isA){sctx.shadowColor=c;sctx.shadowBlur=14;sctx.fillRect(x+1,y+(th-bh)/2,cw-2,bh);sctx.shadowBlur=0;}
    }
    // beat lines
    for(let s=0;s<STEPS;s+=4){sctx.fillStyle='rgba(201,168,76,.06)';sctx.fillRect(s*cw,y,1,th);}
    sctx.fillStyle='rgba(245,239,224,.16)';sctx.font='8px Noto Serif KR';
    sctx.textAlign='left';sctx.fillText(tr.ins.name,2,y+th*.7);
  });
  if(as>=0){sctx.fillStyle='rgba(201,168,76,.55)';sctx.fillRect(as*cw,0,2,H);}
}

/* ════════════════════

const mc=document.getElementById('mc'),mctx=mc.getContext('2d');
function rsm(){mc.width=mc.offsetWidth;mc.height=mc.offsetHeight;}
window.addEventListener('resize',rsm);setTimeout(rsm,100);
(function meterLoop(){
  const W=mc.width,H=mc.height;
  mctx.clearRect(0,0,W,H);
  mctx.fillStyle='rgba(4,2,1,.5)';mctx.fillRect(0,0,W,H);
  if(analyser){
    const d=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(d);
    const n=Math.min(d.length,64);const bw=W/n;
    for(let i=0;i<n;i++){
      const h=d[i]/255*H;const hue=140-d[i]/255*80;
      mctx.fillStyle=`hsla(${hue},65%,45%,.85)`;
      mctx.fillRect(i*bw,H-h,bw-1,h);
    }
  }
  requestAnimationFrame(meterLoop);
})();

const pb=document.getElementById('pbtns');
Object.entries(PRESETS).forEach(([k,p])=>{
  const b=document.createElement('button');b.className='pbtn';b.textContent=p.name;
  b.onclick=()=>{document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('act'));b.classList.add('act');loadPreset(k);};
  pb.appendChild(b);
});

async function loadPreset(k){
  const was=playing;if(playing){togglePlay();await new Promise(r=>setTimeout(r,100));}
  clearAll(false);
  const p=PRESETS[k];if(!p)return;
  setBPM(p.bpm);document.getElementById('bpm-sl').value=p.bpm;
  swing=p.sw;document.getElementById('sw-sl').value=p.sw;
  p.tracks.forEach(pt=>{
    const ins=INSTS.find(i=>i.id===pt.id);if(!ins)return;
    tracks.push({id:ins.id,ins,steps:pt.steps.map(v=>v===1),ni:[...pt.ni],vol:0.8});
  });
  renderTracks();if(was){await new Promise(r=>setTimeout(r,50));togglePlay();}
}
function clearAll(stop=true){if(stop&&playing)togglePlay();tracks=[];renderTracks();drawStage(-1);}
async function randomize(){
  clearAll();
  // 리듬 반드시 1개, 나머지 랜덤
  const rhythms=INSTS.filter(i=>i.type==='rhythm');
  const others=INSTS.filter(i=>i.type!=='rhythm').sort(()=>Math.random()-.5).slice(0,3);
  const picks=[rhythms[Math.floor(Math.random()*rhythms.length)],...others];
  picks.forEach(ins=>{
    const s=Array(STEPS).fill(false),ni=Array(STEPS).fill(0);
    const density=ins.type==='rhythm'?.4:ins.type==='bass'?.22:.28;
    for(let i=0;i<STEPS;i++){s[i]=Math.random()<density;ni[i]=Math.floor(Math.random()*(ins.notes?.length||1));}
    if(ins.type==='rhythm')s[0]=true;
    tracks.push({id:ins.id,ins,steps:s,ni,vol:0.8});
  });
  renderTracks();initAC();await togglePlay();
}
