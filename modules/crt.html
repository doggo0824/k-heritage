<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국가유산 CRT</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Courier New',monospace; }
  #video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:none; }
  #main-canvas { position:fixed; inset:0; width:100%; height:100%; }
  #three-container { position:fixed; inset:0; pointer-events:none; z-index:5; }
  #overlay-ui { position:fixed; inset:0; z-index:10; pointer-events:none; }
  .corner { position:absolute; width:60px; height:60px; }
  .corner svg { width:100%; height:100%; opacity:0.6; }
  #c-tl { top:12px; left:12px; }
  #c-tr { top:12px; right:12px; transform:scaleX(-1); }
  #c-bl { bottom:12px; left:12px; transform:scaleY(-1); }
  #c-br { bottom:12px; right:12px; transform:scale(-1); }
  #status { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:20; font-size:11px; color:rgba(0,255,65,0.6); letter-spacing:0.2em; text-align:center; }
  #model-label { position:fixed; z-index:20; pointer-events:none; display:none; background:rgba(0,0,0,0.7); border:1px solid rgba(201,168,76,0.4); padding:8px 16px; font-family:'Courier New',monospace; font-size:12px; color:#c9a84c; letter-spacing:0.1em; }
  #ctrl { position:fixed; top:20px; right:20px; z-index:20; display:flex; gap:8px; }
  .ctrl-btn { background:rgba(0,0,0,0.7); border:1px solid rgba(0,255,65,0.3); color:rgba(0,255,65,0.8); padding:6px 12px; font-family:'Courier New',monospace; font-size:11px; cursor:pointer; letter-spacing:0.1em; transition:all 0.2s; }
  .ctrl-btn:hover { background:rgba(0,255,65,0.1); border-color:rgba(0,255,65,0.8); }
  .ctrl-btn.active { background:rgba(0,255,65,0.15); border-color:#00ff41; color:#00ff41; }
  #intensity-wrap { position:fixed; bottom:50px; left:20px; z-index:20; display:flex; align-items:center; gap:8px; }
  #intensity-wrap label { font-size:10px; color:rgba(0,255,65,0.5); letter-spacing:0.1em; }
  #intensity-wrap input { width:80px; accent-color:#00ff41; }
  #no-webcam { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; z-index:50; background:#000; }
  #no-webcam p { color:rgba(0,255,65,0.6); font-size:14px; letter-spacing:0.2em; text-align:center; }
  .start-btn { border:1px solid rgba(0,255,65,0.5); background:none; color:rgba(0,255,65,0.8); padding:10px 32px; font-family:'Courier New',monospace; font-size:14px; letter-spacing:0.2em; cursor:pointer; transition:all 0.2s; }
  .start-btn:hover { background:rgba(0,255,65,0.1); }
</style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>
<canvas id="main-canvas"></canvas>
<div id="three-container"></div>

<div id="overlay-ui">
  <div class="corner" id="c-tl"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 2 L58 2" stroke="#c9a84c" stroke-width="2"/><circle cx="2" cy="2" r="2.5" fill="#c9a84c"/></svg></div>
  <div class="corner" id="c-tr"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 2 L58 2" stroke="#c9a84c" stroke-width="2"/><circle cx="2" cy="2" r="2.5" fill="#c9a84c"/></svg></div>
  <div class="corner" id="c-bl"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 2 L58 2" stroke="#c9a84c" stroke-width="2"/><circle cx="2" cy="2" r="2.5" fill="#c9a84c"/></svg></div>
  <div class="corner" id="c-br"><svg viewBox="0 0 60 60" fill="none"><path d="M2 58 L2 2 L58 2" stroke="#c9a84c" stroke-width="2"/><circle cx="2" cy="2" r="2.5" fill="#c9a84c"/></svg></div>
</div>

<div id="ctrl">
  <button class="ctrl-btn active" id="btn-crt" onclick="toggleCRT()">CRT ON</button>
  <button class="ctrl-btn" id="btn-model" onclick="cycleModel()">모델: 불국사</button>
  <button class="ctrl-btn" onclick="toggleFullscreen()">⛶ 전체화면</button>
</div>

<div id="intensity-wrap">
  <label>CRT 강도</label>
  <input type="range" id="crt-intensity" min="0.1" max="2" step="0.1" value="1" oninput="setCRTIntensity(+this.value)">
</div>

<div id="model-label">손을 펼쳐 유물을 소환하세요 ✋</div>
<div id="status">WEBCAM 연결 중... · INITIALIZING MEDIAPIPE</div>

<div id="no-webcam">
  <p>국가유산 CRT 체험<br>웹캠 접근 권한이 필요합니다</p>
  <button class="start-btn" onclick="initWebcam()">웹캠 시작</button>
  <p style="font-size:11px;color:rgba(0,255,65,0.3);margin-top:8px">✋ 손을 펼치면 3D 국가유산 모델이 나타납니다</p>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ════════════════════════════════════════════
// CANVAS & STATE
// ════════════════════════════════════════════
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('video');

let W, H;
let crtEnabled = true;
let crtIntensity = 1.0;
let faceData = null;
let handData = [];
let isOpenPalm = false;
let palmOpenTime = 0;
let modelVisible = false;
let currentModelIdx = 0;

const MODEL_NAMES = ['불국사', '첨성대', '석굴암', '경복궁', '훈민정음'];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ════════════════════════════════════════════
// THREE.JS SETUP
// ════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(W, H);
renderer.setClearColor(0x000000, 0);
document.getElementById('three-container').appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 1000);
camera.position.set(0, 0, 5);

// Lights
const ambientLight = new THREE.AmbientLight(0xc9a84c, 0.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffd080, 1.2);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x4080ff, 0.8, 20);
scene.add(pointLight);

// Heritage model (placeholder geometric art until real GLTF files provided)
let heritageGroup = new THREE.Group();
scene.add(heritageGroup);

function buildHeritageModel(idx) {
  // Clear previous
  while(heritageGroup.children.length > 0) heritageGroup.remove(heritageGroup.children[0]);

  const goldMat = new THREE.MeshPhongMaterial({ color:0xc9a84c, shininess:120, specular:0xe8c96a });
  const stoneMat = new THREE.MeshPhongMaterial({ color:0x887060, shininess:40 });
  const wireMat = new THREE.MeshBasicMaterial({ color:0xc9a84c, wireframe:true, opacity:0.3, transparent:true });

  if (idx === 0) { // 불국사 탑
    const base = new THREE.Mesh(new THREE.BoxGeometry(1.4,0.2,1.4), stoneMat); base.position.y=-1; heritageGroup.add(base);
    for (let i=0; i<5; i++) {
      const s = 1.0 - i*0.15; const h = 0.25;
      const tier = new THREE.Mesh(new THREE.BoxGeometry(s,h,s), goldMat);
      tier.position.y = -0.8 + i*0.32; heritageGroup.add(tier);
      const roof = new THREE.Mesh(new THREE.CylinderGeometry(s*0.7,s*0.8,0.08,4), stoneMat);
      roof.position.y = -0.8 + i*0.32 + 0.16; heritageGroup.add(roof);
    }
    const spire = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.06,0.6,8), goldMat);
    spire.position.y = 0.8; heritageGroup.add(spire);
  } else if (idx === 1) { // 첨성대
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.7,0.3,12), stoneMat); base.position.y=-1.1; heritageGroup.add(base);
    for (let i=0; i<12; i++) {
      const r = 0.5 - i*0.015; const tier = new THREE.Mesh(new THREE.CylinderGeometry(r,r+0.02,0.12,12), goldMat);
      tier.position.y = -0.9 + i*0.15; heritageGroup.add(tier);
    }
    const top = new THREE.Mesh(new THREE.BoxGeometry(1.1,0.2,1.1), stoneMat); top.position.y=0.88; heritageGroup.add(top);
  } else { // Generic artifact
    const body = new THREE.Mesh(new THREE.TorusKnotGeometry(0.6,0.18,64,8), goldMat); heritageGroup.add(body);
    const wire = new THREE.Mesh(new THREE.TorusKnotGeometry(0.65,0.2,32,4), wireMat); heritageGroup.add(wire);
  }

  heritageGroup.scale.setScalar(0);
}
buildHeritageModel(0);

// ════════════════════════════════════════════
// WEBCAM
// ════════════════════════════════════════════
async function initWebcam() {
  document.getElementById('no-webcam').style.display = 'none';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{width:1280,height:720,facingMode:'user'}, audio:false });
    video.srcObject = stream;
    video.style.display = 'block';
    await video.play();
    initMediaPipe();
  } catch(e) {
    document.getElementById('status').textContent = '웹캠 접근 실패 · WEBCAM ACCESS DENIED';
    document.getElementById('no-webcam').style.display = 'flex';
  }
}

// ════════════════════════════════════════════
// MEDIAPIPE
// ════════════════════════════════════════════
function initMediaPipe() {
  if (typeof Hands === 'undefined') { startRenderLoop(); return; }
  document.getElementById('status').textContent = 'MEDIAPIPE 로딩 중...';

  const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({ maxNumHands:2, modelComplexity:1, minDetectionConfidence:0.7, minTrackingConfidence:0.5 });
  hands.onResults(r => { handData = r.multiHandLandmarks || []; });

  let faceMesh = null;
  if (typeof FaceMesh !== 'undefined') {
    faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
    faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
    faceMesh.onResults(r => { faceData = r.multiFaceLandmarks?.[0] || null; });
  }

  let frameCount = 0;
  const cam = new Camera(video, {
    onFrame: async () => {
      await hands.send({ image: video });
      if (faceMesh && frameCount % 2 === 0) await faceMesh.send({ image: video });
      frameCount++;
    },
    width: 640, height: 480
  });
  cam.start();
  document.getElementById('status').textContent = '실시간 추적 중 · TRACKING ACTIVE';
  startRenderLoop();
}

// ════════════════════════════════════════════
// CRT SHADER (canvas-based)
// ════════════════════════════════════════════
const offCanvas = document.createElement('canvas');
const offCtx = offCanvas.getContext('2d');
const crtCanvas = document.createElement('canvas');
const crtCtx = crtCanvas.getContext('2d');

function resizeOff() {
  offCanvas.width = crtCanvas.width = W;
  offCanvas.height = crtCanvas.height = H;
}
resizeOff();
window.addEventListener('resize', resizeOff);

function applyCRTEffect(sourceCanvas, regions) {
  // Copy source to CRT canvas
  crtCtx.clearRect(0,0,W,H);
  crtCtx.drawImage(sourceCanvas, 0,0,W,H);

  if (!crtEnabled || regions.length === 0) return crtCanvas;

  // Apply CRT only to face/hand regions
  regions.forEach(region => {
    const { x, y, w, h } = region;
    crtCtx.save();
    crtCtx.beginPath();
    crtCtx.ellipse(x+w/2, y+h/2, w/2*1.1, h/2*1.1, 0, 0, Math.PI*2);
    crtCtx.clip();

    // Scanlines
    crtCtx.globalAlpha = 0.25 * crtIntensity;
    for (let ly = y; ly < y+h; ly += 3) {
      crtCtx.fillStyle = 'rgba(0,0,0,0.6)';
      crtCtx.fillRect(x, ly, w, 1.5);
    }

    // RGB shift
    crtCtx.globalCompositeOperation = 'screen';
    crtCtx.globalAlpha = 0.15 * crtIntensity;
    const imgData = crtCtx.getImageData(x, y, w, h);
    // Red channel shift
    crtCtx.fillStyle = 'rgba(255,0,0,0.1)';
    crtCtx.fillRect(x-2*crtIntensity, y, w, h);
    crtCtx.fillStyle = 'rgba(0,0,255,0.1)';
    crtCtx.fillRect(x+2*crtIntensity, y, w, h);
    crtCtx.globalCompositeOperation = 'source-over';

    // Noise flicker
    crtCtx.globalAlpha = 0.05 * crtIntensity;
    for (let nx=x; nx<x+w; nx+=8) {
      for (let ny2=y; ny2<y+h; ny2+=8) {
        if (Math.random() > 0.7) {
          crtCtx.fillStyle = `rgba(255,255,255,${Math.random()*0.3})`;
          crtCtx.fillRect(nx, ny2, 4, 4);
        }
      }
    }

    // Glow border
    crtCtx.globalAlpha = 0.6 * crtIntensity;
    const grd = crtCtx.createRadialGradient(x+w/2,y+h/2,Math.min(w,h)*0.3, x+w/2,y+h/2,Math.min(w,h)*0.7);
    grd.addColorStop(0, 'rgba(0,255,65,0)');
    grd.addColorStop(1, 'rgba(0,255,65,0.2)');
    crtCtx.fillStyle = grd;
    crtCtx.beginPath();
    crtCtx.ellipse(x+w/2, y+h/2, w/2*1.1, h/2*1.1, 0, 0, Math.PI*2);
    crtCtx.fill();

    crtCtx.restore();
  });

  return crtCanvas;
}

// ════════════════════════════════════════════
// PALM DETECTION
// ════════════════════════════════════════════
function detectOpenPalm(landmarks) {
  if (!landmarks || landmarks.length < 21) return false;
  const fingerTips = [8,12,16,20];
  const fingerMids = [6,10,14,18];
  let openCount = 0;
  fingerTips.forEach((tip,i) => {
    if (landmarks[tip].y < landmarks[fingerMids[i]].y) openCount++;
  });
  const thumbOpen = landmarks[4].x < landmarks[3].x;
  return openCount >= 3 && thumbOpen;
}

function getHandRegion(lm) {
  const xs = lm.map(p => p.x*W);
  const ys = lm.map(p => p.y*H);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const pad = 30;
  return { x:minX-pad, y:minY-pad, w:maxX-minX+pad*2, h:maxY-minY+pad*2 };
}

function getFaceRegion(lm) {
  const xs = lm.map(p => p.x*W);
  const ys = lm.map(p => p.y*H);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  return { x:minX-20, y:minY-20, w:maxX-minX+40, h:maxY-minY+40 };
}

// ════════════════════════════════════════════
// 3D MODEL PLACEMENT ON PALM
// ════════════════════════════════════════════
function updateModelPosition() {
  if (!modelVisible || handData.length === 0) return;
  const lm = handData[0];
  // Palm center = landmark 9
  const palmX = (1 - lm[9].x) * W;
  const palmY = lm[9].y * H;
  const palmZ = lm[9].z;

  // Map screen pos to 3D
  const ndcX = (palmX/W)*2 - 1;
  const ndcY = -(palmY/H)*2 + 1;
  heritageGroup.position.x = ndcX * 3;
  heritageGroup.position.y = ndcY * 2;
  heritageGroup.position.z = -palmZ * 5;

  // Hover animation
  heritageGroup.position.y += Math.sin(Date.now()/800) * 0.1;
  heritageGroup.rotation.y += 0.015;
  heritageGroup.rotation.x = Math.sin(Date.now()/2000) * 0.1;

  // Scale in
  const targetScale = isOpenPalm ? 0.5 : 0;
  const current = heritageGroup.scale.x;
  const next = current + (targetScale - current) * 0.1;
  heritageGroup.scale.setScalar(next);
}

// ════════════════════════════════════════════
// RENDER LOOP
// ════════════════════════════════════════════
function startRenderLoop() {
  let lastTime = 0;

  function loop(time) {
    requestAnimationFrame(loop);
    const dt = time - lastTime; lastTime = time;

    // Draw video to offCanvas
    offCtx.clearRect(0,0,W,H);
    if (video.readyState >= 2) {
      offCtx.save();
      offCtx.translate(W, 0);
      offCtx.scale(-1, 1);
      offCtx.drawImage(video, 0, 0, W, H);
      offCtx.restore();
    } else {
      offCtx.fillStyle = '#0a0705';
      offCtx.fillRect(0,0,W,H);
    }

    // Collect CRT regions
    const regions = [];
    if (faceData) regions.push(getFaceRegion(faceData));
    handData.forEach(lm => regions.push(getHandRegion(lm)));

    // Apply CRT
    const processedCanvas = applyCRTEffect(offCanvas, regions);
    ctx.clearRect(0,0,W,H);
    ctx.drawImage(processedCanvas, 0,0,W,H);

    // Overall vignette
    const vig = ctx.createRadialGradient(W/2,H/2,H*0.35, W/2,H/2,H*0.7);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(0,0,0,0.55)');
    ctx.fillStyle = vig; ctx.fillRect(0,0,W,H);

    // Palm detection
    let newPalm = false;
    handData.forEach(lm => { if (detectOpenPalm(lm)) newPalm = true; });
    if (newPalm && !isOpenPalm) { palmOpenTime = Date.now(); modelVisible = true; buildHeritageModel(currentModelIdx); document.getElementById('model-label').style.display='block'; }
    if (!newPalm && isOpenPalm) { modelVisible = handData.length > 0; }
    isOpenPalm = newPalm;

    if (!isOpenPalm && !modelVisible) document.getElementById('model-label').style.display='none';

    // Update 3D
    updateModelPosition();
    camera.aspect = W/H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
    renderer.render(scene, camera);

    // Timestamp overlay
    ctx.fillStyle = 'rgba(0,255,65,0.25)';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'right';
    ctx.fillText('REC · ' + new Date().toLocaleTimeString(), W - 16, H - 16);
    ctx.textAlign = 'left';
    ctx.fillText('HANDS:' + handData.length + ' · FACE:' + (faceData?'YES':'NO'), 16, H-16);
  }
  requestAnimationFrame(loop);
}

// ════════════════════════════════════════════
// UI CONTROLS
// ════════════════════════════════════════════
function toggleCRT() {
  crtEnabled = !crtEnabled;
  const btn = document.getElementById('btn-crt');
  btn.textContent = 'CRT ' + (crtEnabled ? 'ON' : 'OFF');
  btn.classList.toggle('active', crtEnabled);
}

function cycleModel() {
  currentModelIdx = (currentModelIdx + 1) % MODEL_NAMES.length;
  buildHeritageModel(currentModelIdx);
  document.getElementById('btn-model').textContent = '모델: ' + MODEL_NAMES[currentModelIdx];
  if (modelVisible) buildHeritageModel(currentModelIdx);
}

function setCRTIntensity(v) { crtIntensity = v; }

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

// Start
initWebcam();
</script>
</body>
</html>
