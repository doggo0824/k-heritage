<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보존과학 체험</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');
  :root {
    --gold:#c9a84c; --ink:#0f0c07; --paper:#f5efe0;
    --wood:#8b5e3c; --stone:#7a7670; --iron:#4a5568;
    --ok:#3a6b35; --warn:#8b6914; --danger:#7a1515;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--ink); color:var(--paper); font-family:'Noto Sans KR',sans-serif; }

  /* ── SCREENS ── */
  .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; }
  .screen.active { display:flex; }

  /* ── TITLE SCREEN ── */
  #screen-title { background: radial-gradient(ellipse at 50% 40%, #1a1209 0%, #000 100%); }
  .title-main { font-family:'Noto Serif KR',serif; font-size:clamp(28px,5vw,52px); font-weight:900; color:var(--gold); letter-spacing:0.2em; text-align:center; margin-bottom:8px; text-shadow:0 0 40px rgba(201,168,76,0.4); }
  .title-sub { font-size:13px; color:rgba(245,239,224,0.4); letter-spacing:0.3em; margin-bottom:48px; }
  .artifact-select { display:flex; gap:20px; margin-bottom:40px; }
  .art-card { width:160px; background:rgba(20,14,6,0.8); border:1px solid rgba(201,168,76,0.2); padding:20px 16px; text-align:center; cursor:pointer; transition:all 0.25s; position:relative; }
  .art-card:hover { border-color:var(--gold); transform:translateY(-4px); }
  .art-card.selected { border-color:var(--gold); background:rgba(201,168,76,0.1); }
  .art-icon { font-size:44px; display:block; margin-bottom:10px; }
  .art-name { font-family:'Noto Serif KR',serif; font-size:16px; font-weight:700; color:var(--gold); }
  .art-sub { font-size:10px; color:rgba(245,239,224,0.4); letter-spacing:0.1em; margin-top:4px; font-family:'Courier New',monospace; }
  .art-diff { position:absolute; top:6px; right:6px; font-size:9px; padding:2px 6px; border-radius:2px; font-family:'Courier New',monospace; }
  .d-easy { background:rgba(58,107,53,0.4); color:#88c080; }
  .d-med  { background:rgba(139,105,20,0.4); color:#d4a040; }
  .d-hard { background:rgba(122,21,21,0.4); color:#e87070; }
  .start-btn { padding:14px 48px; background:transparent; border:1px solid var(--gold); color:var(--gold); font-family:'Courier New',monospace; font-size:16px; letter-spacing:0.2em; cursor:pointer; transition:all 0.2s; }
  .start-btn:hover { background:rgba(201,168,76,0.15); box-shadow:0 0 20px rgba(201,168,76,0.3); }

  /* ── GAME SCREEN ── */
  #screen-game { background:#000; padding:0; }
  #game-canvas { position:absolute; inset:0; width:100%; height:100%; }

  /* ── HUD ── */
  #hud { position:absolute; top:0; left:0; right:0; z-index:10; padding:10px 20px; display:flex; align-items:center; gap:16px; background:linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); pointer-events:none; }
  .hud-artifact { font-family:'Noto Serif KR',serif; font-size:14px; color:var(--gold); letter-spacing:0.1em; }
  .hud-step { font-size:11px; color:rgba(245,239,224,0.5); font-family:'Courier New',monospace; margin-left:auto; }
  .hud-score { font-size:14px; color:var(--gold); font-family:'Courier New',monospace; }
  #accuracy-bar-wrap { width:120px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
  #accuracy-bar { height:100%; background:var(--ok); border-radius:3px; transition:width 0.3s; width:100%; }

  /* ── INSTRUCTION BUBBLE ── */
  #instruction { position:absolute; top:70px; left:50%; transform:translateX(-50%); z-index:10; background:rgba(0,0,0,0.85); border:1px solid rgba(201,168,76,0.4); padding:10px 24px; font-family:'Noto Serif KR',serif; font-size:14px; color:var(--paper); text-align:center; pointer-events:none; white-space:nowrap; backdrop-filter:blur(4px); }
  #instruction .action-key { color:var(--gold); font-family:'Courier New',monospace; font-size:16px; }

  /* ── TOOLS PALETTE ── */
  #tools { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:10; display:flex; gap:12px; }
  .tool-btn { width:56px; height:56px; background:rgba(20,14,6,0.9); border:1px solid rgba(201,168,76,0.3); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; gap:3px; }
  .tool-btn:hover, .tool-btn.active { border-color:var(--gold); background:rgba(201,168,76,0.15); }
  .tool-btn .t-icon { font-size:20px; line-height:1; }
  .tool-btn .t-label { font-size:8px; color:rgba(245,239,224,0.4); letter-spacing:0.05em; font-family:'Courier New',monospace; }

  /* ── RESULT SCREEN ── */
  #screen-result { background:radial-gradient(ellipse at 50% 40%, #1a1209 0%, #000 100%); }
  .result-grade { font-family:'Noto Serif KR',serif; font-size:clamp(60px,12vw,120px); font-weight:900; color:var(--gold); text-shadow:0 0 60px rgba(201,168,76,0.5); margin-bottom:8px; }
  .result-title { font-family:'Noto Serif KR',serif; font-size:22px; color:var(--paper); margin-bottom:24px; }
  .result-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:280px; margin-bottom:32px; }
  .stat-box { background:rgba(20,14,6,0.8); border:1px solid rgba(201,168,76,0.2); padding:12px; text-align:center; }
  .stat-val { font-size:24px; font-weight:700; color:var(--gold); font-family:'Courier New',monospace; }
  .stat-label { font-size:10px; color:rgba(245,239,224,0.4); letter-spacing:0.1em; margin-top:3px; }
  .result-btns { display:flex; gap:12px; }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div class="screen active" id="screen-title">
  <div class="title-main">보존과학 체험관</div>
  <div class="title-sub">CONSERVATION SCIENCE EXPERIENCE</div>

  <div class="artifact-select">
    <div class="art-card selected" data-type="wood" onclick="selectArtifact('wood', this)">
      <span class="art-diff d-easy">EASY</span>
      <span class="art-icon">🪵</span>
      <div class="art-name">목재 유물</div>
      <div class="art-sub">WOODEN ARTIFACT</div>
    </div>
    <div class="art-card" data-type="stone" onclick="selectArtifact('stone', this)">
      <span class="art-diff d-med">MEDIUM</span>
      <span class="art-icon">🪨</span>
      <div class="art-name">석재 유물</div>
      <div class="art-sub">STONE ARTIFACT</div>
    </div>
    <div class="art-card" data-type="iron" onclick="selectArtifact('iron', this)">
      <span class="art-diff d-hard">HARD</span>
      <span class="art-icon">⚔️</span>
      <div class="art-name">철제 유물</div>
      <div class="art-sub">IRON ARTIFACT</div>
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">보존 시작 · START</button>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="screen-game">
  <canvas id="game-canvas"></canvas>
  <div id="hud">
    <span id="hud-artifact" class="hud-artifact">목재 유물</span>
    <div id="accuracy-bar-wrap"><div id="accuracy-bar"></div></div>
    <span id="hud-step" class="hud-step">STEP 1 / 5</span>
    <span id="hud-score" class="hud-score">0 PT</span>
  </div>
  <div id="instruction">← 클릭/드래그로 처리하세요 →</div>
  <div id="tools"></div>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="screen-result">
  <div class="result-grade" id="result-grade">S</div>
  <div class="result-title" id="result-title">완벽한 보존처리!</div>
  <div class="result-stats">
    <div class="stat-box"><div class="stat-val" id="r-score">0</div><div class="stat-label">SCORE</div></div>
    <div class="stat-box"><div class="stat-val" id="r-acc">0%</div><div class="stat-label">ACCURACY</div></div>
    <div class="stat-box"><div class="stat-val" id="r-time">0s</div><div class="stat-label">TIME</div></div>
    <div class="stat-box"><div class="stat-val" id="r-combo">0</div><div class="stat-label">MAX COMBO</div></div>
  </div>
  <div class="result-btns">
    <button class="start-btn" onclick="goTitle()" style="font-size:13px;padding:10px 28px">← 돌아가기</button>
    <button class="start-btn" onclick="startGame()" style="font-size:13px;padding:10px 28px">다시하기 ↺</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// GAME STATE
// ════════════════════════════════════════════
let selectedType = 'wood';
let gameState = {};
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// ════════════════════════════════════════════
// ARTIFACT DEFINITIONS
// ════════════════════════════════════════════
const ARTIFACT_DATA = {
  wood: {
    name: '목재 유물',
    color: '#8b5e3c',
    color2: '#a0724d',
    steps: [
      { id:'clean',   label:'먼지 제거',    action:'brush',  hint:'붓으로 표면을 쓸어주세요',    key:'DRAG', duration:3500 },
      { id:'soak',    label:'수분 공급',    action:'spray',  hint:'스프레이로 골고루 뿌려주세요', key:'CLICK_AREA', duration:3000 },
      { id:'repair',  label:'균열 접합',    action:'fill',   hint:'균열 부위를 클릭하세요',       key:'CLICK', duration:4000 },
      { id:'coat',    label:'방부 코팅',    action:'brush',  hint:'붓으로 코팅재를 바릅니다',     key:'DRAG', duration:3500 },
      { id:'dry',     label:'건조 완료',    action:'wait',   hint:'건조될 때까지 기다리세요...',  key:'WAIT', duration:2500 },
    ]
  },
  stone: {
    name: '석재 유물',
    color: '#7a7670',
    color2: '#908b85',
    steps: [
      { id:'clean',   label:'오염 세척',    action:'scrub',  hint:'솔로 문질러 오염을 제거하세요', key:'DRAG', duration:3500 },
      { id:'scan',    label:'균열 스캔',    action:'scan',   hint:'스캐너로 표면을 살펴보세요',   key:'DRAG', duration:3000 },
      { id:'fill',    label:'결손부 충진',  action:'fill',   hint:'결손 부위를 클릭하여 채우세요', key:'CLICK', duration:4000 },
      { id:'strength','label':'강화 처리',  action:'spray',  hint:'강화제를 뿌려주세요',          key:'CLICK_AREA', duration:3000 },
      { id:'document','label':'기록 완료',  action:'photo',  hint:'유물을 촬영하여 기록하세요',   key:'CLICK', duration:2000 },
    ]
  },
  iron: {
    name: '철제 유물',
    color: '#4a5568',
    color2: '#637080',
    steps: [
      { id:'rust',    label:'녹 제거',      action:'scrub',  hint:'솔로 녹을 긁어내세요',         key:'DRAG', duration:4000 },
      { id:'xray',    label:'X선 촬영',     action:'scan',   hint:'전체 면적을 스캔하세요',       key:'DRAG', duration:3000 },
      { id:'derust',  label:'탈염 처리',    action:'soak',   hint:'용액에 충분히 담그세요',       key:'HOLD', duration:4000 },
      { id:'coat',    label:'방청 코팅',    action:'brush',  hint:'방청제를 꼼꼼히 바르세요',     key:'DRAG', duration:3500 },
      { id:'store',   label:'수장고 보관',  action:'place',  hint:'올바른 위치에 놓아주세요',     key:'DRAG', duration:2500 },
    ]
  }
};

const TOOLS = {
  brush: { emoji:'🖌️', label:'BRUSH' },
  spray: { emoji:'💨', label:'SPRAY' },
  scrub:  { emoji:'🪥', label:'SCRUB' },
  fill:  { emoji:'🔧', label:'FILL' },
  scan:  { emoji:'🔍', label:'SCAN' },
  soak:  { emoji:'💧', label:'SOAK' },
  photo: { emoji:'📷', label:'PHOTO' },
  place: { emoji:'📦', label:'PLACE' },
  wait:  { emoji:'⏳', label:'WAIT' },
};

// ════════════════════════════════════════════
// SCREEN MANAGEMENT
// ════════════════════════════════════════════
function selectArtifact(type, card) {
  selectedType = type;
  document.querySelectorAll('.art-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function goTitle() { showScreen('title'); if (gameState.animFrame) cancelAnimationFrame(gameState.animFrame); }

// ════════════════════════════════════════════
// GAME INIT
// ════════════════════════════════════════════
function startGame() {
  const data = ARTIFACT_DATA[selectedType];
  gameState = {
    type: selectedType,
    data,
    stepIdx: 0,
    score: 0,
    combo: 0,
    maxCombo: 0,
    totalAcc: 0,
    stepCount: 0,
    startTime: Date.now(),
    stepStartTime: Date.now(),
    particles: [],
    cracks: [],
    brushStrokes: [],
    sprayDrops: [],
    progress: 0,
    actionDone: false,
    stepScore: 0,
    effects: [],
    animFrame: null,
    mx: 0, my: 0,
    isDown: false,
    dragPath: [],
    waitProgress: 0,
  };

  resizeCanvas();
  generateArtifact();
  renderTools();
  showScreen('game');
  updateHUD();
  gameState.animFrame = requestAnimationFrame(gameLoop);
  updateInstruction();
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { if (gameState.animFrame) resizeCanvas(); });

// ════════════════════════════════════════════
// ARTIFACT GENERATION
// ════════════════════════════════════════════
function generateArtifact() {
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2 - 30;

  gameState.artifact = { cx, cy, w:220, h:280 };

  // Generate cracks
  gameState.cracks = [];
  const crackCount = { wood:4, stone:6, iron:5 }[selectedType] || 4;
  for (let i = 0; i < crackCount; i++) {
    const startX = cx + (Math.random()-0.5)*160;
    const startY = cy + (Math.random()-0.5)*220;
    const len = 20 + Math.random()*60;
    const angle = Math.random() * Math.PI * 2;
    gameState.cracks.push({ x:startX, y:startY, dx:Math.cos(angle)*len, dy:Math.sin(angle)*len, fixed:false, alpha:1 });
  }

  // Rust spots for iron
  gameState.rustSpots = [];
  if (selectedType === 'iron') {
    for (let i = 0; i < 8; i++) {
      gameState.rustSpots.push({ x: cx+(Math.random()-0.5)*180, y: cy+(Math.random()-0.5)*240, r:15+Math.random()*25, alpha:1 });
    }
  }

  // Dirt for wood/stone
  gameState.dirtPatches = [];
  for (let i = 0; i < 6; i++) {
    gameState.dirtPatches.push({ x: cx+(Math.random()-0.5)*180, y: cy+(Math.random()-0.5)*240, r:18+Math.random()*30, alpha:0.7 });
  }
}

// ════════════════════════════════════════════
// TOOLS
// ════════════════════════════════════════════
function renderTools() {
  const step = gameState.data.steps[gameState.stepIdx];
  const toolsEl = document.getElementById('tools');
  toolsEl.innerHTML = '';
  const activeTool = step.action;
  Object.entries(TOOLS).forEach(([key, t]) => {
    const btn = document.createElement('div');
    btn.className = 'tool-btn' + (key === activeTool ? ' active' : '');
    btn.innerHTML = `<span class="t-icon">${t.emoji}</span><span class="t-label">${t.label}</span>`;
    btn.onclick = () => {};
    toolsEl.appendChild(btn);
  });
}

// ════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════
function gameLoop() {
  if (!gameState.animFrame) return;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  drawBackground();
  drawArtifact();
  drawOverlays();
  drawBrushStrokes();
  drawSpray();
  drawParticles();
  drawEffects();
  drawProgressArc();
  updatePhysics();

  gameState.animFrame = requestAnimationFrame(gameLoop);
}

// ════════════════════════════════════════════
// DRAWING FUNCTIONS
// ════════════════════════════════════════════
function drawBackground() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0a0704';
  ctx.fillRect(0,0,W,H);

  // Lab table
  const grad = ctx.createLinearGradient(0, H*0.55, 0, H);
  grad.addColorStop(0, '#1a1408');
  grad.addColorStop(1, '#0d0a05');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H*0.55, W, H*0.45);

  // Grid lines (lab floor)
  ctx.strokeStyle = 'rgba(201,168,76,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x, H*0.55); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = H*0.55; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
}

function drawArtifact() {
  const { cx, cy, w, h } = gameState.artifact;
  const data = gameState.data;
  const step = gameState.data.steps[gameState.stepIdx];

  // Shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 40;
  ctx.shadowOffsetY = 20;

  // Base shape by type
  ctx.fillStyle = data.color;
  if (selectedType === 'wood') {
    // Wood plank shape
    ctx.beginPath();
    ctx.roundRect(cx - w/2, cy - h/2, w, h, 8);
    ctx.fill();
    // Wood grain
    ctx.strokeStyle = data.color2 + '80';
    ctx.lineWidth = 1.5;
    for (let i = -h/2; i < h/2; i += 18) {
      ctx.beginPath();
      ctx.moveTo(cx - w/2 + 4, cy + i);
      ctx.bezierCurveTo(cx, cy + i - 5, cx + 10, cy + i + 5, cx + w/2 - 4, cy + i);
      ctx.stroke();
    }
  } else if (selectedType === 'stone') {
    // Stone irregular shape
    ctx.beginPath();
    ctx.moveTo(cx - w/2 + 20, cy - h/2);
    ctx.lineTo(cx + w/2 - 10, cy - h/2 + 10);
    ctx.lineTo(cx + w/2, cy + h/2 - 30);
    ctx.lineTo(cx + w/2 - 25, cy + h/2);
    ctx.lineTo(cx - w/2 + 5, cy + h/2 - 10);
    ctx.lineTo(cx - w/2, cy - h/2 + 20);
    ctx.closePath();
    ctx.fill();
  } else {
    // Iron sword/axe shape
    ctx.beginPath();
    ctx.moveTo(cx, cy - h/2);
    ctx.lineTo(cx + w/3, cy - h/4);
    ctx.lineTo(cx + w/4, cy + h/2);
    ctx.lineTo(cx - w/4, cy + h/2);
    ctx.lineTo(cx - w/3, cy - h/4);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();

  // Dirt
  if (step.id !== 'dry' && step.id !== 'store' && step.id !== 'document') {
    gameState.dirtPatches.forEach(d => {
      if (d.alpha <= 0) return;
      const g = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r);
      g.addColorStop(0, `rgba(40,30,10,${d.alpha})`);
      g.addColorStop(1, 'rgba(40,30,10,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
    });
  }

  // Rust
  if (selectedType === 'iron') {
    gameState.rustSpots.forEach(r => {
      if (r.alpha <= 0) return;
      const g = ctx.createRadialGradient(r.x, r.y, 0, r.x, r.y, r.r);
      g.addColorStop(0, `rgba(160,80,20,${r.alpha * 0.8})`);
      g.addColorStop(1, 'rgba(160,80,20,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2); ctx.fill();
    });
  }

  // Cracks
  gameState.cracks.forEach(c => {
    if (c.alpha <= 0) return;
    ctx.strokeStyle = `rgba(0,0,0,${c.alpha * 0.8})`;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(c.x + c.dx, c.y + c.dy);
    ctx.stroke();
    // Crack highlight
    ctx.strokeStyle = `rgba(255,255,255,${c.alpha * 0.2})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(c.x+1, c.y+1);
    ctx.lineTo(c.x + c.dx+1, c.y + c.dy+1);
    ctx.stroke();
  });

  // Glow when step complete
  if (gameState.progress >= 1) {
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.1 * Math.sin(Date.now()/200);
    ctx.shadowColor = '#c9a84c';
    ctx.shadowBlur = 40;
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(cx - w/2 - 5, cy - h/2 - 5, w + 10, h + 10, 12);
    ctx.stroke();
    ctx.restore();
  }
}

function drawOverlays() {
  const step = gameState.data.steps[gameState.stepIdx];
  if (step.action === 'scan' || step.action === 'xray') {
    // Scan line
    const scanY = gameState.artifact.cy - gameState.artifact.h/2 + (Date.now() % 2000) / 2000 * gameState.artifact.h;
    ctx.save();
    ctx.globalAlpha = 0.5;
    const sg = ctx.createLinearGradient(0, scanY-15, 0, scanY+15);
    sg.addColorStop(0, 'rgba(0,255,100,0)');
    sg.addColorStop(0.5, 'rgba(0,255,100,0.6)');
    sg.addColorStop(1, 'rgba(0,255,100,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(gameState.artifact.cx - gameState.artifact.w/2, scanY-15, gameState.artifact.w, 30);
    ctx.restore();
  }

  if (step.action === 'fill') {
    // Highlight unfixed cracks
    gameState.cracks.forEach(c => {
      if (c.fixed) return;
      ctx.save();
      ctx.globalAlpha = 0.3 + 0.2*Math.sin(Date.now()/300);
      ctx.strokeStyle = '#ffcc00';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(c.x, c.y);
      ctx.lineTo(c.x + c.dx, c.y + c.dy);
      ctx.stroke();
      ctx.restore();
    });
  }
}

function drawBrushStrokes() {
  gameState.brushStrokes.forEach(stroke => {
    if (stroke.length < 2) return;
    ctx.save();
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(stroke[0].x, stroke[0].y);
    for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
    ctx.stroke();
    ctx.restore();
    // Fade out
    if (stroke.age !== undefined) stroke.age++;
  });
  gameState.brushStrokes = gameState.brushStrokes.filter(s => !s.age || s.age < 40);
}

function drawSpray() {
  gameState.sprayDrops.forEach(d => {
    d.alpha -= 0.04;
    ctx.save();
    ctx.globalAlpha = d.alpha;
    ctx.fillStyle = '#88ccff';
    ctx.beginPath();
    ctx.arc(d.x += d.vx, d.y += d.vy, d.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  gameState.sprayDrops = gameState.sprayDrops.filter(d => d.alpha > 0);
}

function drawParticles() {
  gameState.particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.alpha -= 0.025;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  gameState.particles = gameState.particles.filter(p => p.alpha > 0);
}

function drawEffects() {
  const now = Date.now();
  gameState.effects.forEach(e => {
    const age = (now - e.t) / 600;
    if (age > 1) return;
    ctx.save();
    ctx.globalAlpha = 1 - age;
    ctx.fillStyle = e.color || '#c9a84c';
    ctx.font = `bold ${16 + age * 8}px "Noto Serif KR", serif`;
    ctx.textAlign = 'center';
    ctx.fillText(e.text, e.x, e.y - age * 40);
    ctx.restore();
  });
  gameState.effects = gameState.effects.filter(e => Date.now() - e.t < 600);
}

function drawProgressArc() {
  const step = gameState.data.steps[gameState.stepIdx];
  const elapsed = Date.now() - gameState.stepStartTime;
  if (step.action === 'wait') {
    gameState.waitProgress = Math.min(elapsed / step.duration, 1);
    gameState.progress = gameState.waitProgress;
    if (gameState.progress >= 1 && !gameState.actionDone) advanceStep(0.8);
  }

  // Draw progress ring around artifact
  const cx = gameState.artifact.cx, cy = gameState.artifact.cy;
  const r = gameState.artifact.w * 0.65;
  ctx.save();
  ctx.strokeStyle = 'rgba(201,168,76,0.15)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.stroke();
  if (gameState.progress > 0) {
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#c9a84c';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + gameState.progress * Math.PI*2);
    ctx.stroke();
  }
  ctx.restore();
}

// ════════════════════════════════════════════
// INPUT HANDLING
// ════════════════════════════════════════════
canvas.addEventListener('mousedown', e => {
  gameState.isDown = true;
  const r = canvas.getBoundingClientRect();
  gameState.mx = e.clientX - r.left;
  gameState.my = e.clientY - r.top;
  gameState.dragPath = [{x: gameState.mx, y: gameState.my}];
  handleAction(gameState.mx, gameState.my, 'down');
});
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  gameState.mx = e.clientX - r.left;
  gameState.my = e.clientY - r.top;
  if (gameState.isDown) {
    gameState.dragPath.push({x: gameState.mx, y: gameState.my});
    handleAction(gameState.mx, gameState.my, 'move');
  }
});
canvas.addEventListener('mouseup', e => {
  gameState.isDown = false;
  handleAction(gameState.mx, gameState.my, 'up');
  if (gameState.dragPath.length > 10) evaluateDrag();
  gameState.dragPath = [];
});

// Touch support
canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; const r = canvas.getBoundingClientRect(); gameState.isDown=true; gameState.mx=t.clientX-r.left; gameState.my=t.clientY-r.top; gameState.dragPath=[{x:gameState.mx,y:gameState.my}]; handleAction(gameState.mx,gameState.my,'down'); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); const t=e.touches[0]; const r=canvas.getBoundingClientRect(); gameState.mx=t.clientX-r.left; gameState.my=t.clientY-r.top; gameState.dragPath.push({x:gameState.mx,y:gameState.my}); handleAction(gameState.mx,gameState.my,'move'); }, {passive:false});
canvas.addEventListener('touchend', e => { e.preventDefault(); gameState.isDown=false; handleAction(gameState.mx,gameState.my,'up'); if(gameState.dragPath.length>10) evaluateDrag(); gameState.dragPath=[]; }, {passive:false});

function handleAction(x, y, type) {
  const step = gameState.data.steps[gameState.stepIdx];
  const { cx, cy, w, h } = gameState.artifact;
  const onArtifact = x > cx-w/2 && x < cx+w/2 && y > cy-h/2 && y < cy+h/2;

  switch(step.action) {
    case 'brush':
    case 'scrub':
      if (type === 'move' && gameState.isDown && onArtifact) {
        gameState.brushStrokes.push([{x,y},{x:x+1,y:y+1}]);
        // Fade nearby dirt
        gameState.dirtPatches.forEach(d => {
          const dist = Math.hypot(d.x-x, d.y-y);
          if (dist < d.r + 20) d.alpha = Math.max(0, d.alpha - 0.04);
        });
        gameState.rustSpots && gameState.rustSpots.forEach(r => {
          const dist = Math.hypot(r.x-x, r.y-y);
          if (dist < r.r + 15) r.alpha = Math.max(0, r.alpha - 0.03);
        });
        addProgress(0.008);
        spawnDustParticle(x, y);
      }
      break;

    case 'spray':
      if (gameState.isDown && onArtifact) {
        for (let i = 0; i < 4; i++) {
          gameState.sprayDrops.push({ x, y, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3, r:2+Math.random()*3, alpha:0.8 });
        }
        addProgress(0.005);
      }
      break;

    case 'fill':
    case 'repair':
      if (type === 'down') {
        gameState.cracks.forEach(c => {
          const dist = Math.hypot(c.x-x, c.y-y);
          if (dist < 25) {
            c.fixed = true;
            c.alpha = 0;
            addProgress(0.25);
            spawnStarParticle(x, y);
            showEffect(x, y, '+50', '#c9a84c');
            gameState.score += 50;
          }
        });
      }
      break;

    case 'scan':
      if (type === 'move' && gameState.isDown && onArtifact) {
        addProgress(0.007);
      }
      break;

    case 'soak':
    case 'hold':
      if (gameState.isDown && onArtifact) {
        addProgress(0.006);
      }
      break;

    case 'photo':
    case 'place':
      if (type === 'down' && onArtifact) {
        addProgress(0.5);
        spawnStarParticle(x, y);
      }
      break;
  }
}

function addProgress(amt) {
  gameState.progress = Math.min(1, gameState.progress + amt);
  document.getElementById('accuracy-bar').style.width = (gameState.progress * 100) + '%';
  document.getElementById('accuracy-bar').style.background = gameState.progress > 0.7 ? '#3a6b35' : gameState.progress > 0.4 ? '#8b6914' : '#7a1515';
  if (gameState.progress >= 1 && !gameState.actionDone) {
    advanceStep(1.0);
  }
}

function evaluateDrag() {
  const path = gameState.dragPath;
  if (path.length < 5) return;
  // Calculate coverage over artifact
  const { cx, cy, w, h } = gameState.artifact;
  const inArtifact = path.filter(p => p.x > cx-w/2 && p.x < cx+w/2 && p.y > cy-h/2 && p.y < cy+h/2);
  const coverage = inArtifact.length / path.length;
  if (coverage > 0.5) addProgress(0.06);
}

// ════════════════════════════════════════════
// STEP ADVANCEMENT
// ════════════════════════════════════════════
function advanceStep(quality) {
  if (gameState.actionDone) return;
  gameState.actionDone = true;

  const stepScore = Math.round(quality * 200);
  gameState.score += stepScore;
  gameState.combo++;
  gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);
  gameState.totalAcc += quality;
  gameState.stepCount++;

  showEffect(gameState.artifact.cx, gameState.artifact.cy - 60, quality >= 0.9 ? '완벽! PERFECT!' : quality >= 0.7 ? '좋아요 GREAT!' : '통과 OK', '#c9a84c');
  spawnStarParticle(gameState.artifact.cx, gameState.artifact.cy);

  playStepSound();
  document.getElementById('hud-score').textContent = gameState.score + ' PT';

  setTimeout(() => {
    gameState.stepIdx++;
    if (gameState.stepIdx >= gameState.data.steps.length) {
      showResult();
    } else {
      gameState.progress = 0;
      gameState.actionDone = false;
      gameState.stepStartTime = Date.now();
      gameState.brushStrokes = [];
      renderTools();
      updateHUD();
      updateInstruction();
    }
  }, 1200);
}

function updateHUD() {
  const step = gameState.data.steps[gameState.stepIdx];
  document.getElementById('hud-artifact').textContent = gameState.data.name + ' · ' + step.label;
  document.getElementById('hud-step').textContent = `STEP ${gameState.stepIdx+1} / ${gameState.data.steps.length}`;
}

function updateInstruction() {
  const step = gameState.data.steps[gameState.stepIdx];
  const inst = document.getElementById('instruction');
  inst.innerHTML = `<span class="action-key">[${step.key}]</span> ${step.hint}`;
}

function updatePhysics() {}

// ════════════════════════════════════════════
// PARTICLES
// ════════════════════════════════════════════
function spawnDustParticle(x, y) {
  if (Math.random() > 0.3) return;
  gameState.particles.push({ x, y, vx:(Math.random()-0.5)*2, vy:-1-Math.random()*2, r:2+Math.random()*3, alpha:0.6, color:'rgba(180,150,100,0.8)' });
}

function spawnStarParticle(x, y) {
  for (let i = 0; i < 10; i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = 2 + Math.random()*4;
    gameState.particles.push({ x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-2, r:3+Math.random()*4, alpha:1, color:'#c9a84c' });
  }
}

function showEffect(x, y, text, color) {
  gameState.effects.push({ x, y, text, color, t:Date.now() });
}

function playStepSound() {
  try {
    const ctx2 = new (window.AudioContext||window.webkitAudioContext)();
    [523, 659, 784].forEach((f,i) => {
      const o = ctx2.createOscillator(), g = ctx2.createGain();
      o.connect(g); g.connect(ctx2.destination);
      o.frequency.value = f; o.type = 'sine';
      g.gain.setValueAtTime(0.1, ctx2.currentTime+i*0.08);
      g.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime+i*0.08+0.2);
      o.start(ctx2.currentTime+i*0.08); o.stop(ctx2.currentTime+i*0.08+0.25);
    });
  } catch(e){}
}

// ════════════════════════════════════════════
// RESULT
// ════════════════════════════════════════════
function showResult() {
  cancelAnimationFrame(gameState.animFrame);
  gameState.animFrame = null;

  const acc = gameState.stepCount > 0 ? Math.round((gameState.totalAcc / gameState.stepCount) * 100) : 0;
  const elapsed = ((Date.now() - gameState.startTime) / 1000).toFixed(1);
  const grade = acc >= 95 ? 'S' : acc >= 85 ? 'A' : acc >= 70 ? 'B' : acc >= 55 ? 'C' : 'D';
  const titles = { S:'완벽한 보존처리!', A:'훌륭한 작업이에요!', B:'좋은 처리였습니다', C:'더 연습이 필요해요', D:'다시 도전해보세요' };

  document.getElementById('result-grade').textContent = grade;
  document.getElementById('result-title').textContent = titles[grade];
  document.getElementById('r-score').textContent = gameState.score;
  document.getElementById('r-acc').textContent = acc + '%';
  document.getElementById('r-time').textContent = elapsed + 's';
  document.getElementById('r-combo').textContent = gameState.maxCombo;

  showScreen('result');
}
</script>
