<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>05 전통문양 인생네컷 | 국가유산</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#e8d5a3;font-family:"Courier New",monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-top:56px}
.bk{position:fixed;top:16px;left:16px;color:#a08040;text-decoration:none;font:13px "Courier New";letter-spacing:2px;border:1px solid #a08040;padding:7px 14px;z-index:99;transition:.3s}
.bk:hover{background:#a08040;color:#050505}
.tt{position:fixed;top:18px;left:50%;transform:translateX(-50%);font:13px "Courier New";letter-spacing:3px;color:#c8a84b;z-index:99;white-space:nowrap}
#cam-wrap{position:relative;width:min(480px,95vw);height:min(360px,71vw);background:#0a0a0a;border:1px solid rgba(200,168,75,.3)}
#cam-wrap video,#cam-wrap #overlay{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#overlay{pointer-events:none}
#no-cam{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#5a4a2a;font:12px "Courier New";letter-spacing:2px;gap:8px}
.pat-row{display:flex;gap:8px;margin:12px 0}
.pp{padding:6px 14px;border:1px solid #a08040;color:#a08040;background:transparent;font:12px "Courier New";cursor:pointer;transition:.3s;letter-spacing:1px}
.pp:hover,.pp.on{background:#a08040;color:#050505}
.btn-row{display:flex;gap:10px;margin-bottom:16px}
.shoot-btn{padding:10px 28px;border:1px solid #c8a84b;color:#c8a84b;background:transparent;font:14px "Courier New";letter-spacing:3px;cursor:pointer;transition:.3s}
.shoot-btn:hover{background:#c8a84b;color:#050505}
.shoot-btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.dl-btn{padding:10px 22px;border:1px solid #2D7A3A;color:#2D7A3A;background:transparent;font:12px "Courier New";letter-spacing:2px;cursor:pointer;transition:.3s;display:none}
.dl-btn:hover{background:#2D7A3A;color:#050505}
#countdown{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:500;pointer-events:none}
#count-num{font-size:120px;color:#c8a84b;font-family:"Courier New";text-shadow:0 0 40px #c8a84b;animation:pop .3s ease}
@keyframes pop{from{transform:scale(1.4)}to{transform:scale(1)}}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:600;transition:opacity .08s}
#strip-wrap{margin-bottom:24px;display:none}
#strip-wrap h3{font:12px "Courier New";letter-spacing:3px;color:#a08040;margin-bottom:10px;text-align:center}
#strip{border:1px solid rgba(200,168,75,.3)}
</style></head><body>
<a href="../index.html" class="bk">← BACK</a>
<div class="tt">05 · 전통문양 인생네컷</div>

<div id="cam-wrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div id="no-cam"><span style="font-size:28px">📷</span><span>카메라를 찾는 중...</span><span id="cam-status"></span></div>
</div>

<div class="pat-row">
  <span style="color:#5a4a2a;line-height:34px;font-size:11px">문양 ›</span>
  <button class="pp on" data-pt="0">창살</button>
  <button class="pp" data-pt="1">연화</button>
  <button class="pp" data-pt="2">단청</button>
  <button class="pp" data-pt="3">태극</button>
</div>

<div class="btn-row">
  <button class="shoot-btn" id="shoot-btn">📸 촬영 시작</button>
  <button class="dl-btn" id="dl-btn">⬇ 다운로드</button>
</div>

<div id="strip-wrap">
  <h3>· 인생네컷 결과 ·</h3>
  <canvas id="strip"></canvas>
</div>

<div id="countdown"><div id="count-num">3</div></div>
<div id="flash"></div>

<script>
const vid=document.getElementById("vid");
const ov=document.getElementById("overlay");
const ovX=ov.getContext("2d");
const shootBtn=document.getElementById("shoot-btn");
const dlBtn=document.getElementById("dl-btn");
const stripWrap=document.getElementById("strip-wrap");
const strip=document.getElementById("strip");
const stripX=strip.getContext("2d");
const noCam=document.getElementById("no-cam");
const cdEl=document.getElementById("countdown");
const cnEl=document.getElementById("count-num");
const flashEl=document.getElementById("flash");

let curPat=0,frames=[],hasCamera=false,animId=null;

document.querySelectorAll(".pp").forEach(b=>{b.onclick=()=>{curPat=+b.dataset.pt;document.querySelectorAll(".pp").forEach(x=>x.classList.remove("on"));b.classList.add("on");}});

// Pattern overlay functions
function drawChangsal(ctx,w,h){
  ctx.strokeStyle="rgba(200,168,75,.55)";ctx.lineWidth=1.5;
  const sp=w/10;
  for(let x=-h;x<w+h;x+=sp){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+h,h);ctx.stroke();}
  for(let x=-h;x<w+h;x+=sp){ctx.beginPath();ctx.moveTo(x+h,0);ctx.lineTo(x,h);ctx.stroke();}
  ctx.strokeStyle="rgba(200,168,75,.7)";ctx.lineWidth=3;ctx.strokeRect(10,10,w-20,h-20);
  ctx.strokeRect(18,18,w-36,h-36);
}
function drawLotus(ctx,w,h){
  ctx.strokeStyle="rgba(196,55,42,.7)";ctx.lineWidth=3;ctx.strokeRect(12,12,w-24,h-24);
  [[30,30],[w-30,30],[w-30,h-30],[30,h-30]].forEach(([lx,ly])=>{
    ctx.save();ctx.translate(lx,ly);
    for(let i=0;i<8;i++){ctx.rotate(Math.PI/4);ctx.beginPath();ctx.ellipse(0,-16,4,14,0,0,Math.PI*2);ctx.fillStyle="rgba(196,55,42,.5)";ctx.fill();}
    ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fillStyle="#D4A017";ctx.fill();
    ctx.restore();
  });
}
function drawDancheong(ctx,w,h){
  const cols=["rgba(43,75,140,.5)","rgba(196,55,42,.5)","rgba(212,160,23,.5)","rgba(45,122,58,.5)"];
  const bh=h*.12;
  [0,1,2,3].forEach(i=>{ctx.fillStyle=cols[i];ctx.fillRect(0,i*(bh+2),w,bh);ctx.fillRect(0,h-i*(bh+2)-bh,w,bh);});
  ctx.strokeStyle="rgba(200,168,75,.6)";ctx.lineWidth=2;ctx.strokeRect(h*.14,h*.14,w-h*.28,h*.72);
}
function drawTaegeuk(ctx,w,h){
  const cx=w/2,cy=h/2,s=Math.min(w,h)*.3;
  ctx.save();ctx.translate(cx,cy);
  ctx.beginPath();ctx.arc(0,-s/2,s/2,0,Math.PI);ctx.arc(0,s/2,s/2,Math.PI,0);ctx.fillStyle="rgba(196,55,42,.65)";ctx.fill();
  ctx.beginPath();ctx.arc(0,-s/2,s/2,Math.PI,0);ctx.arc(0,s/2,s/2,0,Math.PI);ctx.fillStyle="rgba(43,75,140,.65)";ctx.fill();
  ctx.beginPath();ctx.arc(0,-s/2,s/4,0,Math.PI*2);ctx.fillStyle="rgba(43,75,140,.8)";ctx.fill();
  ctx.beginPath();ctx.arc(0,s/2,s/4,0,Math.PI*2);ctx.fillStyle="rgba(196,55,42,.8)";ctx.fill();
  ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.strokeStyle="rgba(200,168,75,.5)";ctx.lineWidth=2;ctx.stroke();
  ctx.restore();
  ctx.strokeStyle="rgba(200,168,75,.5)";ctx.lineWidth=2;ctx.strokeRect(12,12,w-24,h-24);
}
const PAT_FNS=[drawChangsal,drawLotus,drawDancheong,drawTaegeuk];

function drawOverlay(){
  if(!ov.width)return;
  ovX.clearRect(0,0,ov.width,ov.height);
  PAT_FNS[curPat](ovX,ov.width,ov.height);
}

async function initCam(){
  document.getElementById("cam-status").textContent="권한 요청 중...";
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:"user"}});
    vid.srcObject=s;
    vid.onloadedmetadata=()=>{
      vid.play();
      hasCamera=true;
      noCam.style.display="none";
      const wrap=document.getElementById("cam-wrap");
      ov.width=wrap.offsetWidth;ov.height=wrap.offsetHeight;
      (function loop(){animId=requestAnimationFrame(loop);drawOverlay();})();
    };
  }catch(e){
    document.getElementById("cam-status").textContent="카메라 없음 — 데모 모드";
    hasCamera=false;
    const wrap=document.getElementById("cam-wrap");
    ov.width=wrap.offsetWidth;ov.height=wrap.offsetHeight;
    drawOverlay();
  }
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
async function countdown(n){
  cdEl.style.display="flex";
  for(let i=n;i>0;i--){cnEl.textContent=i;cnEl.style.animation="none";cnEl.offsetHeight;cnEl.style.animation="pop .3s ease";await sleep(900);}
  cdEl.style.display="none";
}
function doFlash(){flashEl.style.opacity=".9";setTimeout(()=>flashEl.style.opacity="0",150);}

function captureFrame(){
  const fw=ov.width,fh=ov.height;
  const fc=document.createElement("canvas");fc.width=fw;fc.height=fh;
  const fc2=fc.getContext("2d");
  if(hasCamera) fc2.drawImage(vid,0,0,fw,fh);
  else{fc2.fillStyle="#111";fc2.fillRect(0,0,fw,fh);fc2.fillStyle="#2a2a2a";fc2.font="24px Courier New";fc2.textAlign="center";fc2.fillText("DEMO",fw/2,fh/2);}
  PAT_FNS[curPat](fc2,fw,fh);
  fc2.fillStyle="rgba(200,168,75,.3)";fc2.fillRect(0,0,fw,24);
  fc2.fillStyle="#c8a84b";fc2.font="10px Courier New";fc2.textAlign="left";fc2.fillText("· 국가유산 디지털 체험관 ·",8,16);
  return fc;
}

async function shoot(){
  shootBtn.disabled=true;frames=[];stripWrap.style.display="none";dlBtn.style.display="none";
  for(let i=0;i<4;i++){
    await countdown(3);doFlash();
    frames.push(captureFrame());
    if(i<3)await sleep(600);
  }
  buildStrip();
  shootBtn.disabled=false;
}

function buildStrip(){
  const fw=ov.width,fh=ov.height;
  const pad=8,gap=6,labelH=32;
  strip.width=fw*4+gap*3+pad*2;strip.height=fh+pad*2+labelH;
  stripX.fillStyle="#111";stripX.fillRect(0,0,strip.width,strip.height);
  // film holes
  stripX.fillStyle="#222";
  for(let i=0;i<30;i++){stripX.beginPath();stripX.arc(i*(strip.width/30)+8,6,4,0,Math.PI*2);stripX.fill();stripX.beginPath();stripX.arc(i*(strip.width/30)+8,strip.height-6,4,0,Math.PI*2);stripX.fill();}
  frames.forEach((f,i)=>{const x=pad+i*(fw+gap);stripX.drawImage(f,x,labelH/2);});
  // label
  stripX.fillStyle="#c8a84b";stripX.font="bold 11px Courier New";stripX.textAlign="center";
  stripX.fillText("국가유산 디지털 체험관 · NATIONAL HERITAGE · "+new Date().toLocaleDateString("ko-KR"),strip.width/2,strip.height-8);
  stripWrap.style.display="block";dlBtn.style.display="inline-block";
}

dlBtn.onclick=()=>{const a=document.createElement("a");a.href=strip.toDataURL("image/png");a.download="heritage-photobooth.png";a.click();};
shootBtn.onclick=shoot;
initCam();
window.addEventListener("resize",()=>{const w=document.getElementById("cam-wrap");if(w){ov.width=w.offsetWidth;ov.height=w.offsetHeight;}});
</script></body></html>
