<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>전통문양 인생네컷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@300;400&display=swap');
:root{--gold:#c9a84c;--ink:#07040200;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07040a;color:#f5efe0;font-family:'Noto Sans KR',sans-serif;height:100vh;display:flex;overflow:hidden;}
/* LEFT: camera + preview */
#left{width:52%;display:flex;flex-direction:column;background:#040208;border-right:1px solid rgba(201,168,76,.12);}
#cam-wrap{flex:1;position:relative;overflow:hidden;}
#vid{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#cam-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.cam-ui{position:absolute;inset:0;pointer-events:none;}
#countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Noto Serif KR',serif;font-size:120px;font-weight:900;color:rgba(201,168,76,.9);text-shadow:0 0 60px rgba(201,168,76,.6);display:none;animation:pop .8s ease-out;}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(1.5);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:.8}}
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .12s;}
.cam-frame-deco{position:absolute;inset:0;border:2px solid rgba(201,168,76,.2);pointer-events:none;}
.cam-frame-deco::before,.cam-frame-deco::after{content:'';position:absolute;width:28px;height:28px;}
.cam-frame-deco::before{top:4px;left:4px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);}
.cam-frame-deco::after{bottom:4px;right:4px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);}
#controls{padding:14px;background:rgba(0,0,0,.7);border-top:1px solid rgba(201,168,76,.1);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ctrl-btn{background:none;border:1px solid rgba(201,168,76,.3);color:rgba(201,168,76,.8);padding:8px 18px;font-family:'Courier New',monospace;font-size:12px;cursor:pointer;letter-spacing:.1em;transition:all .2s;}
.ctrl-btn:hover{background:rgba(201,168,76,.1);border-color:var(--gold);}
.ctrl-btn.primary{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold);}
.ctrl-btn.primary:hover{background:rgba(201,168,76,.25);}
.frame-pick{display:flex;gap:6px;margin-left:auto;}
.fp-btn{width:32px;height:32px;border:1px solid rgba(201,168,76,.2);background:rgba(0,0,0,.6);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.fp-btn:hover,.fp-btn.sel{border-color:var(--gold);background:rgba(201,168,76,.12);}
/* RIGHT: strip output */
#right{width:48%;display:flex;flex-direction:column;overflow:hidden;}
#strip-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden;}
#strip-canvas{max-width:100%;max-height:100%;border:1px solid rgba(201,168,76,.2);box-shadow:0 0 30px rgba(0,0,0,.6);}
#right-controls{padding:12px 14px;background:rgba(0,0,0,.7);border-top:1px solid rgba(201,168,76,.1);display:flex;gap:8px;align-items:center;justify-content:center;}
#shot-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:0 14px 10px;}
.shot-thumb{aspect-ratio:4/3;background:rgba(15,10,20,.8);border:1px solid rgba(201,168,76,.15);position:relative;overflow:hidden;cursor:pointer;transition:border-color .2s;}
.shot-thumb:hover,.shot-thumb.sel{border-color:var(--gold);}
.shot-thumb canvas{width:100%;height:100%;display:block;}
.shot-thumb .num{position:absolute;top:4px;left:4px;font-size:9px;color:rgba(201,168,76,.7);font-family:'Courier New',monospace;}
.shot-thumb.empty{display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(245,239,224,.2);letter-spacing:.15em;font-family:'Courier New',monospace;}
#status-bar{padding:6px 14px;font-size:9px;color:rgba(0,255,65,.4);font-family:'Courier New',monospace;letter-spacing:.08em;}
</style>
</head>
<body>
<div id="left">
  <div id="cam-wrap">
    <video id="vid" autoplay muted playsinline></video>
    <canvas id="cam-canvas"></canvas>
    <div class="cam-ui">
      <div class="cam-frame-deco"></div>
      <div id="countdown"></div>
      <div id="flash"></div>
    </div>
  </div>
  <div id="controls">
    <button class="ctrl-btn primary" id="shoot-btn" onclick="startCountdown()">📸 촬영</button>
    <button class="ctrl-btn" onclick="clearShots()">🗑 초기화</button>
    <span style="font-size:10px;color:rgba(245,239,224,.35);font-family:'Courier New',monospace;" id="shot-count">0/4</span>
    <div class="frame-pick" id="frame-pick"></div>
  </div>
  <div id="status-bar">웹캠 연결 중...</div>
</div>
<div id="right">
  <div id="shot-grid">
    <div class="shot-thumb empty" id="thumb-0"><span>01</span></div>
    <div class="shot-thumb empty" id="thumb-1"><span>02</span></div>
    <div class="shot-thumb empty" id="thumb-2"><span>03</span></div>
    <div class="shot-thumb empty" id="thumb-3"><span>04</span></div>
  </div>
  <div id="strip-wrap">
    <canvas id="strip-canvas" width="480" height="720"></canvas>
  </div>
  <div id="right-controls">
    <button class="ctrl-btn primary" onclick="downloadStrip()">⬇ 다운로드</button>
    <button class="ctrl-btn" onclick="renderStrip()">↻ 새로고침</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// FRAME DESIGNS (procedural)
// ═══════════════════════════════════════
const FRAMES = [
  { name:'연꽃', key:'lotus',  mainColor:'#8b1a1a', accentColor:'#c9a84c', bgColor:'#1a0808' },
  { name:'청화',  key:'cheong', mainColor:'#1a3a6e', accentColor:'#88c0e0', bgColor:'#080d1a' },
  { name:'단청',  key:'danch',  mainColor:'#2a5e28', accentColor:'#e8c830', bgColor:'#081208' },
  { name:'해금',  key:'haegum', mainColor:'#4a2a7a', accentColor:'#e080c0', bgColor:'#0a0812' },
];
let selectedFrame = 0;
let shots = [null, null, null, null];
let shotCount = 0;
let countdownActive = false;

// Build frame picker
const framePick = document.getElementById('frame-pick');
FRAMES.forEach((f, i) => {
  const btn = document.createElement('div');
  btn.className = 'fp-btn' + (i === 0 ? ' sel' : '');
  btn.textContent = f.name[0];
  btn.title = f.name;
  btn.style.color = f.mainColor;
  btn.style.borderColor = i === 0 ? f.accentColor : '';
  btn.onclick = () => {
    document.querySelectorAll('.fp-btn').forEach(b => { b.classList.remove('sel'); b.style.borderColor = ''; });
    btn.classList.add('sel'); btn.style.borderColor = f.accentColor;
    selectedFrame = i;
    renderStrip();
  };
  framePick.appendChild(btn);
});

// ═══════════════════════════════════════
// WEBCAM
// ═══════════════════════════════════════
const vid = document.getElementById('vid');
const camCanvas = document.getElementById('cam-canvas');
const camCtx = camCanvas.getContext('2d');

async function initCam() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
    vid.srcObject = stream;
    await vid.play();
    document.getElementById('status-bar').textContent = '웹캠 준비 완료 · CAMERA READY';
    drawCamOverlay();
  } catch(e) {
    document.getElementById('status-bar').textContent = '웹캠 오류: ' + e.message;
  }
}

function resizeCamCanvas() {
  const wrap = document.getElementById('cam-wrap');
  camCanvas.width = wrap.offsetWidth;
  camCanvas.height = wrap.offsetHeight;
}
window.addEventListener('resize', resizeCamCanvas);
setTimeout(resizeCamCanvas, 100);

let overlayFrame = 0;
function drawCamOverlay() {
  requestAnimationFrame(drawCamOverlay);
  overlayFrame++;
  camCtx.clearRect(0, 0, camCanvas.width, camCanvas.height);
  const fr = FRAMES[selectedFrame];
  const t = Date.now() * 0.001;
  camCtx.save();
  // Animated corner ornaments
  const corners = [[8,8,1,1],[camCanvas.width-8,8,-1,1],[8,camCanvas.height-8,1,-1],[camCanvas.width-8,camCanvas.height-8,-1,-1]];
  corners.forEach(([cx,cy,sx,sy]) => {
    camCtx.save();
    camCtx.translate(cx, cy);
    camCtx.strokeStyle = fr.accentColor + 'cc';
    camCtx.lineWidth = 2;
    camCtx.beginPath();
    camCtx.moveTo(0, sy*28); camCtx.lineTo(0, 0); camCtx.lineTo(sx*28, 0);
    camCtx.stroke();
    // Animated dot
    camCtx.fillStyle = fr.accentColor;
    camCtx.globalAlpha = 0.5 + 0.5 * Math.sin(t * 2);
    camCtx.beginPath(); camCtx.arc(0, 0, 3, 0, Math.PI*2); camCtx.fill();
    camCtx.restore();
  });
  // Grid guide
  camCtx.globalAlpha = 0.06;
  camCtx.strokeStyle = fr.accentColor;
  camCtx.lineWidth = 1;
  [1/3, 2/3].forEach(r => {
    camCtx.beginPath(); camCtx.moveTo(r*camCanvas.width, 0); camCtx.lineTo(r*camCanvas.width, camCanvas.height); camCtx.stroke();
    camCtx.beginPath(); camCtx.moveTo(0, r*camCanvas.height); camCtx.lineTo(camCanvas.width, r*camCanvas.height); camCtx.stroke();
  });
  camCtx.restore();
}

// ═══════════════════════════════════════
// COUNTDOWN + CAPTURE
// ═══════════════════════════════════════
function startCountdown() {
  if (countdownActive || shotCount >= 4) return;
  countdownActive = true;
  document.getElementById('shoot-btn').disabled = true;
  let count = 3;
  const el = document.getElementById('countdown');
  el.style.display = 'block';
  function tick() {
    el.textContent = count;
    el.style.animation = 'none'; void el.offsetWidth; el.style.animation = 'pop .8s ease-out';
    if (count <= 0) {
      el.style.display = 'none';
      capture();
      countdownActive = false;
      document.getElementById('shoot-btn').disabled = false;
      return;
    }
    count--;
    setTimeout(tick, 900);
  }
  tick();
}

function capture() {
  // Flash
  const flash = document.getElementById('flash');
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 150);
  // Shutter sound
  playShutter();
  // Capture from video
  const cw = vid.videoWidth || 640, ch = vid.videoHeight || 480;
  const offCanvas = document.createElement('canvas');
  offCanvas.width = cw; offCanvas.height = ch;
  const offCtx = offCanvas.getContext('2d');
  offCtx.save(); offCtx.translate(cw, 0); offCtx.scale(-1, 1);
  offCtx.drawImage(vid, 0, 0, cw, ch);
  offCtx.restore();
  // Crop to 4:3
  const tW = Math.min(cw, ch * 4/3);
  const tH = tW * 3/4;
  const tx = (cw - tW) / 2, ty = (ch - tH) / 2;
  const shotCanvas = document.createElement('canvas');
  shotCanvas.width = 480; shotCanvas.height = 360;
  const shotCtx = shotCanvas.getContext('2d');
  shotCtx.drawImage(offCanvas, tx, ty, tW, tH, 0, 0, 480, 360);
  // Store
  const idx = shotCount;
  shots[idx] = shotCanvas;
  shotCount++;
  updateThumb(idx, shotCanvas);
  document.getElementById('shot-count').textContent = shotCount + '/4';
  renderStrip();
  if (shotCount < 4) setTimeout(startCountdown, 1200);
}

function updateThumb(idx, srcCanvas) {
  const thumb = document.getElementById('thumb-' + idx);
  thumb.classList.remove('empty');
  thumb.innerHTML = `<span class="num">0${idx+1}</span>`;
  const tc = document.createElement('canvas');
  tc.width = thumb.offsetWidth; tc.height = thumb.offsetHeight;
  tc.getContext('2d').drawImage(srcCanvas, 0, 0, tc.width, tc.height);
  thumb.appendChild(tc);
}

function clearShots() {
  shots = [null, null, null, null]; shotCount = 0;
  document.getElementById('shot-count').textContent = '0/4';
  for (let i = 0; i < 4; i++) {
    const t = document.getElementById('thumb-' + i);
    t.className = 'shot-thumb empty'; t.innerHTML = `<span>0${i+1}</span>`;
  }
  renderStrip();
}

// ═══════════════════════════════════════
// STRIP RENDERING
// ═══════════════════════════════════════
const stripCanvas = document.getElementById('strip-canvas');
const sCtx = stripCanvas.getContext('2d');

function renderStrip() {
  const fr = FRAMES[selectedFrame];
  const SW = 480, SH = 720;
  sCtx.clearRect(0, 0, SW, SH);

  // Background
  sCtx.fillStyle = fr.bgColor;
  sCtx.fillRect(0, 0, SW, SH);

  // Border pattern
  drawFrameBorder(sCtx, fr, SW, SH);

  // Title area (top)
  drawTitle(sCtx, fr, SW);

  // 4 photos (2x2 grid)
  const pad = 28, gap = 10;
  const photoW = (SW - pad*2 - gap) / 2;
  const photoH = photoW * 0.75;
  const topY = 100;
  for (let i = 0; i < 4; i++) {
    const gx = i % 2, gy = Math.floor(i / 2);
    const px = pad + gx * (photoW + gap);
    const py = topY + gy * (photoH + gap);
    // Photo slot
    sCtx.fillStyle = 'rgba(255,255,255,0.04)';
    sCtx.fillRect(px, py, photoW, photoH);
    if (shots[i]) {
      sCtx.drawImage(shots[i], px, py, photoW, photoH);
      // Vignette
      const vig = sCtx.createRadialGradient(px+photoW/2, py+photoH/2, photoW*0.25, px+photoW/2, py+photoH/2, photoW*0.7);
      vig.addColorStop(0, 'rgba(0,0,0,0)'); vig.addColorStop(1, 'rgba(0,0,0,0.3)');
      sCtx.fillStyle = vig; sCtx.fillRect(px, py, photoW, photoH);
    } else {
      // Empty slot
      sCtx.strokeStyle = fr.mainColor + '44'; sCtx.lineWidth = 1;
      sCtx.strokeRect(px, py, photoW, photoH);
      sCtx.fillStyle = fr.mainColor + '22';
      sCtx.font = '11px Courier New'; sCtx.textAlign = 'center';
      sCtx.fillText('0' + (i+1), px + photoW/2, py + photoH/2 + 4);
    }
    // Photo border
    sCtx.strokeStyle = fr.accentColor + '55'; sCtx.lineWidth = 1.5;
    sCtx.strokeRect(px, py, photoW, photoH);
    drawPhotoCorners(sCtx, fr, px, py, photoW, photoH);
  }

  // Bottom decoration
  drawBottomDeco(sCtx, fr, SW, SH);
}

function drawFrameBorder(c, fr, W, H) {
  // Outer border
  c.strokeStyle = fr.mainColor + 'cc'; c.lineWidth = 3;
  c.strokeRect(4, 4, W-8, H-8);
  c.strokeStyle = fr.accentColor + '44'; c.lineWidth = 1;
  c.strokeRect(8, 8, W-16, H-16);
  // Pattern border - top/bottom bands
  const bh = 18;
  c.fillStyle = fr.mainColor + '33'; c.fillRect(0, 0, W, bh);
  c.fillRect(0, H-bh, W, bh);
  // Repeating ornament dots
  const dotCount = Math.floor(W / 16);
  for (let i = 0; i < dotCount; i++) {
    const x = (i + 0.5) / dotCount * W;
    c.fillStyle = i % 3 === 0 ? fr.accentColor + 'bb' : fr.mainColor + '88';
    c.beginPath(); c.arc(x, bh/2, i%3===0?3:2, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(x, H-bh/2, i%3===0?3:2, 0, Math.PI*2); c.fill();
  }
}

function drawTitle(c, fr, W) {
  // Title background
  c.fillStyle = fr.mainColor + '22'; c.fillRect(0, 18, W, 80);
  c.fillStyle = fr.accentColor; c.font = 'bold 28px "Noto Serif KR",serif';
  c.textAlign = 'center'; c.fillText('전통문양 인생네컷', W/2, 55);
  c.fillStyle = fr.mainColor + 'cc'; c.font = '10px Courier New';
  c.fillText('TRADITIONAL PATTERN PHOTO STRIP', W/2, 76);
  // Decorative line
  c.strokeStyle = fr.accentColor + '88'; c.lineWidth = 1;
  c.beginPath(); c.moveTo(40, 88); c.lineTo(W-40, 88); c.stroke();
  // Small ornaments
  const ornX = [40, W/2, W-40];
  ornX.forEach(x => {
    c.fillStyle = fr.accentColor; c.beginPath(); c.arc(x, 88, 3, 0, Math.PI*2); c.fill();
  });
}

function drawPhotoCorners(c, fr, x, y, w, h) {
  const s = 12;
  const corners = [[x,y],[x+w,y],[x,y+h],[x+w,y+h]];
  corners.forEach(([cx,cy]) => {
    const sx = cx === x ? 1 : -1, sy = cy === y ? 1 : -1;
    c.strokeStyle = fr.accentColor; c.lineWidth = 2;
    c.beginPath(); c.moveTo(cx+sx*s, cy); c.lineTo(cx, cy); c.lineTo(cx, cy+sy*s); c.stroke();
  });
}

function drawBottomDeco(c, fr, W, H) {
  const bottomY = H - 88;
  c.strokeStyle = fr.accentColor + '55'; c.lineWidth = 1;
  c.beginPath(); c.moveTo(40, bottomY+8); c.lineTo(W-40, bottomY+8); c.stroke();
  // Date
  const date = new Date().toLocaleDateString('ko-KR');
  c.fillStyle = fr.accentColor + 'aa'; c.font = '10px Courier New'; c.textAlign = 'center';
  c.fillText(date + ' · 국가유산 체험관', W/2, bottomY + 30);
  // Logo
  c.fillStyle = fr.mainColor + 'bb'; c.font = 'bold 13px "Noto Serif KR",serif';
  c.fillText('國家遺産 · 디지털 체험관', W/2, bottomY + 55);
  // Bottom lotus ornament
  drawMiniLotus(c, W/2, bottomY + 72, 10, fr.accentColor, fr.mainColor);
}

function drawMiniLotus(c, x, y, r, col1, col2) {
  for (let i = 0; i < 8; i++) {
    const a = i/8*Math.PI*2; c.save(); c.translate(x,y); c.rotate(a);
    c.fillStyle = i%2===0?col1:col2; c.globalAlpha=0.7;
    c.beginPath(); c.ellipse(0,-r*.55,r*.2,r*.42,0,0,Math.PI*2); c.fill();
    c.restore();
  }
  c.beginPath(); c.arc(x,y,r*.22,0,Math.PI*2); c.fillStyle=col1; c.fill();
}

// ═══════════════════════════════════════
// DOWNLOAD
// ═══════════════════════════════════════
function downloadStrip() {
  renderStrip();
  const link = document.createElement('a');
  link.download = '전통문양인생네컷_' + new Date().toISOString().slice(0,10) + '.png';
  link.href = stripCanvas.toDataURL('image/png');
  link.click();
}

// ═══════════════════════════════════════
// SOUND
// ═══════════════════════════════════════
function playShutter() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    // Click
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.setValueAtTime(1200, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(400, ac.currentTime+0.06);
    o.type='square'; g.gain.setValueAtTime(0.18, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.08);
    o.start(); o.stop(ac.currentTime+0.1);
  } catch(e){}
}

initCam();
renderStrip();
</script>
</body></html>
