<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>단청 물결</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;}
#c{position:fixed;inset:0;width:100%;height:100%;}
video{position:fixed;top:-9999px;opacity:0;pointer-events:none;}
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;}
#ttl{position:absolute;top:16px;left:50%;transform:translateX(-50%);text-align:center;}
.tko{font-family:'Noto Serif KR',serif;font-size:clamp(18px,3.2vw,36px);font-weight:900;color:rgba(201,168,76,.88);letter-spacing:.3em;text-shadow:0 0 28px rgba(201,168,76,.5);}
.tsb{font-size:9px;color:rgba(245,239,224,.3);letter-spacing:.35em;margin-top:5px;font-family:'Courier New',monospace;}
#hint{position:absolute;bottom:88px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(245,239,224,.36);letter-spacing:.2em;text-align:center;animation:breathe 3s ease-in-out infinite;font-family:'Noto Serif KR',serif;white-space:nowrap;}
@keyframes breathe{0%,100%{opacity:.36}50%{opacity:.7}}
#dock{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:7px;pointer-events:all;}
.pb{width:50px;height:50px;border:1px solid rgba(201,168,76,.26);background:rgba(0,0,0,.62);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;gap:2px;backdrop-filter:blur(5px);}
.pb:hover,.pb.sel{border-color:rgba(201,168,76,.88);background:rgba(201,168,76,.12);transform:translateY(-3px);}
.pi{font-size:15px;line-height:1;}.pn{font-size:7px;color:rgba(245,239,224,.42);letter-spacing:.04em;font-family:'Courier New',monospace;}
#wb{position:absolute;top:16px;right:16px;pointer-events:all;border:1px solid rgba(201,168,76,.26);background:rgba(0,0,0,.62);color:rgba(201,168,76,.7);padding:5px 12px;font-size:9px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.1em;backdrop-filter:blur(4px);transition:all .2s;}
#wb:hover{border-color:#c9a84c;background:rgba(201,168,76,.1);}
#st{position:absolute;bottom:2px;left:8px;font-size:8px;color:rgba(0,255,65,.36);font-family:'Courier New',monospace;letter-spacing:.07em;}
#fcur{position:fixed;pointer-events:none;z-index:50;display:none;transform:translate(-50%,-50%);}
.co{position:absolute;width:46px;height:46px;opacity:.38;}.co svg{width:100%;height:100%;}
#c1{top:7px;left:7px;}#c2{top:7px;right:7px;transform:scaleX(-1);}
#c3{bottom:7px;left:7px;transform:scaleY(-1);}#c4{bottom:7px;right:7px;transform:scale(-1);}
</style></head>
<body>
<canvas id="c"></canvas>
<video id="vid" autoplay muted playsinline></video>
<div id="fcur"><svg width="42" height="42" viewBox="0 0 42 42"><circle cx="21" cy="21" r="17" fill="none" stroke="rgba(201,168,76,.75)" stroke-width="1.5"/><circle cx="21" cy="21" r="5" fill="rgba(201,168,76,.55)"/><circle cx="21" cy="21" r="2" fill="rgba(255,240,200,.9)"/></svg></div>
<div id="hud">
  <div class="co" id="c1"><svg viewBox="0 0 46 46" fill="none"><path d="M2 44L2 2L44 2" stroke="#c9a84c" stroke-width="1.5"/><circle cx="2" cy="2" r="2" fill="#c9a84c"/></svg></div>
  <div class="co" id="c2"><svg viewBox="0 0 46 46" fill="none"><path d="M2 44L2 2L44 2" stroke="#c9a84c" stroke-width="1.5"/><circle cx="2" cy="2" r="2" fill="#c9a84c"/></svg></div>
  <div class="co" id="c3"><svg viewBox="0 0 46 46" fill="none"><path d="M2 44L2 2L44 2" stroke="#c9a84c" stroke-width="1.5"/><circle cx="2" cy="2" r="2" fill="#c9a84c"/></svg></div>
  <div class="co" id="c4"><svg viewBox="0 0 46 46" fill="none"><path d="M2 44L2 2L44 2" stroke="#c9a84c" stroke-width="1.5"/><circle cx="2" cy="2" r="2" fill="#c9a84c"/></svg></div>
  <div id="ttl"><div class="tko">단청 물결</div><div class="tsb">DANCHEONG · WATER RIPPLE</div></div>
  <div id="hint">☝ 손가락으로 물결을 일으키고 · 단청 문양을 잡아 띄워보세요</div>
  <button id="wb" onclick="initWebcam()">☞ 웹캠 시작</button>
  <div id="dock">
    <div class="pb sel" onclick="selPat(0,this)"><div class="pi">🌸</div><div class="pn">연꽃</div></div>
    <div class="pb" onclick="selPat(1,this)"><div class="pi">🔵</div><div class="pn">태극</div></div>
    <div class="pb" onclick="selPat(2,this)"><div class="pi">⬡</div><div class="pn">귀갑</div></div>
    <div class="pb" onclick="selPat(3,this)"><div class="pi">卍</div><div class="pn">만자</div></div>
    <div class="pb" onclick="selPat(4,this)"><div class="pi">🌺</div><div class="pn">모란</div></div>
    <div class="pb" onclick="selPat(5,this)"><div class="pi">○</div><div class="pn">칠보</div></div>
  </div>
  <div id="st">WATER SIM READY · CLICK/TOUCH TO RIPPLE</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;
const SW=220;
let SH=128;
let cur, prv;

// 오프스크린 렌더링 캔버스 설정
const waterCanvas = document.createElement('canvas');
let waterCtx, waterImg, wd;

function rsz(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  SH=Math.ceil(SW*H/W)||128;
  cur=new Float32Array(SW*SH);
  prv=new Float32Array(SW*SH);
  
  waterCanvas.width = SW; 
  waterCanvas.height = SH;
  waterCtx = waterCanvas.getContext('2d');
  waterImg = waterCtx.createImageData(SW, SH);
  wd = waterImg.data;
  
  initFloaters();
}
window.addEventListener('resize', rsz);
rsz();

/* ── WATER SIM ── */
const DAMP=0.984;
function ripple(nx,ny,str=1){
  const sx=Math.floor(nx*SW),sy=Math.floor(ny*SH),r=4;
  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
    const d=Math.sqrt(dx*dx+dy*dy);if(d>r)continue;
    const x=Math.max(0,Math.min(SW-1,sx+dx)),y=Math.max(0,Math.min(SH-1,sy+dy));
    cur[y*SW+x]+=str*(1-d/r);
  }
}
function stepSim(){
  for(let y=1;y<SH-1;y++)for(let x=1;x<SW-1;x++){
    const i=y*SW+x;
    const v=(cur[(y-1)*SW+x]+cur[(y+1)*SW+x]+cur[y*SW+(x-1)]+cur[y*SW+(x+1)])/2-prv[i];
    prv[i]=cur[i];cur[i]=v*DAMP;
  }
}

/* ── FLOATERS ── */
const PALS=[
  ['#e03040','#e87830','#e8c830','#205898','#289050'],
  ['#2060b8','#28a860','#8828a8','#e84080','#28c0d8'],
  ['#e84428','#28c888','#e8a828','#4850c8','#c84888'],
];
let floaters=[],patIdx=0;
function initFloaters(){
  floaters=[];
  const cols=Math.max(3,Math.floor(W/130)),rows=Math.max(2,Math.floor(H/130));
  for(let gy=0;gy<rows;gy++)for(let gx=0;gx<cols;gx++){
    const pal=PALS[(gx+gy)%PALS.length];
    floaters.push({
      bx:(gx+.5)/cols,by:(gy+.5)/rows,
      x:(gx+.5)/cols*W,y:(gy+.5)/rows*H,
      vx:0,vy:0,r:36+Math.random()*22,
      angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.007,
      pal,grabbed:false,alpha:.85+Math.random()*.1
    });
  }
}

/* ── PATTERN DRAW ── */
function drawLotus(c,x,y,r,pal){
  const n=8;
  for(let i=0;i<n;i++){const a=i/n*Math.PI*2;c.save();c.rotate(a);c.fillStyle=pal[i%2];c.beginPath();c.ellipse(0,-r*.54,r*.2,r*.42,0,0,Math.PI*2);c.fill();c.restore();}
  for(let i=0;i<n;i++){const a=i/n*Math.PI*2+Math.PI/n;c.save();c.rotate(a);c.fillStyle=pal[2];c.globalAlpha*=.75;c.beginPath();c.ellipse(0,-r*.34,r*.13,r*.26,0,0,Math.PI*2);c.fill();c.restore();}
  c.beginPath();c.arc(0,0,r*.2,0,Math.PI*2);c.fillStyle=pal[3];c.fill();
  c.beginPath();c.arc(0,0,r*.09,0,Math.PI*2);c.fillStyle='#ffe090';c.fill();
}
function drawTaeguk(c,x,y,r,pal){
  c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.fillStyle=pal[0];c.fill();
  c.beginPath();c.arc(0,0,r,-Math.PI/2,Math.PI/2);c.arc(0,r/2,r/2,Math.PI/2,-Math.PI/2,true);c.arc(0,-r/2,r/2,Math.PI/2,-Math.PI/2);c.closePath();c.fillStyle=pal[1];c.fill();
  c.beginPath();c.arc(0,r/2,r/6,0,Math.PI*2);c.fillStyle=pal[0];c.fill();
  c.beginPath();c.arc(0,-r/2,r/6,0,Math.PI*2);c.fillStyle=pal[1];c.fill();
  c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.strokeStyle='rgba(255,220,120,.4)';c.lineWidth=1.5;c.stroke();
}
function drawTortoise(c,x,y,r,pal){
  const s=6;
  function hex(R){c.beginPath();for(let i=0;i<s;i++){const a=i/s*Math.PI*2-Math.PI/6;i===0?c.moveTo(Math.cos(a)*R,Math.sin(a)*R):c.lineTo(Math.cos(a)*R,Math.sin(a)*R);}c.closePath();}
  hex(r);c.fillStyle=pal[0];c.fill();
  hex(r*.64);c.fillStyle=pal[1];c.fill();
  hex(r*.38);c.fillStyle=pal[2];c.fill();
  hex(r);c.strokeStyle=pal[3];c.lineWidth=1.5;c.stroke();
  for(let i=0;i<s;i++){c.save();c.rotate(i/s*Math.PI*2);c.strokeStyle=pal[(i+1)%pal.length];c.lineWidth=1;c.beginPath();c.moveTo(0,r*.38);c.lineTo(0,r*.64);c.stroke();c.restore();}
}
function drawManJa(c,x,y,r,pal){
  c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.fillStyle=pal[0];c.fill();
  c.strokeStyle=pal[1];c.lineWidth=r*.16;c.lineCap='square';
  const s=r*.45;
  c.beginPath();c.moveTo(-s,0);c.lineTo(s,0);c.stroke();
  c.beginPath();c.moveTo(0,-s);c.lineTo(0,s);c.stroke();
  c.lineWidth=r*.16;
  [[s,-s*.4,'y'],[-s,s*.4,'y'],[s*.4,s,'x'],[-s*.4,-s,'x']].forEach(([ox,oy,ax])=>{
    c.beginPath();c.moveTo(ox,oy);
    ax==='x'?c.lineTo(ox+Math.sign(ox)*s*.4,oy):c.lineTo(ox,oy+Math.sign(oy)*s*.4);
    c.stroke();
  });
  c.strokeStyle=pal[2];c.lineWidth=1.5;c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.stroke();
}
function drawPeony(c,x,y,r,pal){
  for(let layer=3;layer>=0;layer--){
    const n=5+layer*3,lr=r*(.38+layer*.18);
    for(let i=0;i<n;i++){const a=i/n*Math.PI*2+layer*.35;c.save();c.rotate(a);c.fillStyle=pal[layer%pal.length];c.beginPath();c.ellipse(0,-lr,lr*.17,lr*.32,0,0,Math.PI*2);c.fill();c.restore();}
  }
  c.beginPath();c.arc(0,0,r*.16,0,Math.PI*2);c.fillStyle='#ffe8b0';c.fill();
}
function drawChilbo(c,x,y,r,pal){
  const n=8;
  for(let i=0;i<n;i++){const a=i/n*Math.PI*2;c.save();c.globalAlpha*=.65;c.fillStyle=pal[i%pal.length];c.beginPath();c.arc(Math.cos(a)*r*.46,Math.sin(a)*r*.46,r*.42,0,Math.PI*2);c.fill();c.restore();}
  c.beginPath();c.arc(0,0,r*.32,0,Math.PI*2);c.fillStyle=pal[2];c.fill();
  c.beginPath();c.arc(0,0,r*.15,0,Math.PI*2);c.fillStyle='#fff8e0';c.fill();
}
const PATS=[drawLotus,drawTaeguk,drawTortoise,drawManJa,drawPeony,drawChilbo];
function selPat(i,btn){
  patIdx=i;document.querySelectorAll('.pb').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');
  floaters.forEach(f=>{f.vx=(Math.random()-.5)*18;f.vy=(Math.random()-.5)*18;ripple(f.bx,f.by,.6);});
}

/* ── RENDER ── */
function render(){
  ctx.clearRect(0,0,W,H);
  
  // 배경 그리기
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#08111e');bg.addColorStop(.5,'#0c1a30');bg.addColorStop(1,'#060e1a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  
  // 고속 픽셀 매핑을 통한 물결 렌더링 최적화
  for(let i=0; i<SW*SH; i++){
    const v = cur[i];
    const idx = i*4;
    if(Math.abs(v) < 0.015) {
      wd[idx+3] = 0; // 투명도 처리
    } else {
      wd[idx+3] = Math.min(127, Math.abs(v) * 216);
      if(v > 0) { wd[idx]=130; wd[idx+1]=180; wd[idx+2]=255; }
      else { wd[idx]=0; wd[idx+1]=80; wd[idx+2]=180; }
    }
  }
  waterCtx.putImageData(waterImg, 0, 0);
  ctx.drawImage(waterCanvas, 0, 0, W, H);
  
  // floaters
  floaters.forEach(f=>{
    const sx=Math.floor(f.x/W*SW),sy=Math.floor(f.y/H*SH);
    const si=Math.max(0,Math.min(SH-1,sy))*SW+Math.max(0,Math.min(SW-1,sx));
    const disp=cur[si]*18;
    const dx_=(si+1<SW*SH?cur[si+1]-cur[si]:0)*25;
    const dy_=(si+SW<SW*SH?cur[si+SW]-cur[si]:0)*25;
    ctx.save();
    ctx.translate(f.x+dx_,f.y+dy_+disp);
    ctx.rotate(f.angle+disp*.04);
    ctx.globalAlpha=f.alpha-Math.abs(disp)*.015;
    ctx.shadowColor='rgba(0,0,0,.45)';ctx.shadowBlur=14+Math.abs(disp)*2;ctx.shadowOffsetY=7+Math.abs(disp);
    PATS[patIdx](ctx,0,0,f.r,f.pal);
    if(f.grabbed){ctx.strokeStyle='rgba(201,168,76,.65)';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.arc(0,0,f.r+7,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
    ctx.restore();
  });
  
  // specular
  ctx.save();ctx.globalCompositeOperation='screen';ctx.globalAlpha=.03;
  const t=Date.now()*.001;
  for(let i=0;i<5;i++){
    const gx=(Math.sin(t*.28+i*1.1)*.28+.5)*W,gy=(Math.cos(t*.18+i*.85)*.28+.5)*H;
    const g=ctx.createRadialGradient(gx,gy,0,gx,gy,W*.38);
    g.addColorStop(0,'rgba(180,220,255,.28)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
}

/* ── PHYSICS ── */
function updateFloaters(){
  floaters.forEach(f=>{
    if(f.grabbed)return;
    const sx=Math.floor(f.x/W*SW),sy=Math.floor(f.y/H*SH);
    if(sx>0&&sx<SW-1&&sy>0&&sy<SH-1){
      const gx=cur[sy*SW+(sx+1)]-cur[sy*SW+(sx-1)];
      const gy=cur[(sy+1)*SW+sx]-cur[(sy-1)*SW+sx];
      f.vx+=gx*3.5;f.vy+=gy*3.5;
    }
    f.vx+=(f.bx*W-f.x)*.005;f.vy+=(f.by*H-f.y)*.005;
    f.vx*=.91;f.vy*=.91;
    f.x+=f.vx;f.y+=f.vy;f.angle+=f.spin;
    
    // 화면 이탈 방지 처리 로직
    if(f.x < f.r) { f.x = f.r; f.vx *= -0.8; }
    else if(f.x > W - f.r) { f.x = W - f.r; f.vx *= -0.8; }
    if(f.y < f.r) { f.y = f.r; f.vy *= -0.8; }
    else if(f.y > H - f.r) { f.y = H - f.r; f.vy *= -0.8; }
    
    if(Math.abs(f.vx)+Math.abs(f.vy)>1.5)ripple(f.x/W,f.y/H,(Math.abs(f.vx)+Math.abs(f.vy))*.04);
  });
}

/* ── INPUT ── */
let grabIdx=-1,isDown=false;
canvas.addEventListener('mousemove',e=>{
  ripple(e.clientX/W,e.clientY/H,.16);
  if(grabIdx>=0&&isDown){floaters[grabIdx].x=e.clientX;floaters[grabIdx].y=e.clientY;ripple(e.clientX/W,e.clientY/H,.55);}
});
canvas.addEventListener('mousedown',e=>{
  isDown=true;
  grabIdx=floaters.findIndex(f=>Math.hypot(f.x-e.clientX,f.y-e.clientY)<f.r*1.3);
  if(grabIdx>=0){floaters[grabIdx].grabbed=true;ripple(e.clientX/W,e.clientY/H,1.1);}
  else ripple(e.clientX/W,e.clientY/H,.8);
});
canvas.addEventListener('mouseup',()=>{
  isDown=false;
  if(grabIdx>=0){floaters[grabIdx].grabbed=false;floaters[grabIdx].vx=(floaters[grabIdx].x-floaters[grabIdx].bx*W)*-.08;floaters[grabIdx].vy=(floaters
