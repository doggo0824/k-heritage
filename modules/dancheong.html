<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>단청 물결</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f4eadd; display: flex; justify-content: center; align-items: center; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        video { display: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        #loading-text { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: #333; z-index: 20; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="loading-text">웹캠 및 물리 엔진 로딩 중...</div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="physics-canvas"></canvas>
    </div>
    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('physics-canvas');
        const loadingText = document.getElementById('loading-text');
        
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Constraint = Matter.Constraint,
              Query = Matter.Query;
              
        const engine = Engine.create();
        engine.gravity.y = 0.1; 
        
        const render = Render.create({
            canvas: canvasElement,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent'
            }
        });
        
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        const ground = Bodies.rectangle(width / 2, height + 30, width, 60, { isStatic: true });
        const ceiling = Bodies.rectangle(width / 2, -30, width, 60, { isStatic: true });
        const leftWall = Bodies.rectangle(-30, height / 2, 60, height, { isStatic: true });
        const rightWall = Bodies.rectangle(width + 30, height / 2, 60, height, { isStatic: true });
        Composite.add(engine.world, [ground, ceiling, leftWall, rightWall]);
        
        const dancheongImages = [
            '../assets/images/dancheong-1.png', 
            '../assets/images/dancheong-2.png', 
            '../assets/images/dancheong-3.png'
        ];
        
        setInterval(() => {
            const bodiesCount = Composite.allBodies(engine.world).length;
            if(bodiesCount < 40) {
                const randomX = Math.random() * width;
                const randomImage = dancheongImages[Math.floor(Math.random() * dancheongImages.length)];
                const dancheong = Bodies.circle(randomX, 50, 40, {
                    restitution: 0.6,
                    frictionAir: 0.04,
                    render: {
                        sprite: { texture: randomImage, xScale: 0.5, yScale: 0.5 }
                    }
                });
                Composite.add(engine.world, dancheong);
            }
        }, 1200);
        
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);
        
        let grabbedBody = null;
        let handConstraint = null;
        
        const hands = new Hands({locateFile: (file) => {
          return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file;
        }});
        
        hands.setOptions({
          maxNumHands: 1,
          modelComplexity: 1,
          minDetectionConfidence: 0.7,
          minTrackingConfidence: 0.7
        });
        
        hands.onResults((results) => {
            if (loadingText.style.display !== 'none') {
                loadingText.style.display = 'none';
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                
                const handX = (1 - indexTip.x) * window.innerWidth;
                const handY = indexTip.y * window.innerHeight;
                
                const thumbX = (1 - thumbTip.x) * window.innerWidth;
                const thumbY = thumbTip.y * window.innerHeight;
                
                const distance = Math.hypot(handX - thumbX, handY - thumbY);
                
                if (distance < 50) {
                    if (!grabbedBody) {
                        const bodies = Composite.allBodies(engine.world);
                        const clickedBodies = Query.point(bodies, { x: handX, y: handY });
                        
                        if (clickedBodies.length > 0 && !clickedBodies[0].isStatic) {
                            grabbedBody = clickedBodies[0];
                            handConstraint = Constraint.create({
                                pointA: { x: handX, y: handY },
                                bodyB: grabbedBody,
                                stiffness: 0.2,
                                damping: 0.1
                            });
                            Composite.add(engine.world, handConstraint);
                        }
                    } else if (handConstraint) {
                        handConstraint.pointA = { x: handX, y: handY };
                    }
                } else {
                    if (grabbedBody && handConstraint) {
                        Composite.remove(engine.world, handConstraint);
                        grabbedBody = null;
                        handConstraint = null;
                    }
                }
            } else {
                 if (grabbedBody && handConstraint) {
                    Composite.remove(engine.world, handConstraint);
                    grabbedBody = null;
                    handConstraint = null;
                }
            }
        });
        
        const camera = new Camera(videoElement, {
          onFrame: async () => {
            await hands.send({image: videoElement});
          },
          width: 1280,
          height: 720
        });
        camera.start();
        
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            Matter.Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 30 });
            Matter.Body.setPosition(ceiling, { x: window.innerWidth / 2, y: -30 });
            Matter.Body.setPosition(rightWall, { x: window.innerWidth + 30, y: window.innerHeight / 2 });
            Matter.Body.setPosition(leftWall, { x: -30, y: window.innerHeight / 2 });
        });
    </script>
</body>
</html>
