<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>01 단청 물결 | 국가유산</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;overflow:hidden}
#c{display:block}
.bk{position:fixed;top:16px;left:16px;color:#a08040;text-decoration:none;font:13px "Courier New";letter-spacing:2px;border:1px solid #a08040;padding:7px 14px;z-index:99;transition:.3s}
.bk:hover{background:#a08040;color:#050505}
.tt{position:fixed;top:18px;left:50%;transform:translateX(-50%);font:14px "Courier New";letter-spacing:4px;color:#c8a84b;z-index:99;white-space:nowrap}
.ht{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);font:11px "Courier New";color:#3a3020;letter-spacing:2px;pointer-events:none}
.ct{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:99;align-items:center;flex-wrap:wrap;justify-content:center}
.pb{padding:6px 12px;border:1px solid #a08040;color:#a08040;background:transparent;font:12px "Courier New";cursor:pointer;transition:.3s;letter-spacing:1px}
.pb:hover,.pb.on{background:#a08040;color:#050505}
</style></head><body>
<a href="../index.html" class="bk">← BACK</a>
<div class="tt">01 · 단청 물결 · DANCHEONG WAVE</div>
<canvas id="c"></canvas>
<div class="ht">클릭 / 터치로 물결을 만드세요</div>
<div class="ct">
<span style="color:#5a4a2a;font:11px courier;line-height:32px">문양 ›</span>
<button class="pb on" data-p="0">연꽃</button>
<button class="pb" data-p="1">태극</button>
<button class="pb" data-p="2">卍</button>
<button class="pb" data-p="3">귀갑</button>
<button class="pb" data-p="4">보상화</button>
<button class="pb" data-p="5">뇌문</button>
</div>
<script>
const CV=document.getElementById("c"),X=CV.getContext("2d");
const C=["#2B4B8C","#C4372A","#D4A017","#2D7A3A","#8B3A8A","#E07020","#5B9BD5","#CF8A30"];
let W,H,G=[],R=[],pat=0,T=0;
document.querySelectorAll(".pb").forEach(b=>{b.onclick=()=>{pat=+b.dataset.p;document.querySelectorAll(".pb").forEach(x=>x.classList.remove("on"));b.classList.add("on");}});
function resize(){W=CV.width=innerWidth;H=CV.height=innerHeight;G=[];const sp=68;for(let y=-sp;y<H+sp*2;y+=sp)for(let x=-sp;x<W+sp*2;x+=sp)G.push({x,y,ci:(Math.floor(y/sp)*3+Math.floor(x/sp)*2)%C.length,ph:Math.random()*Math.PI*2,a:.18});}
function addR(x,y){R.push({x,y,r:0,mx:Math.hypot(W,H)*.9,spd:6,c:C[~~(Math.random()*C.length)]});}
CV.addEventListener("click",e=>addR(e.clientX,e.clientY));
CV.addEventListener("touchstart",e=>{e.preventDefault();addR(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
function dlotus(x,y,s,c,a){X.save();X.globalAlpha=a;X.translate(x,y);for(let i=0;i<8;i++){X.rotate(Math.PI/4);X.beginPath();X.ellipse(0,-s*.5,s*.17,s*.45,0,0,Math.PI*2);X.fillStyle=c;X.fill();}X.beginPath();X.arc(0,0,s*.18,0,Math.PI*2);X.fillStyle=C[(C.indexOf(c)+2)%C.length];X.fill();X.restore();}
function dtaiji(x,y,s,c,a){const c2=C[(C.indexOf(c)+2)%C.length];X.save();X.globalAlpha=a;X.translate(x,y);X.beginPath();X.arc(0,-s/2,s/2,0,Math.PI);X.arc(0,s/2,s/2,Math.PI,0);X.fillStyle=c;X.fill();X.beginPath();X.arc(0,-s/2,s/2,Math.PI,0);X.arc(0,s/2,s/2,0,Math.PI);X.fillStyle=c2;X.fill();X.beginPath();X.arc(0,-s/2,s/5,0,Math.PI*2);X.fillStyle=c2;X.fill();X.beginPath();X.arc(0,s/2,s/5,0,Math.PI*2);X.fillStyle=c;X.fill();X.restore();}
function dmanji(x,y,s,c,a){X.save();X.globalAlpha=a;X.translate(x,y);X.strokeStyle=c;X.lineWidth=Math.max(1.5,s/11);const q=s/3;X.beginPath();X.moveTo(-q,-s*.88);X.lineTo(-q,-q);X.lineTo(-s*.88,-q);X.lineTo(-s*.88,q);X.lineTo(-q,q);X.lineTo(-q,s*.88);X.lineTo(q,s*.88);X.lineTo(q,q);X.lineTo(s*.88,q);X.lineTo(s*.88,-q);X.lineTo(q,-q);X.lineTo(q,-s*.88);X.closePath();X.stroke();X.restore();}
function dhex(x,y,s,c,a){X.save();X.globalAlpha=a;X.translate(x,y);X.beginPath();for(let i=0;i<6;i++){const ag=Math.PI/3*i-Math.PI/6;i?X.lineTo(s*Math.cos(ag),s*Math.sin(ag)):X.moveTo(s*Math.cos(ag),s*Math.sin(ag));}X.closePath();X.strokeStyle=c;X.lineWidth=1.5;X.stroke();for(let i=0;i<6;i++){X.beginPath();X.moveTo(0,0);const ag2=Math.PI/3*i;X.lineTo(s*.65*Math.cos(ag2),s*.65*Math.sin(ag2));X.strokeStyle=C[(C.indexOf(c)+i)%C.length];X.lineWidth=1;X.stroke();}X.restore();}
function dbosang(x,y,s,c,a){X.save();X.translate(x,y);for(let i=0;i<6;i++){X.save();X.rotate(Math.PI*2/6*i);X.beginPath();X.arc(0,-s*.38,s*.3,0,Math.PI*2);X.globalAlpha=a*.7;X.fillStyle=C[(C.indexOf(c)+i)%C.length];X.fill();X.restore();}X.beginPath();X.arc(0,0,s*.17,0,Math.PI*2);X.globalAlpha=a;X.fillStyle=c;X.fill();X.restore();}
function droewen(x,y,s,c,a){X.save();X.globalAlpha=a;X.translate(x,y);X.strokeStyle=c;X.lineWidth=1.5;[.95,.7,.45,.2].forEach(f=>{X.beginPath();X.rect(-s*f,-s*f,s*f*2,s*f*2);X.stroke();});X.restore();}
const DR=[dlotus,dtaiji,dmanji,dhex,dbosang,droewen];
(function loop(){requestAnimationFrame(loop);T+=.016;X.fillStyle="rgba(5,5,5,.15)";X.fillRect(0,0,W,H);R=R.filter(r=>r.r<r.mx);R.forEach(r=>r.r+=r.spd);G.forEach(p=>{let amp=0;R.forEach(r=>{const d=Math.hypot(p.x-r.x,p.y-r.y);amp+=Math.sin(d/32-r.r/25+p.ph)*Math.exp(-Math.abs(d-r.r)/50);});const amb=Math.sin(T+p.ph)*.07;p.a=Math.max(.04,Math.min(.9,.18+amp*.4+amb));const sc=1+amp*.22+amb*.04;X.save();X.translate(p.x,p.y);X.scale(sc,sc);X.translate(-p.x,-p.y);DR[pat](p.x,p.y,24,C[p.ci],p.a);X.restore();});R.forEach(r=>{X.beginPath();X.arc(r.x,r.y,r.r,0,Math.PI*2);X.strokeStyle=r.c;X.globalAlpha=Math.max(0,.4-r.r/r.mx);X.lineWidth=2;X.stroke();X.globalAlpha=1;});})();
resize();window.onresize=resize;
[600,1100,1700].forEach((d,i)=>setTimeout(()=>addR(W*[.5,.3,.7][i],H*[.5,.4,.6][i]),d));
</script></body></html>
