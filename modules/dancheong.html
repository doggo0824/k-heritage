<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>단청 물결</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f4eadd; }
        canvas { display: block; }
        #title { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div id="title">단청 물결</div>
    <script>
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint;

        const engine = Engine.create();
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent'
            }
        });

        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 30, window.innerWidth, 60, { isStatic: true });
        const leftWall = Bodies.rectangle(-30, window.innerHeight / 2, 60, window.innerHeight, { isStatic: true });
        const rightWall = Bodies.rectangle(window.innerWidth + 30, window.innerHeight / 2, 60, window.innerHeight, { isStatic: true });
        Composite.add(engine.world, [ground, leftWall, rightWall]);

        const dancheongImages = ['../assets/images/dancheong-1.png', '../assets/images/dancheong-2.png', '../assets/images/dancheong-3.png'];
        
        setInterval(() => {
            const randomX = Math.random() * window.innerWidth;
            const randomImage = dancheongImages[Math.floor(Math.random() * dancheongImages.length)];
            const dancheong = Bodies.circle(randomX, -50, 40, {
                restitution: 0.8,
                render: {
                    sprite: { texture: randomImage, xScale: 0.5, yScale: 0.5 }
                }
            });
            Composite.add(engine.world, dancheong);
        }, 1000);

        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });
        Composite.add(engine.world, mouseConstraint);
        render.mouse = mouse;

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);
    </script>
</body>
</html>
