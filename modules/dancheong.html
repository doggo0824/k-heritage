<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>단청 물결 2D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; }
  #c { position:fixed; inset:0; width:100%; height:100%; }
  video { position:fixed; top:-9999px; opacity:0; }
  #hud { position:fixed; inset:0; z-index:10; pointer-events:none; }
  #ttl { position:absolute; top:16px; left:50%; transform:translateX(-50%); text-align:center; }
  .tko { font-family:'Noto Serif KR',serif; font-size:24px; font-weight:900; color:rgba(201,168,76,.8); letter-spacing:.2em; }
  #dock { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:10px; pointer-events:all; }
  .pb { width:45px; height:45px; border:1px solid rgba(201,168,76,.3); background:rgba(0,0,0,.6); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .pb.sel { border-color:#c9a84c; background:rgba(201,168,76,.2); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<video id="vid" autoplay muted playsinline></video>
<div id="hud">
  <div id="ttl"><div class="tko">단청 물결 2D</div></div>
  <div id="dock">
    <div class="pb sel" onclick="selPat(0,this)">🌸</div>
    <div class="pb" onclick="selPat(1,this)">🔵</div>
    <div class="pb" onclick="selPat(2,this)">卍</div>
    <div class="pb" onclick="selPat(3,this)">🏺</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let W, H, SW = 200, SH;
let cur, prv;
const waterCanvas = document.createElement('canvas');
let waterCtx, waterImg, wd;

function rsz() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  SH = Math.ceil(SW * H / W);
  cur = new Float32Array(SW * SH);
  prv = new Float32Array(SW * SH);
  waterCanvas.width = SW;
  waterCanvas.height = SH;
  waterCtx = waterCanvas.getContext('2d');
  waterImg = waterCtx.createImageData(SW, SH);
  wd = waterImg.data;
  initFloaters();
}

let floaters = [];
function initFloaters() {
  floaters = [];
  for(let i=0; i<12; i++) {
    floaters.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
      r: 30 + Math.random()*20,
      color: i % 2 === 0 ? '#e03040' : '#205898'
    });
  }
}

function ripple(nx, ny, str=1) {
  const sx = Math.floor(nx * SW), sy = Math.floor(ny * SH);
  if(sx<1 || sx>SW-2 || sy<1 || sy>SH-2) return;
  cur[sy * SW + sx] += str;
}

function stepSim() {
  for(let i=SW; i<SW*(SH-1); i++) {
    const v = (cur[i-1] + cur[i+1] + cur[i-SW] + cur[i+SW]) / 2 - prv[i];
    prv[i] = cur[i]; cur[i] = v * 0.98;
  }
}

function draw() {
  ctx.fillStyle = '#060e1a';
  ctx.fillRect(0, 0, W, H);

  // 물결 2D 픽셀 렌더링
  for(let i=0; i<SW*SH; i++) {
    const v = cur[i];
    const idx = i * 4;
    wd[idx] = v > 0 ? 100 : 0;
    wd[idx+1] = v > 0 ? 150 : 80;
    wd[idx+2] = 255;
    wd[idx+3] = Math.abs(v) * 200;
  }
  waterCtx.putImageData(waterImg, 0, 0);
  ctx.drawImage(waterCanvas, 0, 0, W, H);

  // 문양 렌더링 및 화면 이탈 방지
  floaters.forEach(f => {
    f.x += f.vx; f.y += f.vy;
    if(f.x < f.r || f.x > W-f.r) f.vx *= -1;
    if(f.y < f.r || f.y > H-f.r) f.vy *= -1;

    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
    ctx.fillStyle = f.color;
    ctx.fill();
    ripple(f.x/W, f.y/H, 0.2);
  });
}

function loop() {
  stepSim();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('resize', rsz);
canvas.addEventListener('mousemove', e => ripple(e.clientX/W, e.clientY/H, 2));
rsz();
loop();

function selPat(i, btn) {
  document.querySelectorAll('.pb').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}
</script>
</body>
</html>
