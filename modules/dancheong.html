<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>단청 물결</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0705;overflow:hidden;width:100vw;height:100vh;font-family:'Noto Serif KR',serif}
  #bg-canvas{position:fixed;inset:0;width:100%;height:100%;cursor:crosshair}
  #hand-video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:0;pointer-events:none}
  #ui{position:fixed;top:0;left:0;right:0;z-index:10;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);pointer-events:none}
  .ui-title{font-size:16px;color:#c9a84c;letter-spacing:.2em}
  .ui-hint{font-size:10px;color:rgba(245,239,224,.35);letter-spacing:.2em;font-family:'Courier New',monospace}
  #bottom-ui{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .ctrl-btn{background:rgba(0,0,0,.7);border:1px solid rgba(201,168,76,.35);color:rgba(201,168,76,.8);padding:7px 16px;font-size:11px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.1em;transition:all .2s}
  .ctrl-btn:hover{background:rgba(201,168,76,.12);border-color:#c9a84c}
  #upload-prompt{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.88)}
  .up-box{border:1px dashed rgba(201,168,76,.4);padding:48px 56px;text-align:center;max-width:480px}
  .up-icon{font-size:52px;display:block;margin-bottom:16px}
  .up-title{font-size:20px;color:#c9a84c;margin-bottom:8px}
  .up-sub{font-size:11px;color:rgba(245,239,224,.35);letter-spacing:.18em;margin-bottom:24px;line-height:1.7}
  .up-btn{padding:10px 32px;border:1px solid rgba(201,168,76,.5);color:#c9a84c;background:none;font-family:'Courier New',monospace;font-size:13px;letter-spacing:.15em;cursor:pointer;transition:all .2s;display:inline-block}
  .up-btn:hover{background:rgba(201,168,76,.1)}
  .demo-btn{margin-top:14px;display:block;padding:8px 24px;border:1px solid rgba(245,239,224,.2);color:rgba(245,239,224,.45);background:none;font-size:11px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.1em;width:100%}
  .demo-btn:hover{color:rgba(245,239,224,.7);border-color:rgba(245,239,224,.45)}
  #grabbed-info{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:15;background:rgba(0,0,0,.75);border:1px solid rgba(201,168,76,.4);padding:6px 20px;font-size:12px;color:#c9a84c;font-family:'Courier New',monospace;display:none;letter-spacing:.1em;pointer-events:none}
  #cam-indicator{position:fixed;bottom:60px;right:20px;z-index:10;font-size:10px;color:rgba(0,255,65,.4);font-family:'Courier New',monospace;letter-spacing:.1em}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<video id="hand-video" autoplay muted playsinline></video>

<div id="ui">
  <div class="ui-title">단청 물결 · 丹靑波</div>
  <div class="ui-hint">✋ 엄지+검지 집기 · 마우스 드래그</div>
</div>
<div id="grabbed-info">✨ 단청 문양 집음</div>
<div id="cam-indicator">CAM: OFF</div>

<div id="bottom-ui">
  <button class="ctrl-btn" onclick="toggleWave()">물결 ON/OFF</button>
  <button class="ctrl-btn" onclick="addDemoPatterns()">🎨 데모 문양 6종</button>
  <button class="ctrl-btn" onclick="clearPatterns()">초기화</button>
  <label class="ctrl-btn" style="cursor:pointer">📁 이미지 업로드<input type="file" accept="image/*" multiple style="display:none" onchange="handleFileUpload(event)"></label>
</div>

<div id="upload-prompt">
  <div class="up-box" id="drop-zone">
    <span class="up-icon">🎨</span>
    <div class="up-title">단청 문양 이미지 업로드</div>
    <div class="up-sub">단청 PNG/JPG 파일을 드래그하거나<br>클릭하여 선택하세요</div>
    <label class="up-btn">파일 선택<input type="file" accept="image/*" multiple style="display:none" onchange="handleFileUpload(event)"></label>
    <button class="demo-btn" onclick="addDemoPatterns();document.getElementById('upload-prompt').style.display='none'">데모 문양 6종으로 체험하기 →</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
const bgC=document.getElementById('bg-canvas');
const bgX=bgC.getContext('2d');
let W,H;
function resize(){W=bgC.width=window.innerWidth;H=bgC.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// Water grid
const GW=180,GH=110;
let g1=new Float32Array(GW*GH),g2=new Float32Array(GW*GH);
let waveOn=true;
function gi(x,y){return y*GW+x;}
function updateWater(){
  if(!waveOn)return;
  for(let y=1;y<GH-1;y++)for(let x=1;x<GW-1;x++){
    const i=gi(x,y);
    g2[i]=((g1[gi(x-1,y)]+g1[gi(x+1,y)]+g1[gi(x,y-1)]+g1[gi(x,y+1)])/2-g2[i])*0.986;
  }
  [g1,g2]=[g2,g1];
}
function disturb(nx,ny,f=0.8){
  const gx=Math.floor(nx*GW/W),gy=Math.floor(ny*GH/H);
  for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){
    const x=gx+dx,y=gy+dy;
    if(x>0&&x<GW-1&&y>0&&y<GH-1)g1[gi(x,y)]=f*(1-Math.sqrt(dx*dx+dy*dy)/4);
  }
}
setInterval(()=>{if(waveOn)disturb(Math.random()*W,Math.random()*H,0.25);},700);

// Tile class
let patterns=[],grabbedIdx=-1,grabOX=0,grabOY=0,isGrab=false,handX=-1,handY=-1;
class Tile{
  constructor(img,x,y){
    this.img=img;this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.3;
    this.rot=Math.random()*Math.PI*2;this.rotV=(Math.random()-.5)*.008;
    this.sz=80+Math.random()*60;this.ph=Math.random()*Math.PI*2;
    this.alpha=0;this.glow=0;this.grabbed=false;this.label='';
  }
  update(){
    this.alpha=Math.min(1,this.alpha+.025);this.ph+=.012;
    if(!this.grabbed){
      this.x+=this.vx;this.y+=this.vy+Math.sin(this.ph)*.18;this.rot+=this.rotV;
      if(this.x<this.sz*.6){this.x=this.sz*.6;this.vx=Math.abs(this.vx);}
      if(this.x>W-this.sz*.6){this.x=W-this.sz*.6;this.vx=-Math.abs(this.vx);}
      if(this.y<70){this.y=70;this.vy=Math.abs(this.vy);}
      if(this.y>H-70){this.y=H-70;this.vy=-Math.abs(this.vy);}
      this.glow=Math.max(0,this.glow-.025);
    }else{this.glow=1;}
  }
  draw(){
    const s=this.sz;
    bgX.save();bgX.globalAlpha=this.alpha;bgX.translate(this.x,this.y);bgX.rotate(this.rot);
    bgX.beginPath();
    for(let i=0;i<8;i++){const a=i/8*Math.PI*2-Math.PI/8,r=s/2;i?bgX.lineTo(Math.cos(a)*r,Math.sin(a)*r):bgX.moveTo(Math.cos(a)*r,Math.sin(a)*r);}
    bgX.closePath();
    // Water reflection shadow
    bgX.shadowColor='rgba(80,160,255,.35)';bgX.shadowBlur=16;
    if(this.glow>0){bgX.shadowColor=`rgba(201,168,76,${this.glow*.9})`;bgX.shadowBlur=28*this.glow;}
    bgX.clip();
    if(this.img)bgX.drawImage(this.img,-s/2,-s/2,s,s);
    bgX.restore();
    // Border
    bgX.save();bgX.translate(this.x,this.y);bgX.rotate(this.rot);
    bgX.globalAlpha=this.alpha*(this.grabbed?.9:.5);
    bgX.strokeStyle=this.grabbed?'#e8c96a':'rgba(201,168,76,.7)';
    bgX.lineWidth=this.grabbed?2.5:1.2;
    bgX.beginPath();
    for(let i=0;i<8;i++){const a=i/8*Math.PI*2-Math.PI/8,r=s/2;i?bgX.lineTo(Math.cos(a)*r,Math.sin(a)*r):bgX.moveTo(Math.cos(a)*r,Math.sin(a)*r);}
    bgX.closePath();bgX.stroke();
    // Label
    if(this.label&&!this.grabbed){
      bgX.globalAlpha=this.alpha*.6;
      bgX.fillStyle='rgba(201,168,76,.9)';
      bgX.font='bold 11px Noto Serif KR,serif';
      bgX.textAlign='center';bgX.textBaseline='middle';
      bgX.fillText(this.label,0,s/2+12);
    }
    bgX.restore();
  }
  hit(mx,my){return Math.hypot(mx-this.x,my-this.y)<this.sz/2;}
}

// Demo pattern image generator
const DEMO=[
  {name:'연화문',fn:(x,s)=>{x.fillStyle='#c9312a';x.fillRect(0,0,s,s);for(let i=0;i<8;i++){const a=i/8*Math.PI*2;x.fillStyle='rgba(255,215,0,.7)';x.beginPath();x.ellipse(s/2+Math.cos(a)*s*.28,s/2+Math.sin(a)*s*.28,s*.14,s*.07,a,0,Math.PI*2);x.fill();}x.fillStyle='#ffd700';x.beginPath();x.arc(s/2,s/2,s*.12,0,Math.PI*2);x.fill();}},
  {name:'태극문',fn:(x,s)=>{x.fillStyle='#2145a8';x.fillRect(0,0,s,s);x.fillStyle='#fff';x.beginPath();x.arc(s/2,s/2,s*.38,0,Math.PI*2);x.fill();const g=x.createLinearGradient(s*.15,s/2,s*.85,s/2);g.addColorStop(0,'#c9312a');g.addColorStop(1,'#2145a8');x.fillStyle=g;x.beginPath();x.arc(s/2,s/2,s*.38,0,Math.PI*2);x.fill();x.fillStyle='#c9312a';x.beginPath();x.arc(s/2,s/2-s*.19,s*.19,Math.PI,0);x.fill();x.fillStyle='#2145a8';x.beginPath();x.arc(s/2,s/2+s*.19,s*.19,0,Math.PI);x.fill();}},
  {name:'팔괘문',fn:(x,s)=>{x.fillStyle='#1a6b3c';x.fillRect(0,0,s,s);x.strokeStyle='#ffd700';x.lineWidth=s*.03;for(let i=0;i<8;i++){const a=i/8*Math.PI*2-Math.PI/2;for(let r=0;r<3;r++){x.beginPath();x.arc(s/2+Math.cos(a)*s*.3,s/2+Math.sin(a)*s*.3,s*.08,0,Math.PI*2);x.stroke();}}x.fillStyle='#ffd700';x.beginPath();x.arc(s/2,s/2,s*.1,0,Math.PI*2);x.fill();}},
  {name:'운문',fn:(x,s)=>{x.fillStyle='#8b2d8b';x.fillRect(0,0,s,s);const drawC=(cx,cy,r)=>{x.fillStyle='rgba(255,200,255,.6)';x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.fill();x.beginPath();x.arc(cx-r*.5,cy-r*.3,r*.65,0,Math.PI*2);x.fill();x.beginPath();x.arc(cx+r*.5,cy-r*.3,r*.65,0,Math.PI*2);x.fill();};[[s/2,s*.3,s*.12],[s*.25,s*.65,s*.1],[s*.75,s*.65,s*.1],[s/2,s*.75,s*.1]].forEach(([cx,cy,r])=>drawC(cx,cy,r));}},
  {name:'귀갑문',fn:(x,s)=>{x.fillStyle='#c9a84c';x.fillRect(0,0,s,s);x.strokeStyle='rgba(0,0,0,.5)';x.lineWidth=3;for(let r=0;r<5;r++)for(let c=0;c<5;c++){const cx=c*s*.22+s*.11+(r%2?s*.11:0),cy=r*s*.19+s*.1;x.beginPath();for(let i=0;i<6;i++){const a=i/6*Math.PI*2;x.lineTo(cx+Math.cos(a)*s*.1,cy+Math.sin(a)*s*.1);}x.closePath();x.stroke();}}},
  {name:'격자문',fn:(x,s)=>{x.fillStyle='#e8732a';x.fillRect(0,0,s,s);x.strokeStyle='rgba(255,255,200,.5)';x.lineWidth=s*.025;const step=s/6;for(let i=0;i<=6;i++){x.beginPath();x.moveTo(i*step,0);x.lineTo(i*step,s);x.stroke();x.beginPath();x.moveTo(0,i*step);x.lineTo(s,i*step);x.stroke();}x.fillStyle='rgba(255,255,200,.4)';for(let r=0;r<6;r+=2)for(let c=0;c<6;c+=2){x.beginPath();x.arc(c*step+step/2,r*step+step/2,step*.25,0,Math.PI*2);x.fill();}}},
];

function makeDemoImg(d){
  const c=document.createElement('canvas');c.width=c.height=256;
  d.fn(c.getContext('2d'),256);
  const img=new Image();img.src=c.toDataURL();return img;
}
function addDemoPatterns(){
  document.getElementById('upload-prompt').style.display='none';
  patterns=[];
  DEMO.forEach((d,i)=>{
    const img=makeDemoImg(d);
    const t=new Tile(img,120+Math.random()*(W-240),100+Math.random()*(H-200));
    t.label=d.name;patterns.push(t);
  });
}
function handleFileUpload(e){
  document.getElementById('upload-prompt').style.display='none';
  Array.from(e.target.files).forEach(file=>{
    const r=new FileReader();
    r.onload=ev=>{const img=new Image();img.onload=()=>{const t=new Tile(img,120+Math.random()*(W-240),120+Math.random()*(H-240));t.label=file.name.replace(/\.[^.]+$/,'');patterns.push(t);};img.src=ev.target.result;};
    r.readAsDataURL(file);
  });
}
function clearPatterns(){patterns=[];grabbedIdx=-1;}
function toggleWave(){waveOn=!waveOn;}

// Hand tracking
async function initHands(){
  const v=document.getElementById('hand-video');
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'},audio:false});
    v.srcObject=s;await v.play();
    document.getElementById('cam-indicator').textContent='CAM: ACTIVE';
    if(typeof Hands==='undefined')return;
    const h=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    h.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.7,minTrackingConfidence:.5});
    h.onResults(res=>{
      if(!res.multiHandLandmarks?.length){isGrab=false;handX=-1;return;}
      const lm=res.multiHandLandmarks[0];
      handX=(1-lm[8].x)*W;handY=lm[8].y*H;
      const pinch=Math.hypot((lm[4].x-lm[8].x)*W,(lm[4].y-lm[8].y)*H)<38;
      if(pinch&&!isGrab)grabStart(handX,handY);
      if(!pinch&&isGrab){isGrab=false;if(grabbedIdx>=0){patterns[grabbedIdx].grabbed=false;grabbedIdx=-1;}}
      isGrab=pinch;
      if(isGrab&&grabbedIdx>=0){patterns[grabbedIdx].x=handX+grabOX;patterns[grabbedIdx].y=handY+grabOY;}
      if(handX>0)disturb(handX,handY,isGrab?.6:.2);
    });
    const cam=new Camera(v,{onFrame:async()=>{await h.send({image:v});},width:640,height:480});
    cam.start();
  }catch(e){document.getElementById('cam-indicator').textContent='CAM: OFF (마우스 사용)';}
}
function grabStart(mx,my){
  for(let i=patterns.length-1;i>=0;i--){
    if(patterns[i].hit(mx,my)){
      grabbedIdx=i;grabOX=patterns[i].x-mx;grabOY=patterns[i].y-my;
      patterns[i].grabbed=true;
      const gi=document.getElementById('grabbed-info');gi.style.display='block';
      setTimeout(()=>gi.style.display='none',1400);return;
    }
  }
}

// Mouse fallback
let mouseDown=false;
bgC.addEventListener('mousedown',e=>{mouseDown=true;grabStart(e.clientX,e.clientY);});
bgC.addEventListener('mousemove',e=>{
  if(mouseDown&&grabbedIdx>=0){patterns[grabbedIdx].x=e.clientX+grabOX;patterns[grabbedIdx].y=e.clientY+grabOY;}
  disturb(e.clientX,e.clientY,mouseDown?.5:.15);
});
bgC.addEventListener('mouseup',()=>{mouseDown=false;if(grabbedIdx>=0){patterns[grabbedIdx].grabbed=false;grabbedIdx=-1;}});
bgC.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];mouseDown=true;grabStart(t.clientX,t.clientY);},{passive:false});
bgC.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];if(grabbedIdx>=0){patterns[grabbedIdx].x=t.clientX+grabOX;patterns[grabbedIdx].y=t.clientY+grabOY;}disturb(t.clientX,t.clientY,.5);},{passive:false});
bgC.addEventListener('touchend',e=>{e.preventDefault();mouseDown=false;if(grabbedIdx>=0){patterns[grabbedIdx].grabbed=false;grabbedIdx=-1;}},{passive:false});

document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files.length)handleFileUpload({target:{files:e.dataTransfer.files}});});

// Render water
function drawWater(){
  const id=bgX.createImageData(W,H);const d=id.data;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const gx=Math.min(GW-1,Math.floor(x*GW/W));
    const gy=Math.min(GH-1,Math.floor(y*GH/H));
    const v=waveOn?g1[gi(gx,gy)]:0;
    const i=(y*W+x)*4;
    d[i]=8+v*25;d[i+1]=22+v*60;d[i+2]=42+v*140;d[i+3]=255;
  }
  bgX.putImageData(id,0,0);
  // Subtle shimmer overlay
  bgX.save();bgX.globalAlpha=.04;
  const sg=bgX.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'rgba(150,220,255,1)');sg.addColorStop(1,'rgba(20,80,160,1)');
  bgX.fillStyle=sg;bgX.fillRect(0,0,W,H);bgX.restore();
}

function loop(){
  requestAnimationFrame(loop);
  updateWater();drawWater();
  patterns.forEach(t=>{t.update();t.draw();});
}

initHands();loop();
</script>
</body>
</html>
