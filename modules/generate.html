<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>인터랙티브 국가유산</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@300;400&display=swap');
:root{--gold:#c9a84c;--ink:#06040a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--ink);color:#f5efe0;font-family:'Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:50px;background:rgba(0,0,0,.85);border-bottom:1px solid rgba(201,168,76,.18);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;}
.tlogo{font-family:'Noto Serif KR',serif;font-size:14px;color:var(--gold);letter-spacing:.15em;}
.tsub{font-size:9px;color:rgba(245,239,224,.3);font-family:'Courier New',monospace;letter-spacing:.1em;}
.main{flex:1;display:flex;min-height:0;}
/* LEFT */
#left{width:44%;border-right:1px solid rgba(201,168,76,.1);display:flex;flex-direction:column;padding:18px;gap:14px;background:rgba(4,2,8,.8);overflow-y:auto;}
.section-label{font-size:9px;color:rgba(245,239,224,.28);letter-spacing:.22em;font-family:'Courier New',monospace;margin-bottom:6px;}
.prompt-wrap{position:relative;}
#prompt-input{width:100%;background:rgba(12,8,3,.85);border:1px solid rgba(201,168,76,.22);color:#f5efe0;padding:12px 14px;font-family:'Noto Serif KR',serif;font-size:13px;resize:none;height:96px;outline:none;transition:border-color .18s;}
#prompt-input:focus{border-color:rgba(201,168,76,.5);}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.abtn{background:none;border:1px solid rgba(201,168,76,.28);color:rgba(201,168,76,.8);padding:8px 16px;font-size:11px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.08em;transition:all .18s;white-space:nowrap;}
.abtn:hover{background:rgba(201,168,76,.1);border-color:var(--gold);}
.abtn.primary{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold);}
.abtn.primary:hover{background:rgba(201,168,76,.25);}
.abtn.recording{background:rgba(180,30,30,.2);border-color:#e04040;color:#e04040;animation:pulse-rec 1s infinite;}
@keyframes pulse-rec{0%,100%{opacity:1}50%{opacity:.6}}
/* VOICE */
#voice-status{font-size:10px;color:rgba(0,255,65,.5);font-family:'Courier New',monospace;padding:6px 10px;background:rgba(0,0,0,.4);border:1px solid rgba(0,255,65,.12);min-height:30px;display:flex;align-items:center;}
.voice-wave{display:flex;gap:2px;align-items:center;margin-left:8px;}
.wave-bar{width:3px;background:#00ff41;border-radius:1px;animation:wave .6s ease-in-out infinite;}
.wave-bar:nth-child(1){height:6px;animation-delay:0s;}
.wave-bar:nth-child(2){height:12px;animation-delay:.1s;}
.wave-bar:nth-child(3){height:8px;animation-delay:.2s;}
.wave-bar:nth-child(4){height:14px;animation-delay:.3s;}
.wave-bar:nth-child(5){height:6px;animation-delay:.4s;}
@keyframes wave{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
/* STYLE PRESETS */
.style-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.style-btn{padding:8px;border:1px solid rgba(201,168,76,.15);background:rgba(10,6,2,.6);cursor:pointer;text-align:center;transition:all .18s;}
.style-btn:hover,.style-btn.sel{border-color:var(--gold);background:rgba(201,168,76,.1);}
.style-btn .si{font-size:18px;display:block;margin-bottom:3px;}
.style-btn .sn{font-size:10px;color:var(--gold);font-family:'Noto Serif KR',serif;}
.style-btn .sd{font-size:8px;color:rgba(245,239,224,.35);font-family:'Courier New',monospace;}
/* HISTORY */
.history-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;}
.hist-thumb{width:60px;height:60px;flex-shrink:0;border:1px solid rgba(201,168,76,.18);background:rgba(15,10,4,.8);cursor:pointer;overflow:hidden;transition:border-color .18s;position:relative;}
.hist-thumb:hover{border-color:var(--gold);}
.hist-thumb canvas{width:100%;height:100%;}
.hist-thumb .hl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);font-size:7px;color:rgba(245,239,224,.5);padding:2px 3px;font-family:'Courier New',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* RIGHT: IMAGE OUTPUT */
#right{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;overflow:hidden;position:relative;}
#img-frame{width:100%;max-width:460px;aspect-ratio:1;position:relative;background:rgba(12,8,4,.9);border:1px solid rgba(201,168,76,.2);overflow:hidden;flex-shrink:0;}
#output-canvas{width:100%;height:100%;display:block;}
.frame-corner{position:absolute;width:22px;height:22px;pointer-events:none;}
.frame-corner svg{width:100%;height:100%;}
.fc-tl{top:5px;left:5px;}.fc-tr{top:5px;right:5px;transform:scaleX(-1);}
.fc-bl{bottom:5px;left:5px;transform:scaleY(-1);}.fc-br{bottom:5px;right:5px;transform:scale(-1);}
#gen-overlay{position:absolute;inset:0;background:rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;display:none;}
.gen-spinner{width:50px;height:50px;border:2px solid rgba(201,168,76,.2);border-top:2px solid var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.gen-msg{font-size:12px;color:rgba(201,168,76,.7);font-family:'Courier New',monospace;letter-spacing:.15em;}
#gen-progress{width:200px;height:2px;background:rgba(201,168,76,.1);}
#gen-progress-fill{height:100%;background:var(--gold);width:0%;transition:width .3s;}
.action-row{display:flex;gap:8px;}
#prompt-display{font-size:11px;color:rgba(245,239,224,.4);font-family:'Noto Serif KR',serif;text-align:center;max-width:380px;line-height:1.6;}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="tlogo">인터랙티브 국가유산</div>
    <div class="tsub">AI HERITAGE IMAGE GENERATOR + PRINT</div>
  </div>
  <div style="margin-left:auto;font-size:9px;color:rgba(245,239,224,.25);font-family:'Courier New',monospace;">
    API: <span id="api-status">대기 중</span>
  </div>
</div>

<div class="main">
  <div id="left">
    <!-- PROMPT -->
    <div>
      <div class="section-label">// 국가유산 묘사 · DESCRIBE HERITAGE //</div>
      <div class="prompt-wrap">
        <textarea id="prompt-input" placeholder="예: 불국사의 석가탑, 새벽 안개 속에 황금빛으로 빛나는...&#10;경복궁 근정전, 가을 단풍과 함께..."></textarea>
      </div>
    </div>

    <!-- VOICE -->
    <div>
      <div class="section-label">// 음성 입력 · VOICE INPUT //</div>
      <div class="btn-row">
        <button class="abtn" id="voice-btn" onclick="toggleVoice()">🎙 음성으로 말하기</button>
        <button class="abtn primary" onclick="generate()">✦ 이미지 생성</button>
      </div>
      <div id="voice-status">// 음성 버튼을 눌러 말씀하세요 //</div>
    </div>

    <!-- STYLE -->
    <div>
      <div class="section-label">// 화풍 선택 · ART STYLE //</div>
      <div class="style-grid" id="style-grid"></div>
    </div>

    <!-- HISTORY -->
    <div>
      <div class="section-label">// 생성 기록 · HISTORY //</div>
      <div class="history-row" id="history-row"></div>
    </div>

    <!-- PRINT -->
    <div>
      <div class="section-label">// 출력 · PRINT //</div>
      <div class="btn-row">
        <button class="abtn" onclick="printImage()">🖨 프린터 출력</button>
        <button class="abtn" onclick="downloadImage()">⬇ 이미지 저장</button>
        <button class="abtn" onclick="shareImage()">📤 공유</button>
      </div>
    </div>
  </div>

  <div id="right">
    <div id="img-frame">
      <canvas id="output-canvas" width="512" height="512"></canvas>
      <div class="frame-corner fc-tl"><svg viewBox="0 0 22 22" fill="none"><path d="M2 20V2H20" stroke="#c9a84c" stroke-width="1.5"/><circle cx="2" cy="2" r="1.5" fill="#c9a84c"/></svg></div>
      <div class="frame-corner fc-tr"><svg viewBox="0 0 22 22" fill="none"><path d="M2 20V2H20" stroke="#c9a84c" stroke-width="1.5"/><circle cx="2" cy="2" r="1.5" fill="#c9a84c"/></svg></div>
      <div class="frame-corner fc-bl"><svg viewBox="0 0 22 22" fill="none"><path d="M2 20V2H20" stroke="#c9a84c" stroke-width="1.5"/><circle cx="2" cy="2" r="1.5" fill="#c9a84c"/></svg></div>
      <div class="frame-corner fc-br"><svg viewBox="0 0 22 22" fill="none"><path d="M2 20V2H20" stroke="#c9a84c" stroke-width="1.5"/><circle cx="2" cy="2" r="1.5" fill="#c9a84c"/></svg></div>
      <div id="gen-overlay">
        <div class="gen-spinner"></div>
        <div class="gen-msg" id="gen-msg">국가유산 이미지 생성 중...</div>
        <div id="gen-progress"><div id="gen-progress-fill"></div></div>
      </div>
    </div>
    <div id="prompt-display">이미지를 생성하면 여기에 표시됩니다</div>
    <div class="action-row">
      <button class="abtn primary" onclick="generate()">✦ 생성</button>
      <button class="abtn" onclick="printImage()">🖨 출력</button>
      <button class="abtn" onclick="downloadImage()">⬇ 저장</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// STYLE PRESETS
// ═══════════════════════════════════════════
const STYLES = [
  { key:'korean_ink', icon:'🖌', name:'한국화', desc:'수묵화 스타일', prompt:'Korean ink wash painting style, sumi-e, black ink, traditional Korean art' },
  { key:'minhwa',     icon:'🎨', name:'민화',   desc:'전통 민화',    prompt:'Korean folk painting minhwa style, vivid colors, traditional patterns' },
  { key:'photo',      icon:'📷', name:'사진',   desc:'사실적 사진',  prompt:'professional photography, golden hour, cinematic, ultra detailed, 8k' },
  { key:'watercolor', icon:'💧', name:'수채화', desc:'수채화 일러스트',prompt:'watercolor illustration, soft colors, paper texture, Korean art' },
];
let selectedStyle = 0;
const styleGrid = document.getElementById('style-grid');
STYLES.forEach((s, i) => {
  const btn = document.createElement('div');
  btn.className = 'style-btn' + (i === 0 ? ' sel' : '');
  btn.innerHTML = `<span class="si">${s.icon}</span><div class="sn">${s.name}</div><div class="sd">${s.desc}</div>`;
  btn.onclick = () => {
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel'); selectedStyle = i;
  };
  styleGrid.appendChild(btn);
});

// ═══════════════════════════════════════════
// CANVAS — placeholder art
// ═══════════════════════════════════════════
const canvas = document.getElementById('output-canvas');
const ctx = canvas.getContext('2d');

function drawPlaceholder() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  // Dark background
  const bg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.7);
  bg.addColorStop(0,'#1a1005'); bg.addColorStop(1,'#06040a');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  // Decorative pattern
  ctx.save();
  ctx.globalAlpha = 0.06;
  const n = 8;
  for (let i = 0; i < n; i++) {
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.rotate(i/n * Math.PI * 2);
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 1;
    // Lotus petal shape
    ctx.beginPath();
    ctx.ellipse(0, -W*0.25, W*0.07, W*0.2, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
  // Center text
  ctx.fillStyle = 'rgba(201,168,76,0.35)';
  ctx.font = 'bold 22px "Noto Serif KR",serif';
  ctx.textAlign = 'center';
  ctx.fillText('국가유산', W/2, H/2 - 10);
  ctx.font = '11px Courier New';
  ctx.fillStyle = 'rgba(245,239,224,0.2)';
  ctx.fillText('이미지를 생성하세요', W/2, H/2 + 18);
  // Border
  ctx.strokeStyle = 'rgba(201,168,76,0.15)'; ctx.lineWidth = 1;
  ctx.strokeRect(8, 8, W-16, H-16);
}
drawPlaceholder();

// ═══════════════════════════════════════════
// PROCEDURAL HERITAGE IMAGE (demo without API)
// ═══════════════════════════════════════════
function drawHeritageArt(prompt, style) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const t = Date.now();
  const seed = prompt.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const hue = (seed * 137.5) % 360;

  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,H*0.6);
  if (style === 'korean_ink') {
    sky.addColorStop(0,'#e8e4d8'); sky.addColorStop(1,'#d0ccc0');
  } else {
    sky.addColorStop(0,`hsl(${hue+180},40%,15%)`);
    sky.addColorStop(1,`hsl(${hue+200},30%,25%)`);
  }
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H*0.65);

  // Ground
  const ground = ctx.createLinearGradient(0,H*0.65,0,H);
  ground.addColorStop(0,`hsl(${hue},20%,12%)`);
  ground.addColorStop(1,`hsl(${hue},15%,6%)`);
  ctx.fillStyle = ground; ctx.fillRect(0,H*0.65,W,H*0.35);

  // Mist layer
  if (style !== 'korean_ink') {
    const mist = ctx.createLinearGradient(0,H*0.55,0,H*0.75);
    mist.addColorStop(0,'rgba(180,200,220,0)');
    mist.addColorStop(0.5,'rgba(180,200,220,0.15)');
    mist.addColorStop(1,'rgba(180,200,220,0)');
    ctx.fillStyle = mist; ctx.fillRect(0,H*0.55,W,H*0.2);
  }

  // MAIN STRUCTURE — detect from prompt
  const hasGung = prompt.includes('궁') || prompt.includes('경복') || prompt.includes('전');
  const hasTap = prompt.includes('탑') || prompt.includes('불국') || prompt.includes('석가');
  const hasSeokgul = prompt.includes('석굴') || prompt.includes('석굴암') || prompt.includes('부처');
  
  if (hasGung) drawPalace(ctx, W, H, hue, style);
  else if (hasTap) drawPagoda(ctx, W, H, hue, style);
  else if (hasSeokgul) drawBuddha(ctx, W, H, hue, style);
  else drawGenericHeritage(ctx, W, H, hue, style, seed);

  // Mountains
  drawMountains(ctx, W, H, hue, style);

  // Golden overlay
  if (style !== 'korean_ink') {
    const glow = ctx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,W*0.6);
    glow.addColorStop(0,'rgba(201,168,76,0.08)');
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);
  }

  // Ink texture for korean_ink style
  if (style === 'korean_ink') {
    for (let i=0;i<2000;i++){
      ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.04})`;
      ctx.fillRect(Math.random()*W,Math.random()*H,1,1);
    }
  }

  // Watermark
  ctx.fillStyle = 'rgba(201,168,76,0.4)';
  ctx.font = '10px Courier New'; ctx.textAlign='right';
  ctx.fillText('국가유산 디지털 체험관', W-10, H-10);
}

function drawPalace(c,W,H,hue,style) {
  const ink = style==='korean_ink';
  // Base platform
  c.fillStyle = ink ? '#888' : `hsl(${hue},15%,30%)`;
  c.fillRect(W*0.08,H*0.6,W*0.84,H*0.06);
  // Main hall
  c.fillStyle = ink ? '#555' : `hsl(${hue+10},25%,22%)`;
  c.fillRect(W*0.18,H*0.42,W*0.64,H*0.18);
  // Roof (curved Korean style)
  c.fillStyle = ink ? '#444' : `hsl(${hue-20},30%,18%)`;
  c.beginPath();
  c.moveTo(W*0.08,H*0.42); c.lineTo(W*0.5,H*0.25); c.lineTo(W*0.92,H*0.42); c.closePath(); c.fill();
  // Roof ridge eave (처마)
  c.fillStyle = ink ? '#333' : `hsl(${hue-10},20%,14%)`;
  c.beginPath();
  c.moveTo(W*0.06,H*0.435); c.lineTo(W*0.5,H*0.255); c.lineTo(W*0.94,H*0.435); c.closePath(); c.fill();
  // Pillars
  for (let i=0;i<5;i++){
    const px=W*(0.22+i*0.14);
    c.fillStyle=ink?'#666':`hsl(${hue+5},18%,28%)`;
    c.fillRect(px,H*0.42,W*0.03,H*0.18);
  }
  // Dancheong colors
  if (!ink) {
    const dColors=['#e03040','#2060b8','#289050','#e8c030'];
    for(let i=0;i<4;i++){
      c.fillStyle=dColors[i];c.globalAlpha=0.5;
      c.fillRect(W*(0.22+i*0.14)+W*0.004,H*0.425,W*0.022,H*0.015);
    }
    c.globalAlpha=1;
  }
}

function drawPagoda(c,W,H,hue,style) {
  const ink = style==='korean_ink';
  const tiers = 5;
  const cx = W/2, baseY = H*0.65, baseW = W*0.28;
  // Base stone
  c.fillStyle = ink ? '#888' : `hsl(${hue},15%,35%)`;
  c.fillRect(cx-baseW/2, baseY-H*0.04, baseW, H*0.04);
  // Tiers
  for (let i=0;i<tiers;i++){
    const tw = baseW*(1-i*0.17);
    const ty = baseY - H*0.04 - i*H*0.08 - H*0.07;
    const th = H*0.06;
    c.fillStyle = ink ? `rgba(80,80,80,${1-i*0.1})` : `hsl(${hue+i*5},22%,${25+i*3}%)`;
    c.fillRect(cx-tw/2,ty,tw,th);
    // Eave
    c.fillStyle = ink ? '#666' : `hsl(${hue-15},28%,18%)`;
    c.beginPath();
    c.moveTo(cx-tw/2-tw*0.15,ty+th*0.2);
    c.lineTo(cx,ty-th*0.15);
    c.lineTo(cx+tw/2+tw*0.15,ty+th*0.2);
    c.closePath(); c.fill();
  }
  // Spire
  c.strokeStyle = ink ? '#444' : `hsl(${hue},30%,50%)`;
  c.lineWidth = 3;
  c.beginPath();
  c.moveTo(cx, baseY-H*0.04-tiers*H*0.08-H*0.1);
  c.lineTo(cx, baseY-H*0.04-tiers*H*0.08-H*0.22);
  c.stroke();
}

function drawBuddha(c,W,H,hue,style) {
  const ink=style==='korean_ink';
  // Grotto arch
  c.fillStyle=ink?'#888':`hsl(${hue},12%,28%)`;
  c.beginPath();
  c.arc(W/2,H*0.5,W*0.28,Math.PI,0);
  c.rect(W/2-W*0.28,H*0.5,W*0.56,H*0.2);
  c.fill();
  // Inner grotto
  c.fillStyle=ink?'#555':`hsl(${hue},8%,18%)`;
  c.beginPath();
  c.arc(W/2,H*0.5,W*0.22,Math.PI,0);
  c.rect(W/2-W*0.22,H*0.5,W*0.44,H*0.16);
  c.fill();
  // Buddha silhouette
  c.fillStyle=ink?'rgba(80,80,80,0.9)':`rgba(${Math.round(200+hue/3)},${160},${100},0.9)`;
  // Body
  c.beginPath();c.ellipse(W/2,H*0.55,W*0.1,H*0.16,0,0,Math.PI*2);c.fill();
  // Head
  c.beginPath();c.arc(W/2,H*0.38,W*0.065,0,Math.PI*2);c.fill();
  // Halo
  c.strokeStyle=ink?'rgba(150,150,150,0.4)':`rgba(${232},${200},${80},0.4)`;
  c.lineWidth=3;
  c.beginPath();c.arc(W/2,H*0.38,W*0.1,0,Math.PI*2);c.stroke();
}

function drawGenericHeritage(c,W,H,hue,style,seed) {
  // Randomly draw one of the above based on seed
  const t = seed % 3;
  if (t===0) drawPalace(c,W,H,hue,style);
  else if (t===1) drawPagoda(c,W,H,hue,style);
  else drawBuddha(c,W,H,hue,style);
}

function drawMountains(c,W,H,hue,style) {
  const ink=style==='korean_ink';
  for (let m=0;m<3;m++){
    c.globalAlpha=0.4-m*0.08;
    c.fillStyle=ink?`rgba(${120-m*20},${120-m*20},${120-m*20},0.5)`:`hsl(${hue+190+m*10},${20-m*5}%,${12+m*4}%)`;
    c.beginPath();
    c.moveTo(-10,H*0.65);
    const pts=8;
    for(let i=0;i<=pts;i++){
      const x=W*i/pts;
      const y=H*(0.35+0.15*Math.pow(Math.sin(i/pts*Math.PI*(1.5+m*.5)),2)-m*0.05);
      i===0?c.lineTo(x,y):c.lineTo(x,y);
    }
    c.lineTo(W+10,H*0.65);c.closePath();c.fill();
    c.globalAlpha=1;
  }
}

// ═══════════════════════════════════════════
// GENERATION
// ═══════════════════════════════════════════
let generating = false;
let generationHistory = [];

async function generate() {
  if (generating) return;
  const prompt = document.getElementById('prompt-input').value.trim();
  if (!prompt) { alert('국가유산을 묘사해 주세요.'); return; }
  
  generating = true;
  showGenOverlay(true);
  
  try {
    // Try real API first
    const stylePrompt = STYLES[selectedStyle].prompt;
    const fullPrompt = `Korean national heritage site, ${prompt}, ${stylePrompt}, masterpiece, highly detailed`;
    
    let imageUrl = null;
    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: fullPrompt }),
      });
      if (res.ok) {
        const data = await res.json();
        imageUrl = data.url || data.image_url;
      }
    } catch(e) {}

    if (imageUrl) {
      // Load and draw real image
      await loadAndDrawImage(imageUrl);
    } else {
      // Demo: procedural art
      await simulateGeneration();
      drawHeritageArt(prompt, STYLES[selectedStyle].key);
    }

    // Add to history
    addToHistory(prompt);
    document.getElementById('prompt-display').textContent = '「' + prompt + '」';
    document.getElementById('api-status').textContent = imageUrl ? 'API 생성 완료' : '데모 모드';
  } finally {
    generating = false;
    showGenOverlay(false);
  }
}

async function simulateGeneration() {
  const msgs = ['이미지 분석 중...','특징 추출 중...','전통 패턴 적용 중...','세부 묘사 생성 중...','최종화 처리 중...'];
  for (let i=0;i<msgs.length;i++){
    document.getElementById('gen-msg').textContent = msgs[i];
    document.getElementById('gen-progress-fill').style.width = (i+1)/msgs.length*100+'%';
    await new Promise(r=>setTimeout(r,400+Math.random()*300));
  }
}

async function loadAndDrawImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image(); img.crossOrigin='anonymous';
    img.onload = () => { ctx.drawImage(img,0,0,canvas.width,canvas.height); resolve(); };
    img.onerror = reject;
    img.src = url;
  });
}

function showGenOverlay(show) {
  const ov = document.getElementById('gen-overlay');
  ov.style.display = show ? 'flex' : 'none';
  if (show) document.getElementById('gen-progress-fill').style.width='0%';
}

function addToHistory(prompt) {
  const row = document.getElementById('history-row');
  const thumb = document.createElement('div');
  thumb.className = 'hist-thumb';
  const tc = document.createElement('canvas');
  tc.width=60;tc.height=60;
  tc.getContext('2d').drawImage(canvas,0,0,60,60);
  const hl = document.createElement('div');
  hl.className='hl'; hl.textContent=prompt.slice(0,12);
  thumb.appendChild(tc); thumb.appendChild(hl);
  thumb.onclick=()=>{ ctx.drawImage(tc,0,0,canvas.width,canvas.height); };
  row.insertBefore(thumb, row.firstChild);
  generationHistory.push({ prompt, dataUrl: canvas.toDataURL() });
}

// ═══════════════════════════════════════════
// VOICE INPUT
// ═══════════════════════════════════════════
let recognition = null, isRecording = false;

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('이 브라우저에서는 음성 인식이 지원되지 않습니다. Chrome을 사용해주세요.');
    return;
  }
  if (isRecording) { recognition?.stop(); return; }
  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = 'ko-KR'; recognition.continuous = false; recognition.interimResults = true;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('voice-btn').classList.add('recording');
    document.getElementById('voice-btn').textContent = '⏹ 중지';
    document.getElementById('voice-status').innerHTML = '<span>🔴 녹음 중...</span><div class="voice-wave"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div>';
  };
  recognition.onresult = e => {
    const transcript = Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('prompt-input').value = transcript;
    document.getElementById('voice-status').textContent = '인식: ' + transcript;
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('voice-btn').classList.remove('recording');
    document.getElementById('voice-btn').textContent = '🎙 음성으로 말하기';
    document.getElementById('voice-status').textContent = '// 음성 입력 완료 //';
  };
  recognition.onerror = e => {
    isRecording = false;
    document.getElementById('voice-status').textContent = '오류: ' + e.error;
  };
  recognition.start();
}

// PRINT
// ═══════════════════════════════════════════
function printImage() {
  const dataUrl = canvas.toDataURL('image/png');
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>국가유산 출력</title>
  <style>body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff;}
  img{max-width:100%;max-height:100vh;object-fit:contain;}
  .info{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:serif;font-size:12px;color:#666;}
  @media print{.info{display:none}}</style></head>
  <body><img src="${dataUrl}" alt="국가유산"><div class="info">국가유산 디지털 체험관 · ${new Date().toLocaleDateString('ko-KR')}</div>
  <script>window.onload=()=>{window.print();}<\/script></body></html>`);
  win.document.close();
}

function downloadImage() {
  const link = document.createElement('a');
  link.download = '국가유산_' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function shareImage() {
  if (!navigator.share) { downloadImage(); return; }
  canvas.toBlob(async blob => {
    try {
      await navigator.share({ title:'국가유산 이미지', files:[new File([blob],'heritage.png',{type:'image/png'})] });
    } catch(e) { downloadImage(); }
  });
}
