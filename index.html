<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k-heritage</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1640026159/drawing_utils.js"></script>
</head>
<body>
    <div id="app">
        <header class="main-header">
            <h1>🏛️ 국가유산 인터랙티브 체험</h1>
            <nav class="feature-nav">
                <button data-feature="1">단청 물결</button>
                <button data-feature="2">국가유산 CRT</button>
                <button data-feature="3">색즉시공</button>
                <button data-feature="4">인크레디박스</button>
                <button data-feature="5">인생네컷</button>
                <button data-feature="6">사관 LLM</button>
                <button data-feature="7">보존과학</button>
                <button data-feature="8">인터렉티브</button>
            </nav>
        </header>
        <main id="feature-container">
            <div class="welcome-screen">
                <h2>✅ 웹사이트가 정상 로드되었습니다!</h2>
                <p>8 가지 국가유산 기반 인터랙티브 체험</p>
                <!-- ✅ 추가: api-status 요소 -->
                <div id="api-status" class="api-status warn">
                    <span>⚠️ API 키가 설정되지 않았습니다.</span>
                </div>
            </div>
        </main>
        <div id="webcam-container" style="display:none;">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="output-canvas"></canvas>
        </div>
        <footer class="main-footer">
            <span>© 2026 국가유산 디지털 아카이브</span>
        </footer>
    </div>
    
    <!-- Feature JS 파일들 -->
    <script src="./js/feature1-dancheong.js"></script>
    <script src="./js/feature2-crt.js"></script>
    <script src="./js/feature3-seokjeok.js"></script>
    <script src="./js/feature4-incredible.js"></script>
    <script src="./js/feature5-life4cut.js"></script>
    <script src="./js/feature6-sagwan-llm.js"></script>
    <script src="./js/feature7-conservation.js"></script>
    <script src="./js/feature8-interactive.js"></script>
    
    <!-- 메인 앱 -->
    <script src="./js/main.js"></script>
</body>
</html>
