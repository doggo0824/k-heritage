<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k-heritage</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- ✅ CDN 로드 순서: Three.js → MediaPipe → drawing_utils -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640026159/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1640026159/drawing_utils.js"></script>
</head>
<body>
    <!-- 전체 화면 웹캠 배경 -->
    <video id="webcam-bg" autoplay playsinline muted></video>
    
    <!-- CRT 효과 -->
    <div class="crt-overlay"></div>
    <div class="crt-flicker"></div>
    
    <div id="app">
        <!-- 중앙 제목 -->
        <div class="title-overlay">
            <h1>🏛️ 국가유산 인터랙티브</h1>
            <p>검지 손가락으로 버튼을 3 초간 터치하세요</p>
        </div>
        
        <!-- 흩어진 메뉴 버튼들 -->
        <div class="feature-buttons">
            <button class="feature-btn" data-feature="1" data-sound="hover">단청 물결</button>
            <button class="feature-btn" data-feature="2" data-sound="hover">국가유산 CRT</button>
            <button class="feature-btn" data-feature="3" data-sound="hover">색즉시공</button>
            <button class="feature-btn" data-feature="4" data-sound="hover">인크레디박스</button>
            <button class="feature-btn" data-feature="5" data-sound="hover">인생네컷</button>
            <button class="feature-btn" data-feature="6" data-sound="hover">사관 LLM</button>
            <button class="feature-btn" data-feature="7" data-sound="hover">보존과학</button>
            <button class="feature-btn" data-feature="8" data-sound="hover">인터렉티브</button>
        </div>
        
        <!-- 초록색 원형 게이지 -->
        <div id="touch-gauge" style="display:none;">
            <svg viewBox="0 0 100 100" class="gauge-svg">
                <circle class="gauge-bg" cx="50" cy="50" r="45"/>
                <circle class="gauge-fill" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283"/>
            </svg>
            <div id="touch-text">터치 중...</div>
        </div>
        
        <!-- 기능 컨테이너 -->
        <main id="feature-container">
            <!-- 기능 실행 시 내용 채워짐 -->
        </main>
        
        <!-- 로딩 오버레이 -->
        <div id="loading-overlay" style="display:none;">
            <div class="loading-crt">
                <div class="loading-text">로딩 중...</div>
                <div class="loading-bar">
                    <div class="loading-progress"></div>
                </div>
            </div>
        </div>
        
        <!-- 푸터 -->
        <footer class="main-footer">
            <span>© 2026 국가유산 디지털 아카이브</span>
        </footer>
    </div>
    
    <!-- Feature JS 파일들 -->
    <script src="./js/feature1-dancheong.js"></script>
    <script src="./js/feature2-crt.js"></script>
    <script src="./js/feature3-seokjeok.js"></script>
    <script src="./js/feature4-incredible.js"></script>
    <script src="./js/feature5-life4cut.js"></script>
    <script src="./js/feature6-sagwan-llm.js"></script>
    <script src="./js/feature7-conservation.js"></script>
    <script src="./js/feature8-interactive.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
