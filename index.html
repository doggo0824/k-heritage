<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>국가유산 디지털 체험관</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--gold:#c8a84b;--dgold:#a08040;--text:#e8d5a3;--dim:#3a3020;--border:rgba(200,168,75,.25)}
body{background:var(--bg);color:var(--text);font-family:"Courier New",monospace;overflow:hidden;height:100vh;width:100vw}
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999}

/* ── BOOT ── */
#boot{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:1000;transition:opacity .8s}
.hanja{font-size:28px;letter-spacing:8px;color:rgba(200,168,75,.35);margin-bottom:6px}
#boot-log{width:min(600px,90vw);height:160px;overflow:hidden;font:11px "Courier New";color:#4a7a3a;line-height:1.7;text-align:left}
.log-line{opacity:0;animation:fadeIn .25s forwards}
@keyframes fadeIn{to{opacity:1}}
#prog-bar{width:min(600px,90vw);height:2px;background:rgba(200,168,75,.12);margin-top:4px}
#prog-fill{height:100%;width:0%;background:var(--gold);transition:width .12s linear}
#prog-pct{font:16px "Courier New";letter-spacing:4px;color:var(--gold)}
#enter-btn{margin-top:16px;padding:12px 36px;border:1px solid var(--dgold);background:transparent;color:var(--dgold);font:14px "Courier New";letter-spacing:3px;cursor:pointer;transition:.3s;opacity:.35;pointer-events:none}
#enter-btn.ready{opacity:1;pointer-events:all;border-color:var(--gold);color:var(--gold);animation:pulse 2s infinite}
#enter-btn.ready:hover{background:var(--gold);color:var(--bg)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(200,168,75,0)}50%{box-shadow:0 0 24px rgba(200,168,75,.35)}}

/* ── MAIN ── */
#main{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .8s;display:flex;flex-direction:column}
#main.on{opacity:1;pointer-events:all}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
#hdr-t{font:13px "Courier New";letter-spacing:3px;color:var(--gold)}
#lang{display:flex;gap:5px}
.lb{background:transparent;border:1px solid var(--border);color:var(--dim);font:11px "Courier New";padding:4px 8px;cursor:pointer;transition:.3s;letter-spacing:1px}
.lb:hover,.lb.on{border-color:var(--gold);color:var(--gold)}
#hero{text-align:center;padding:18px 20px 14px;flex-shrink:0}
#hero-h{font-size:clamp(18px,4vw,34px);letter-spacing:6px;color:var(--gold);margin-bottom:5px}
#hero-s{font:11px "Courier New";letter-spacing:3px;color:var(--dim)}
.wc-hint{margin-top:6px;font:11px "Courier New";color:var(--dim);letter-spacing:2px}
#grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:1px;padding:1px;overflow:hidden}
@media(max-width:700px){#grid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(4,1fr)}}
.card{background:rgba(255,255,255,.02);border:1px solid var(--border);display:flex;flex-direction:column;padding:14px 16px;cursor:pointer;transition:.3s;text-decoration:none;color:inherit;position:relative;overflow:hidden}
.card:hover{background:rgba(200,168,75,.06);border-color:var(--gold)}
.card::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(200,168,75,.06),transparent 70%);opacity:0;transition:.3s}
.card:hover::before{opacity:1}
.c-num{font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:6px}
.c-name{font-size:clamp(13px,1.8vw,17px);letter-spacing:2px;color:var(--text);margin-bottom:3px}
.c-eng{font-size:10px;color:var(--dgold);letter-spacing:1px;text-transform:uppercase;opacity:.7}
.c-status{margin-top:auto;padding-top:8px;border-top:1px solid rgba(200,168,75,.12);font-size:10px;letter-spacing:1px;display:flex;align-items:center;gap:5px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}
#footer{padding:7px;text-align:center;font:10px "Courier New";color:var(--dim);letter-spacing:2px;border-top:1px solid var(--border);flex-shrink:0}
/* webcam eye */
#wc-eye{position:fixed;bottom:44px;right:16px;width:100px;height:70px;border:1px solid var(--border);z-index:10;overflow:hidden;opacity:.5}
#wc-eye video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
</style></head><body>

<div id="boot">
  <div class="hanja">國家遺産</div>
  <div id="boot-log"></div>
  <div id="prog-bar"><div id="prog-fill"></div></div>
  <div id="prog-pct">0%</div>
  <button id="enter-btn">[ ENTER THE EXPERIENCE ]</button>
</div>

<div id="main">
  <div id="hdr">
    <div id="hdr-t">국가유산 디지털 체험관</div>
    <div id="lang">
      <button class="lb on" onclick="setLang('ko',this)">KO</button>
      <button class="lb" onclick="setLang('en',this)">EN</button>
      <button class="lb" onclick="setLang('ja',this)">JA</button>
      <button class="lb" onclick="setLang('zh',this)">ZH</button>
    </div>
  </div>
  <div id="hero">
    <div id="hero-h">국가유산 디지털 체험관</div>
    <div id="hero-s">NATIONAL HERITAGE · DIGITAL EXPERIENCE CENTER</div>
    <div class="wc-hint" id="wc-hint">☝ 검지를 들어 메뉴를 선택하거나, 클릭하여 체험하세요</div>
  </div>
  <div id="grid"></div>
  <div id="footer">// 국가유산 디지털 체험관 // NATIONAL HERITAGE DIGITAL EXPERIENCE CENTER v1.0</div>
</div>

<div id="wc-eye"><video id="wc-vid" autoplay playsinline muted></video></div>

<script>
// ── Boot ──────────────────────────────────────────────────────
const BOOT_MSGS=[
  "[SYS] 국가유산 디지털 체험관 v1.0 부팅 중...",
  "[SYS] Initializing cultural heritage database...",
  "[MOD] 01 단청 물결 ...................... OK",
  "[MOD] 02 국가유산 CRT .................. OK",
  "[MOD] 03 색즉시OO즉시색 ............... OK",
  "[MOD] 04 전통악기 박스 ................. OK",
  "[MOD] 05 전통문양 인생네컷 ............. OK",
  "[MOD] 06 사관 LLM ...................... OK",
  "[MOD] 07 보존과학 체험 ................. OK",
  "[MOD] 08 인터랙티브 국가유산 ........... OK",
  "[CAM] 웹캠 초기화 시도 중...",
  "[SYS] 모든 모듈 준비 완료. 입장하십시오.",
];
const logEl=document.getElementById("boot-log");
const fillEl=document.getElementById("prog-fill");
const pctEl=document.getElementById("prog-pct");
const enterBtn=document.getElementById("enter-btn");
let idx=0,pct=0;

const bootTimer=setInterval(()=>{
  if(idx<BOOT_MSGS.length){
    const d=document.createElement("div");d.className="log-line";d.textContent=BOOT_MSGS[idx++];
    logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;
  }
  const target=Math.round(idx/BOOT_MSGS.length*100);
  if(pct<target)pct++;
  fillEl.style.width=pct+"%";pctEl.textContent=pct+"%";
  if(pct>=100&&idx>=BOOT_MSGS.length){clearInterval(bootTimer);enterBtn.classList.add("ready");tryWebcam();}
},170);

enterBtn.onclick=()=>{
  document.getElementById("boot").style.opacity="0";
  setTimeout(()=>{document.getElementById("boot").style.display="none";document.getElementById("main").classList.add("on");},800);
};

// ── Webcam (optional) ─────────────────────────────────────────
async function tryWebcam(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{width:200,height:140,facingMode:"user"}});
    document.getElementById("wc-vid").srcObject=s;
  }catch{document.getElementById("wc-eye").style.display="none";}
}

// ── Module data ───────────────────────────────────────────────
const LABELS={
  ko:{h:"국가유산 디지털 체험관",hint:"☝ 검지를 들어 메뉴를 선택하거나, 클릭하여 체험하세요",
    mods:["단청 물결","국가유산 CRT","색즉시OO즉시색","전통악기 박스","전통문양 인생네컷","사관 LLM","보존과학 체험","인터랙티브 국가유산"]},
  en:{h:"National Heritage Digital Experience",hint:"Click or tap a module to explore",
    mods:["Dancheong Wave","Heritage CRT","Color & Mudra","Traditional Music","Pattern Photo Booth","Court Historian AI","Conservation Science","Interactive Heritage"]},
  ja:{h:"国家遺産デジタル体験館",hint:"モジュールをクリックして体験してください",
    mods:["丹青の波","遺産CRT","色即是色","伝統楽器","文様フォトブース","史官LLM","保存科学","インタラクティブ遺産"]},
  zh:{h:"国家遗产数字体验馆",hint:"点击模块开始体验",
    mods:["丹青波浪","遗产CRT","色即是色","传统乐器","纹样照片亭","史官LLM","保存科学","互动遗产"]},
};
const MODS=[
  {n:"01",url:"modules/dancheong.html"},
  {n:"02",url:"modules/crt.html"},
  {n:"03",url:"modules/mudra.html"},
  {n:"04",url:"modules/music.html"},
  {n:"05",url:"modules/photo.html"},
  {n:"06",url:"modules/sillok.html"},
  {n:"07",url:"modules/conservation.html"},
  {n:"08",url:"modules/heritage.html"},
];

function buildGrid(lang){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  const L=LABELS[lang];
  MODS.forEach((m,i)=>{
    const a=document.createElement("a");a.className="card";a.href=m.url;
    a.innerHTML=`<div class="c-num">${m.n}</div><div class="c-name">${L.mods[i]}</div><div class="c-eng">${LABELS.en.mods[i]}</div><div class="c-status"><span class="dot"></span><span>ACTIVE</span></div>`;
    grid.appendChild(a);
  });
}

function setLang(lang,btn){
  document.querySelectorAll(".lb").forEach(b=>b.classList.remove("on"));btn.classList.add("on");
  document.getElementById("hero-h").textContent=LABELS[lang].h;
  document.getElementById("wc-hint").textContent=LABELS[lang].hint;
  buildGrid(lang);
}

buildGrid("ko");
</script></body></html>
