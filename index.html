<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k-heritage</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1640026159/drawing_utils.js"></script>
</head>
<body>
    <!-- ✅ 웹캠 배경 비디오 -->
    <video id="webcam-bg" autoplay playsinline muted></video>
    
    <div id="app">
        <!-- ✅ 화면 중앙 제목 -->
        <div class="title-overlay">
            <h1>🏛️ 국가유산 인터랙티브</h1>
            <p>손가락으로 버튼을 3 초간 터치하세요</p>
        </div>
        
        <!-- ✅ 흩어진 메뉴 버튼들 -->
        <div class="feature-buttons">
            <button class="feature-btn" data-feature="1" style="top: 15%; left: 10%;">단청 물결</button>
            <button class="feature-btn" data-feature="2" style="top: 10%; right: 15%;">국가유산 CRT</button>
            <button class="feature-btn" data-feature="3" style="top: 30%; left: 5%;">색즉시공</button>
            <button class="feature-btn" data-feature="4" style="top: 35%; right: 8%;">인크레디박스</button>
            <button class="feature-btn" data-feature="5" style="top: 50%; left: 8%;">인생네컷</button>
            <button class="feature-btn" data-feature="6" style="top: 45%; right: 5%;">사관 LLM</button>
            <button class="feature-btn" data-feature="7" style="top: 70%; left: 12%;">보존과학</button>
            <button class="feature-btn" data-feature="8" style="top: 65%; right: 10%;">인터렉티브</button>
        </div>
        
        <!-- ✅ 터치 진행 표시줄 -->
        <div id="touch-indicator" style="display:none;">
            <div class="touch-bar-container">
                <div id="touch-progress"></div>
            </div>
            <p id="touch-text">터치 중...</p>
        </div>
        
        <!-- ✅ 현재 실행 중인 기능 컨테이너 -->
        <main id="feature-container">
            <!-- 기능 실행 시 내용 채워짐 -->
        </main>
        
        <!-- ✅ 푸터 -->
        <footer class="main-footer">
            <span>© 2026 국가유산 디지털 아카이브</span>
        </footer>
    </div>
    
    <script src="./js/feature1-dancheong.js"></script>
    <script src="./js/feature2-crt.js"></script>
    <script src="./js/feature3-seokjeok.js"></script>
    <script src="./js/feature4-incredible.js"></script>
    <script src="./js/feature5-life4cut.js"></script>
    <script src="./js/feature6-sagwan-llm.js"></script>
    <script src="./js/feature7-conservation.js"></script>
    <script src="./js/feature8-interactive.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
